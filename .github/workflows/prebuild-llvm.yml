# Publish and pre-build LLVM+MLIR toolchain artifacts.
#
# Windows toolchain: builds LLVM+MLIR 22.1.0 from source on a windows-2022
# runner using MSVC + Ninja, installs to C:\llvm-22, packages as a Hew-owned
# toolchain archive (.tar.gz), generates a SHA-256 checksum, and publishes to
# a versioned toolchain release (toolchain/llvm-22.1.0-windows-msvc-v1). The
# official LLVM Windows binary archive omits MLIR cmake package files
# (lib/cmake/mlir/MLIRConfig.cmake); a source build is required. release.yml
# downloads and verifies that asset instead of building LLVM at release time.
# The publish step is idempotent — it skips if the versioned asset already
# exists (immutable once published; bump TOOLCHAIN_TAG to republish).
#
# FreeBSD: builds LLVM+MLIR from source and warms the GitHub Actions cache used
# by the FreeBSD release path (tier-2, continue-on-error). This job is
# independent of the Windows publish job. force_rebuild only affects this job.
#
# Runs weekly on Sunday 04:00 UTC and can be triggered manually.
# Can also be triggered automatically when this workflow file changes.

name: Pre-build LLVM+MLIR

on:
  schedule:
    # Sunday 04:00 UTC — keeps FreeBSD caches warm before they expire
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force FreeBSD LLVM cache rebuild even if it already exists (no effect on immutable Windows toolchain assets)"
        required: false
        default: "false"
        type: boolean
  push:
    branches: [main]
    paths:
      - ".github/workflows/prebuild-llvm.yml"

# No top-level permissions — each job declares its own minimum required set.

env:
  # IMPORTANT: when bumping LLVM, update LLVM_TAG here and the corresponding
  # toolchain asset name/tag (TOOLCHAIN_TAG, ASSET_NAME) consumed by release.yml.
  LLVM_TAG: "llvmorg-22.1.0"
  LLVM_CACHE_KEY_BSD: "llvm-mlir-22.1.0-freebsd15-amd64-v1"
  # Versioned toolchain release tag and asset name for the Hew-owned Windows
  # LLVM package. Bump the v-suffix (v2, v3, …) when the packaging or layout
  # changes without a LLVM version bump. Must match release.yml exactly.
  TOOLCHAIN_TAG: "toolchain/llvm-22.1.0-windows-msvc-v1"
  ASSET_NAME: "hew-llvm-22.1.0-windows-msvc-v1.tar.gz"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Windows toolchain: build LLVM+MLIR from source on windows-2022 with
  # MSVC + Ninja, install to C:\llvm-22, and publish as a Hew-owned
  # toolchain archive consumed by release.yml. The official upstream binary
  # archive lacks MLIR cmake package files; a source build is required.
  # ─────────────────────────────────────────────────────────────────────
  publish-windows-toolchain:
    runs-on: windows-2022
    timeout-minutes: 360
    permissions:
      contents: write       # create toolchain release and upload assets
      id-token: write       # OIDC token for build-provenance attestation
      attestations: write   # GitHub Attestations API
    env:
      FORCE: "${{ inputs.force_rebuild }}"

    steps:
      - name: Check toolchain publication state
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip only when ALL required state is present and valid:
          #   (a) main archive asset exists,
          #   (b) .sha256 sidecar exists,
          #   (c) SLSA provenance attestation exists in the GitHub Attestations API.
          # A partial publication (some assets present, attestation missing, etc.)
          # fails closed with a diagnostic — do not silently treat it as complete.
          #
          # force_rebuild has no effect here: Windows toolchain assets are
          # immutable once published. Bump TOOLCHAIN_TAG to a new revision
          # (v2, v3, …) to republish updated content.

          if [ "$FORCE" = "true" ]; then
            echo "::notice::force_rebuild is set but Windows toolchain assets are immutable once published. FORCE has no effect on this job. Bump TOOLCHAIN_TAG (e.g., v2) to republish updated content."
          fi

          if ! info=$(gh release view "$TOOLCHAIN_TAG" \
                --repo "$GITHUB_REPOSITORY" --json assets 2>/dev/null); then
            # Toolchain release does not exist yet — proceed with first publish.
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_archive=$(echo "$info" | jq -r --arg n "$ASSET_NAME" \
            'any(.assets[]; .name == $n) | tostring')
          has_sha256=$(echo "$info" | jq -r --arg n "${ASSET_NAME}.sha256" \
            'any(.assets[]; .name == $n) | tostring')

          # Detect partial publication: one asset present but not the other.
          if [ "$has_archive" != "$has_sha256" ]; then
            echo "::error::Toolchain release $TOOLCHAIN_TAG is partially published (archive=$has_archive sha256=$has_sha256). The previous publish run did not complete. Bump TOOLCHAIN_TAG to a new revision (e.g., v2) to republish."
            exit 1
          fi

          if [ "$has_archive" = "false" ] && [ "$has_sha256" = "false" ]; then
            # Release shell exists but no assets yet — proceed.
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Both assets are present. Verify SLSA attestation via the GitHub
          # Attestations API. Download only the tiny .sha256 sidecar to obtain
          # the expected digest; no need to re-download the full archive.
          sha256_dest="${RUNNER_TEMP}/${ASSET_NAME}.sha256"
          if ! gh release download "$TOOLCHAIN_TAG" \
               --repo "$GITHUB_REPOSITORY" \
               --pattern "${ASSET_NAME}.sha256" \
               --dir "$RUNNER_TEMP"; then
            echo "::error::Could not download ${ASSET_NAME}.sha256 from $TOOLCHAIN_TAG — treating as partial publication."
            exit 1
          fi
          hash=$(awk '{print $1}' "$sha256_dest" | tr '[:upper:]' '[:lower:]')
          rm -f "$sha256_dest"

          attest_count=$(gh api \
            "/repos/$GITHUB_REPOSITORY/attestations/sha256:${hash}" \
            --jq '.attestations | length' 2>/dev/null || echo "0")
          if [ "${attest_count:-0}" -eq 0 ]; then
            echo "::error::Both toolchain assets exist in $TOOLCHAIN_TAG but SLSA provenance attestation is absent (digest: sha256:$hash). The previous publish did not complete attestation. Bump TOOLCHAIN_TAG to a new revision to republish."
            exit 1
          fi

          echo "All toolchain assets and provenance verified — skipping publish (digest: sha256:$hash, attestations: $attest_count)"
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Set up MSVC developer environment and Ninja
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          # Locate VS2022 via preinstalled vswhere.exe — no external download.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Host "::error::vswhere.exe not found at $vswhere"; exit 1
          }
          $vsInstall = (& $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath) | Select-Object -First 1
          if (-not $vsInstall -or -not (Test-Path $vsInstall)) {
            Write-Host "::error::Visual Studio with MSVC tools not found"; exit 1
          }
          Write-Host "VS install: $vsInstall"

          # Expose VS-internal Ninja — ships with the VS CMake component,
          # no external package manager or download required.
          $ninjaDir = "$vsInstall\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja"
          if (-not (Test-Path "$ninjaDir\ninja.exe")) {
            Write-Host "::error::VS-internal ninja.exe not found at $ninjaDir"; exit 1
          }
          $ninjaVer = & "$ninjaDir\ninja.exe" --version
          Write-Host "Ninja $ninjaVer at $ninjaDir"
          $ninjaDir | Out-File -FilePath $env:GITHUB_PATH -Encoding ascii -Append

          # Initialise the MSVC developer environment from vcvars64.bat
          # and export all resulting changes to GITHUB_ENV / GITHUB_PATH so
          # that every subsequent step sees the correct INCLUDE, LIB, and
          # tool paths. Uses only first-party runner tooling; no third-party
          # actions involved.
          $vcvars = "$vsInstall\VC\Auxiliary\Build\vcvars64.bat"
          $pathBefore = $env:PATH
          $rawEnv = cmd.exe /c "`"$vcvars`" x64 > nul 2>&1 && set" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::vcvars64.bat failed to initialise the MSVC environment"
            $rawEnv | ForEach-Object { Write-Host $_ }
            exit 1
          }
          $vcEnvAllow = [System.Collections.Generic.HashSet[string]]::new(
            [System.StringComparer]::OrdinalIgnoreCase)
          @(
            'CommandPromptType',
            'DevEnvDir',
            'ExtensionSdkDir',
            'FrameworkDir',
            'FrameworkDIR64',
            'FrameworkVersion',
            'FrameworkVersion64',
            'INCLUDE',
            'LIB',
            'LIBPATH',
            'NETFXSDKDir',
            'Platform',
            'UCRTVersion',
            'UniversalCRTSdkDir',
            'VCIDEInstallDir',
            'VCINSTALLDIR',
            'VCToolsInstallDir',
            'VCToolsRedistDir',
            'VCToolsVersion',
            'VisualStudioVersion',
            'VS170COMNTOOLS',
            'VSCMD_ARG_app_plat',
            'VSCMD_ARG_HOST_ARCH',
            'VSCMD_ARG_TGT_ARCH',
            'VSCMD_VER',
            'VSINSTALLDIR',
            'WindowsLibPath',
            'WindowsSdkBinPath',
            'WindowsSdkDir',
            'WindowsSDKLibVersion',
            'WindowsSDKVersion'
          ) | ForEach-Object { [void]$vcEnvAllow.Add($_) }
          $before = [System.Collections.Generic.HashSet[string]]::new(
            [System.StringComparer]::OrdinalIgnoreCase)
          foreach ($entry in ($pathBefore -split ';' | Where-Object { $_ })) {
            [void]$before.Add($entry)
          }
          foreach ($line in $rawEnv) {
            if ($line -notmatch '^([^=]+)=(.*)$') { continue }
            $k = $Matches[1]; $v = $Matches[2]
            if ($k -ieq 'PATH') {
              # Append only the entries that vcvars64 added; avoid duplicates.
              $env:PATH = $v
              foreach ($entry in ($v -split ';' | Where-Object { $_ })) {
                if (-not $before.Contains($entry)) {
                  $entry | Out-File -FilePath $env:GITHUB_PATH -Encoding ascii -Append
                }
              }
            } elseif ($vcEnvAllow.Contains($k)) {
              Set-Item -Path "Env:\$k" -Value $v
              "${k}=${v}" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append
            }
          }
          $cl = Get-Command cl.exe -ErrorAction SilentlyContinue
          if (-not $cl) {
            Write-Host "::error::cl.exe was not found after vcvars64.bat initialisation"
            exit 1
          }
          Write-Host "MSVC compiler: $($cl.Source)"
          Write-Host "MSVC developer environment ready"

      - name: Sparse-clone llvm-project at ${{ env.LLVM_TAG }}
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          # Clone with long-path support onto D:\ which has more free space
          # than C:\ on windows-2022 runners.
          git clone --depth 1 --branch "${{ env.LLVM_TAG }}" `
            --filter=blob:none --sparse `
            --config core.longpaths=true `
            https://github.com/llvm/llvm-project.git D:\llvm-src
          Set-Location D:\llvm-src
          # clang and lld are required for clang.exe and lld-link.exe;
          # mlir is required for MLIRConfig.cmake. All are separate projects
          # in the LLVM monorepo.
          git sparse-checkout set llvm clang lld mlir cmake third-party
          Write-Host "Source tree ready at D:\llvm-src"

      - name: Configure LLVM+MLIR with CMake (MSVC, Ninja, static libs)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          cmake -S D:\llvm-src\llvm -B D:\llvm-build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="C:\llvm-22" `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DLLVM_ENABLE_PROJECTS="clang;lld;mlir" `
            -DLLVM_TARGETS_TO_BUILD="X86" `
            -DLLVM_BUILD_TOOLS=ON `
            -DLLVM_BUILD_UTILS=ON `
            -DLLVM_INSTALL_UTILS=ON `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_INCLUDE_DOCS=OFF `
            -DLLVM_ENABLE_BINDINGS=OFF `
            -DLLVM_ENABLE_ZLIB=OFF `
            -DLLVM_ENABLE_ZSTD=OFF `
            -DLLVM_BUILD_LLVM_DYLIB=OFF `
            -DBUILD_SHARED_LIBS=OFF `
            -DMLIR_BUILD_MLIR_C_DYLIB=OFF `
            -DMLIR_ENABLE_BINDINGS_PYTHON=OFF

      - name: Build and install LLVM+MLIR to C:\llvm-22
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          cmake --build D:\llvm-build --target install `
            --parallel $env:NUMBER_OF_PROCESSORS
          Write-Host "LLVM+MLIR installed to C:\llvm-22"

      - name: Clean build tree to free disk space
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force D:\llvm-src, D:\llvm-build `
            -ErrorAction SilentlyContinue
          Write-Host "Build tree cleaned"

      - name: Validate installed LLVM+MLIR layout
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          # Validate layout before packaging. release.yml extracts the
          # resulting .tar.gz to C:\llvm-22 on a Windows runner and requires
          # the same paths.
          $required = @(
            "C:\llvm-22\bin\clang.exe",
            "C:\llvm-22\lib\cmake\llvm\LLVMConfig.cmake",
            "C:\llvm-22\lib\cmake\mlir\MLIRConfig.cmake"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              Write-Host "::error::Required path not found: $path"
              exit 1
            }
            Write-Host "OK: $path"
          }

          # At least one LLVM linker must be present for the Hew MSVC build.
          $linkers = @(
            "C:\llvm-22\bin\lld-link.exe",
            "C:\llvm-22\bin\lld.exe",
            "C:\llvm-22\bin\ld.lld.exe"
          )
          $linkerFound = $false
          foreach ($lnk in $linkers) {
            if (Test-Path $lnk) {
              Write-Host "Linker present: $lnk"
              $linkerFound = $true
            }
          }
          if (-not $linkerFound) {
            Write-Host "::error::No LLVM linker (lld-link.exe / lld.exe / ld.lld.exe) found under C:\llvm-22\bin"
            exit 1
          }

          $sizeMB = [math]::Round(
            (Get-ChildItem C:\llvm-22 -Recurse -ErrorAction SilentlyContinue |
              Measure-Object -Property Length -Sum).Sum / 1MB
          )
          Write-Host "Layout validated. LLVM install size: ${sizeMB} MB"

      - name: Package Hew toolchain archive
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          # Archive root is llvm-22/ so extracting to C:\ on Windows gives C:\llvm-22.
          # Run tar from /c (C:\) so the root entry is llvm-22/.
          tar -czf "$ASSET_NAME" -C /c llvm-22
          hash=$(sha256sum "$ASSET_NAME" | awk '{print $1}')
          # Single-line checksum: <hash>  <filename>
          printf '%s  %s\n' "$hash" "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          echo "Packaged: $ASSET_NAME"
          echo "SHA-256:  $hash"

      - name: Ensure toolchain release exists
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$TOOLCHAIN_TAG" \
               --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            gh release create "$TOOLCHAIN_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "LLVM 22.1.0 Windows MSVC toolchain (v1)" \
              --notes "Source-built LLVM+MLIR 22.1.0 for Hew Windows release builds. Layout: llvm-22/. Not a Hew product release." \
              --latest=false \
              --prerelease
            echo "Created toolchain release: $TOOLCHAIN_TAG"
          else
            echo "Toolchain release already exists: $TOOLCHAIN_TAG"
          fi

      - name: Upload toolchain assets
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Immutability guard: fail if assets already exist under this tag.
          # The check step should have caught this, but a race between two
          # concurrent publish runs could reach this point.
          if existing_info=$(gh release view "$TOOLCHAIN_TAG" \
               --repo "$GITHUB_REPOSITORY" --json assets 2>/dev/null); then
            if echo "$existing_info" | jq -e --arg n "$ASSET_NAME" \
                 'any(.assets[]; .name == $n)' > /dev/null; then
              echo "::error::Asset $ASSET_NAME already exists in $TOOLCHAIN_TAG. Toolchain assets are immutable once published. Bump TOOLCHAIN_TAG to a new revision (e.g., v2) to publish updated content."
              exit 1
            fi
          fi

          # --clobber is intentionally absent: assets are write-once.
          if ! gh release upload "$TOOLCHAIN_TAG" \
               "$ASSET_NAME" \
               "${ASSET_NAME}.sha256" \
               --repo "$GITHUB_REPOSITORY"; then
            echo "::error::Upload failed for $ASSET_NAME. If the asset already exists under $TOOLCHAIN_TAG, bump TOOLCHAIN_TAG to a new revision to republish."
            exit 1
          fi
          echo "Uploaded $ASSET_NAME to $TOOLCHAIN_TAG"

      - name: Attest toolchain archive provenance
        if: steps.check.outputs.skip != 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET_NAME }}

  # ─────────────────────────────────────────────────────────────────────
  # FreeBSD: QEMU VM via vmactions — warms cache for release.yml
  # ─────────────────────────────────────────────────────────────────────
  prebuild-freebsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
      actions: write    # needed for cache save
    env:
      FORCE: "${{ inputs.force_rebuild }}"

    steps:
      - name: Check if cache already exists
        id: check
        uses: actions/cache/restore@v4
        with:
          path: llvm-freebsd-install.tar.zst
          key: ${{ env.LLVM_CACHE_KEY_BSD }}
          lookup-only: true

      - name: Skip if cache is warm
        if: steps.check.outputs.cache-hit == 'true' && env.FORCE != 'true'
        run: echo "Cache hit — skipping LLVM build"

      - name: Build LLVM on FreeBSD
        if: steps.check.outputs.cache-hit != 'true' || env.FORCE == 'true'
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          mem: 8192
          prepare: |
            pkg install -y cmake ninja git

          run: |
            set -eux

            # Inline the LLVM tag so it is available inside the VM regardless
            # of how the runner exposes step-level env vars to the guest shell.
            LLVM_BRANCH="${{ env.LLVM_TAG }}"
            LLVM_PREFIX=/usr/local/llvm22-src

            echo "==> Building LLVM 22 from source"
            git clone --depth 1 --branch "${LLVM_BRANCH}" \
              --filter=blob:none --sparse \
              https://github.com/llvm/llvm-project.git /tmp/llvm-src
            (cd /tmp/llvm-src && git sparse-checkout set llvm mlir cmake third-party)

            cmake -S /tmp/llvm-src/llvm -B /tmp/llvm-build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="${LLVM_PREFIX}" \
              -DLLVM_ENABLE_PROJECTS="mlir" \
              -DLLVM_TARGETS_TO_BUILD="X86" \
              -DLLVM_BUILD_TOOLS=ON \
              -DLLVM_BUILD_UTILS=ON \
              -DLLVM_INSTALL_UTILS=ON \
              -DLLVM_INCLUDE_TESTS=OFF \
              -DLLVM_INCLUDE_BENCHMARKS=OFF \
              -DLLVM_INCLUDE_EXAMPLES=OFF \
              -DLLVM_INCLUDE_DOCS=OFF \
              -DLLVM_ENABLE_BINDINGS=OFF \
              -DLLVM_ENABLE_ZLIB=ON \
              -DLLVM_ENABLE_ZSTD=OFF \
              -DLLVM_BUILD_LLVM_DYLIB=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DMLIR_BUILD_MLIR_C_DYLIB=OFF \
              -DMLIR_ENABLE_BINDINGS_PYTHON=OFF

            cmake --build /tmp/llvm-build -j$(sysctl -n hw.ncpu)
            cmake --install /tmp/llvm-build

            # Create archive for caching
            tar cf llvm-freebsd-install.tar "${LLVM_PREFIX}"
            zstd -T0 llvm-freebsd-install.tar -o llvm-freebsd-install.tar.zst
            rm -f llvm-freebsd-install.tar

            ls -lh llvm-freebsd-install.tar.zst

            # Clean up
            rm -rf /tmp/llvm-src /tmp/llvm-build

      - name: Save cache
        if: steps.check.outputs.cache-hit != 'true' || env.FORCE == 'true'
        uses: actions/cache/save@v4
        with:
          path: llvm-freebsd-install.tar.zst
          key: ${{ env.LLVM_CACHE_KEY_BSD }}
