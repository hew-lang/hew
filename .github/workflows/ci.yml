name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read
  security-events: write

env:
  # Pinned LLVM upstream release tag, used by hew-codegen-rs (inkwell ->
  # llvm-sys-221) build script. Bumps must be reflected in
  # .github/actions/setup-llvm/action.yml (asset SHA256 pins) too.
  LLVM_VERSION: "22.1.5"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Path change detection — gates Windows/macOS and playground jobs
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      # platform_smoke drives the Windows/macOS build+smoke required checks;
      # platform_full additionally promotes those platform jobs to the full
      # workspace nextest when a change can touch native linking / ABI /
      # toolchain. playground drives the browser WASM job.
      # Build & test (Linux) runs unconditionally on every push/PR.
      platform_smoke: ${{ steps.filter.outputs.platform_smoke }}
      platform_full: ${{ steps.filter.outputs.platform_full }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            # Rule 4 (platform parity, weak set): any Rust change or CI/toolchain
            # change runs the platform build + smoke on Windows/macOS. A Rust change
            # anywhere can change native linking, paths, or process behaviour, so
            # platform build/link coverage stays fail-closed.
            platform_smoke:
              - '**/*.rs'
              - 'tests/**'
              - 'std/**'
              - 'examples/**'
              - 'hew-sandbox-vm/**'
              - 'hew-sandbox-wasm/**'
              - 'hew-runtime-testkit/**'
              - 'hew-testutil/**'
              - 'tools/**'
              - 'xtask/**'
              - '.config/nextest.toml'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.lock'
              - 'Makefile'
              - '.github/workflows/**'
              - '.github/actions/**'
            # Rule 4 (platform parity, strong set): native linking / LLVM / C ABI
            # / runtime scheduling / process / filesystem / networking / codegen
            # paths force the FULL workspace nextest on Windows/macOS (not just
            # smoke). Toolchain/dependency changes also force full, since they can
            # shift the linked surface on any platform. Anything narrower than the
            # smoke set but in this set runs full; everything else runs smoke.
            platform_full:
              - 'hew-runtime/**'
              - 'hew-lib/**'
              - 'hew-cabi/**'
              - 'hew-codegen-rs/**'
              - 'hew-compile/**'
              - 'hew-cli/**'
              - 'adze-cli/**'
              - 'hew-capability-gen/**'
              - 'std/net/**'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.lock'
              - '.github/actions/setup-llvm/**'
              - '.github/actions/setup-msvc/**'
              - '.github/actions/setup-rust-build/**'
              - '.github/workflows/ci.yml'
            playground:
              - 'hew-wasm/**'
              - 'hew-analysis/**'
              - 'hew-parser/**'
              - 'hew-types/**'
              - 'hew-lexer/**'
              - 'hew-lsp/tests/fixtures/**'
              - 'examples/playground/**'
              - 'scripts/gen-playground-manifest.py'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  # ─────────────────────────────────────────────────────────────────────────
  # Lint — fast feedback on code quality (always runs, ~1.5 min)
  # Produces SARIF output for GitHub Code Scanning inline annotations.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Clippy & format
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # fetch-depth: 0 required so origin/main is available for the
          # orchestration-token commit-message scan (--scan-commits range
          # origin/main..HEAD) that runs in the leak-scan step below.
          fetch-depth: 0

      - uses: ./.github/actions/setup-rust-build
        with:
          components: 'clippy, rustfmt'
          cache-shared-key: lint

      # hew-codegen-rs depends on inkwell -> llvm-sys-221, whose build
      # script requires LLVM_SYS_221_PREFIX or llvm-config on PATH for
      # `cargo clippy --workspace --tests` to compile the workspace.
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Format-check std/ and examples/ .hew sources with the in-tree hew
      # formatter. The hew-fmt-check target builds the debug hew binary first;
      # the workspace is already compiled for clippy here, so this is just the
      # final-link cost. Without this, an unformatted .hew file passes CI (which
      # only checks Rust formatting) while failing local `make lint`.
      - name: Check .hew formatting
        run: make hew-fmt-check

      - name: Install SARIF tools
        run: |
          gh release download clippy-sarif-latest --repo psastras/sarif-rs \
            --pattern "clippy-sarif-x86_64-unknown-linux-gnu" --output clippy-sarif --clobber
          gh release download sarif-fmt-latest --repo psastras/sarif-rs \
            --pattern "sarif-fmt-x86_64-unknown-linux-gnu" --output sarif-fmt --clobber
          chmod +x clippy-sarif sarif-fmt
          mv clippy-sarif sarif-fmt /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clippy
        run: |
          set -o pipefail
          cargo clippy --workspace --tests --message-format=json -- -D warnings \
            | clippy-sarif \
            | tee clippy-results.sarif \
            | sarif-fmt

      - name: Verify JIT host ABI classification
        run: make verify-ffi

      - name: Upload Clippy SARIF
        if: always() && hashFiles('clippy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496  # codeql-bundle-v2.25.6 (v4)
        with:
          sarif_file: clippy-results.sarif
          category: clippy
          wait-for-processing: true

      - name: Runtime poison-safe lint
        run: make runtime-poison-safe-lint

      - name: Orchestration-token leak scan
        # Scan tracked source files and commit-message bodies of all PR commits
        # for orchestration tokens (lane IDs, Q-tags, .tmp/ paths).  Placed outside
        # CI-PARITY-STEPS so the preflight↔CI parity assertion is unaffected.
        # origin/main is available because the checkout above uses fetch-depth: 0.
        run: make leak-scan

      - name: Preflight↔CI parity self-test
        # Assert that the dispatcher's fallback lane mirrors the CI build-and-test
        # step list.  A new unconditional CI step not reflected in CI_REQUIRED_CHECKS
        # or CI_BUILD_AND_TEST_STEPS fails here before it can silently skip in local
        # preflights.
        run: scripts/check-preflight-ci-parity.sh

  # ─────────────────────────────────────────────────────────────────────────
  # License gate — enforce the deny.toml allow-list so no copyleft or unknown
  # dep silently enters the shipping graph, and assert THIRD-PARTY-LICENSES is
  # current relative to Cargo.lock. Runs on every push/PR; fast (~30 s).
  # ─────────────────────────────────────────────────────────────────────────
  license-check:
    name: License policy (cargo deny + THIRD-PARTY-LICENSES freshness)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: ./.github/actions/setup-rust-build
        with:
          cache-shared-key: deny

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.6

      - name: Check license policy
        run: cargo deny check licenses

      - name: Check bans and sources
        run: cargo deny check bans sources

      - name: Check security advisories
        run: cargo deny check advisories

      - name: Install cargo-about
        run: cargo install cargo-about --locked --version 0.9.0 --features cli

      - name: Verify THIRD-PARTY-LICENSES is current
        run: scripts/check-licenses-fresh.sh --quiet

  # ─────────────────────────────────────────────────────────────────────────
  # Browser/playground smoke — repo-local browser tooling coverage only.
  # Runs full hew-wasm suite (lib + fixture-coverage integration), checks
  # manifest freshness, and builds the browser WASM artifact.
  # ─────────────────────────────────────────────────────────────────────────
  playground-wasm-build:
    name: Playground WASM build
    needs: changes
    if: needs.changes.outputs.playground == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: ./.github/actions/setup-rust-build
        with:
          cache-shared-key: playground-wasm

      - name: Install wasm-pack v0.13.1
        run: |
          set -euo pipefail
          WASM_PACK_VERSION=0.13.1
          TARBALL="wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/${TARBALL}" \
            -o "/tmp/${TARBALL}"
          tar -xzf "/tmp/${TARBALL}" -C /tmp
          echo "/tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
          /tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack --version

      - name: Check repo-local playground browser/tooling smoke
        run: make playground-check

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — Rust workspace
  # Produces JUnit XML for GitHub Actions test reporting.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & test (Linux)
    runs-on: ubuntu-24.04
    # Was 60. Successful runs on main land at 51-56 min wall time (checked
    # 2026-07-04 across 5 recent green runs), leaving only 4-9 min of
    # headroom against normal runner-to-runner variance -- PRs #2396 and
    # #2397 both got CANCELLED at exactly 60m00-16s. 90 min restores real
    # headroom without masking a genuine regression (see the diagnosis in
    # the commit that introduced this change).
    timeout-minutes: 90
    env:
      # mold is installed by the "Install build tools" step below.
      # Use gcc's -fuse-ld=mold flag (no clang-as-driver dependency) to
      # activate mold for all Rust compilations in this job.  Scoped here
      # rather than .cargo/config.toml so other workflows (release-gate,
      # coverage-nightly, sanitizers) that run on runners without mold are
      # unaffected.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Free runner disk
        # This job installs LLVM 22.1.5 (~1.5 GB), builds the release hew-runtime
        # + hew-lsp binaries, the wasm32-wasip1 runtime, and runs the full debug
        # workspace nextest suite — all on one ubuntu-24.04 runner (~14 GB free).
        # The runner died of ENOSPC twice before this step was added (PR #1994).
        # Code coverage moved to the nightly workflow (c24721fa) so target/llvm-cov-target/
        # no longer accumulates here; the preinstalled-toolchain purge below still
        # recovers the headroom the LLVM download + workspace nextest target/ needs.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift || true
          sudo docker system prune -af >/dev/null 2>&1 || true
          df -h /

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev pkg-config mold

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - uses: ./.github/actions/setup-rust-build
        with:
          tools: nextest
          cache-shared-key: build-test-linux

      - name: Build Rust runtime and frontend (release)
        run: cargo build -p hew-runtime -p hew-lsp --release

      - name: Smoke test hew-lsp
        # Drive the shipped release binary through a real initialize → didOpen →
        # publishDiagnostics session, not just --version. HEW_LSP_BIN points the
        # protocol test at the artifact built above.
        run: |
          ./target/release/hew-lsp --version
          HEW_LSP_BIN="$PWD/target/release/hew-lsp" \
            cargo nextest run -p hew-lsp --test protocol_smoke

      - name: Build WASM runtime
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Install wasmtime
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WASMTIME_TAG="$(gh release view --repo bytecodealliance/wasmtime --json tagName --jq .tagName)"
          WASMTIME_DIR="wasmtime-${WASMTIME_TAG}-x86_64-linux"
          gh release download "$WASMTIME_TAG" --repo bytecodealliance/wasmtime \
            --pattern "${WASMTIME_DIR}.tar.xz" --clobber
          tar -xJf "${WASMTIME_DIR}.tar.xz"
          echo "$PWD/${WASMTIME_DIR}" >> "$GITHUB_PATH"
          "./${WASMTIME_DIR}/wasmtime" --version

      - name: Run WASM runtime actual-target libtests
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime run
        run: cargo test -p hew-runtime --target wasm32-wasip1 --no-default-features --lib

      # Default features include "full" (encryption + profiler + quic),
      # so all 33 QUIC transport tests run without an explicit flag.
      # hew-wasm browser/tooling smoke stays isolated in playground-wasm-build.
      # hew-cabi is excluded — its #[no_mangle] symbols conflict with
      # hew-runtime when both link into a test binary.
      #
      # >>> CI-PARITY-STEPS
      # The steps from here to <<< CI-PARITY-STEPS are the build-and-test gates
      # that scripts/check-preflight-ci-parity.sh asserts are mirrored in the
      # dispatcher's CI_REQUIRED_CHECKS array.  When adding a new unconditional
      # gating step, add it inside this block AND update CI_REQUIRED_CHECKS in
      # scripts/ci-preflight-dispatcher.sh so the local preflight predicts CI.
      # The parity self-test in the lint job parses this block directly — the
      # maintained CI_BUILD_AND_TEST_STEPS list in the parity script is now
      # derived from here instead of a hand-maintained copy.
      - name: Run Rust workspace tests
        # line-tables-only: the release build + wasm build + full debug
        # workspace nextest run together leave the runner disk-marginal
        # (ENOSPC twice on this exact job — see PR #1994). Full debug info
        # is the dominant target/ cost and nothing in CI reads it.
        env:
          CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
          CARGO_INCREMENTAL: "0"
        run: >-  # parity-cmd: make test
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci

      - name: Run vertical-slice end-to-end oracle
        run: make test-vertical-slice

      - name: Run cross-module package-import oracle
        run: make test-pkg-import

      - name: Run fuzz-to-run completeness oracle (ratcheted)
        # Compiles and runs every checker-valid program in the regressions
        # corpus and the vertical-slice accept fixtures.  Known failures are
        # tracked in tests/fuzz-oracle/expected-failures.txt (ratchet contract:
        # unexpected pass OR unexpected fail → exit 1).  Raw cargo-fuzz corpus
        # is excluded from CI (nondeterministic); run locally with
        # `make fuzz-oracle FUZZ_ORACLE_FULL=1`.
        run: make fuzz-oracle

      - name: Run Hew language test suite (ratcheted)
        # Runs tests/hew/ through scripts/hew-suite-ratchet.sh.
        # Known failures are tracked in scripts/hew-suite-expected-failures.txt;
        # any unexpected failure OR unexpected pass (ratchet forward) exits 1.
        # When all entries in the expected-failures file are cleared, this step
        # gates on a fully-green suite with no special handling.
        run: make test-hew-ratchet

      - name: Run -O0-vs-O2 differential-exec parity gate
        # Every compiled `.hew` program must behave identically at -O0 and -O2;
        # a divergence is a miscompile in the LLVM middle-end optimizer pipeline.
        # Runs the Linux/x86_64 portion of the cross-platform parity matrix
        # tracked in #2104; Windows-MSVC and wasm32 remain separate platform gates.
        run: make test-o2-differential

      - name: Run stdlib type-check suite (ratcheted)
        # Type-checks every std/*.hew file through scripts/stdlib-ratchet.sh.
        # Known failures tracked in scripts/stdlib-expected-failures.txt.
        run: make test-stdlib-ratchet

      - name: Run doc-fence typecheck suite (ratcheted)
        # Extracts every ```hew fence from docs/ and runs `hew check` on each.
        # Known failures are tracked in scripts/doc-test-expected-failures.txt;
        # any unexpected failure OR unexpected pass (ratchet forward) exits 1.
        # Skip-annotated fences (<!-- doctest: skip --> or NYI callout) are
        # excluded from the check to allow aspirational spec fences.
        # When the expected-failures list is empty, this gate is fully green.
        run: make test-doc-examples

      - name: Setup Node.js for sandbox parity
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: hew-sandbox-vm/package-lock.json

      - name: Run sandbox VM parity
        run: make sandbox-parity

      - name: Verify checked-MIR golden corpus
        # Re-dumps every examples/v05/checked-mir/*.hew fixture through
        # --dump-mir and byte-diffs against the committed goldens.  A drift
        # here means either the renderer changed without regenerating the
        # corpus (make checked-mir-golden) or a non-determinism bug crept
        # into dump_mir.  The hew binary is already built by this point.
        run: make checked-mir-verify

      - name: Run repo-wide hew check corpus sweep (ratcheted)
        # Runs `hew check` over every tracked .hew file (excluding intentional
        # reject fixtures already covered by test-vertical-slice/test-pkg-import
        # /fuzz-oracle).  Known failures tracked in
        # scripts/hew-corpus-expected-failures.txt; any unexpected failure (new
        # regression) OR unexpected pass (entry fixed — remove it from the list)
        # exits 1.  Catches the migrate-forward-miss class: a symbol rename or
        # type change landed in the compiler but a fixture file silently left
        # behind with the old call-site.
        run: make hew-check-all
      # <<< CI-PARITY-STEPS

      - name: Run hew observe functional harness
        run: make observe-functional-test

      - name: Upload test reports
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results (Linux)

  # Code coverage moved off the per-PR path: it was the flakiest required check
  # (cargo-llvm-cov instrumentation + the duplicated target/llvm-cov-target/
  # tree on top of LLVM install exited 100 / ENOSPC on sound PRs). The real
  # correctness tests run in "Build & test (Linux)"; coverage now runs nightly
  # in .github/workflows/coverage-nightly.yml (same llvm-cov command + report).

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — Windows
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test-windows:
    name: Build & test (Windows)
    needs: changes
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      # platform_smoke gates the whole Windows build+smoke required check;
      # platform_full additionally promotes the test step to the full workspace
      # nextest. Linux owns full correctness on every code change — Windows is a
      # platform build/link/smoke gate, with the full duplicated workspace
      # nextest reserved for platform/toolchain/ABI changes here and the nightly
      # cross-platform matrix.
      RUN_CODE_PATH: ${{ needs.changes.outputs.platform_smoke }}
      RUN_FULL_NEXTEST: ${{ needs.changes.outputs.platform_full }}
      # aws-lc-sys (rustls under hew-runtime, jsonwebtoken under hew-lib) wants
      # NASM on windows-msvc; the documented escape consumes the crate's
      # pregenerated assembly objects, so the test-time hew-lib bootstrap links
      # without a NASM toolchain. (Parity with release-gate.yml / release.yml.)
      AWS_LC_SYS_PREBUILT_NASM: "1"
      # Cap concurrent rustc invocations on the Windows runner to avoid OOM.
      # hew-codegen-rs/llvm.rs (~33k lines) consumes ~2-3 GB of RSS per rustc
      # process under the LLVM backend; with the default job count equal to the
      # runner's CPU count (4), peak concurrent RSS exceeds the runner's 16 GB
      # and the kernel kills rustc (STATUS_STACK_BUFFER_OVERRUN / 0xc0000409).
      # Two concurrent jobs fit comfortably (2 × 3 GB = 6 GB peak for codegen,
      # leaving headroom for the OS, LLVM headers, and the linker pass).
      # Linux and macOS runners have more headroom at their default parallelism
      # and are unaffected. Revisit when hew-codegen-rs/llvm.rs is split into
      # smaller modules, or when the Windows runner gains more memory.
      CARGO_BUILD_JOBS: "2"
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy Windows CI while satisfying the required check."
        shell: pwsh

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: env.RUN_CODE_PATH == 'true'

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: env.RUN_CODE_PATH == 'true'
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - uses: ./.github/actions/setup-rust-build
        if: env.RUN_CODE_PATH == 'true'
        with:
          tools: nextest
          cache-shared-key: build-test-windows

      - name: Build Rust crates
        if: env.RUN_CODE_PATH == 'true'
        # hew-codegen-rs (inkwell -> llvm-sys-221) compiles end-to-end
        # because the upstream LLVM tarball is provisioned above.
        run: cargo build -p adze-cli -p hew-runtime -p hew-lsp -p hew-cli --release

      - name: Run platform smoke tests
        # Default Windows path: prove the platform build links and the
        # platform-sensitive crates pass on windows-msvc, without re-running the
        # whole 9500-test workspace that Linux already owns. The smoke set is the
        # native/ABI/codegen/CLI surface where Windows-specific breakage lives
        # (linking, path separators, process spawning).
        # hew-cabi excluded — its #[no_mangle] symbols conflict with hew-runtime
        # when both link into a test binary.
        if: env.RUN_CODE_PATH == 'true' && env.RUN_FULL_NEXTEST != 'true'
        run: >-
          cargo nextest run
          -p hew-runtime
          -p hew-codegen-rs
          -p hew-compile
          -p hew-cli
          -p hew-lib
          --profile ci

      - name: Run full Rust workspace tests
        # Platform/toolchain/ABI change: run the full workspace nextest on
        # Windows so a native-linking or cross-platform regression is caught
        # per-PR, not only by the nightly matrix.
        # hew-wasm requires wasmtime; hew-cabi has #[no_mangle] symbols that
        # conflict with hew-runtime when both link into a test binary.
        # Default features include "full" (encryption + profiler + quic),
        # so all QUIC transport tests run without an explicit flag.
        if: env.RUN_CODE_PATH == 'true' && env.RUN_FULL_NEXTEST == 'true'
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci

      - name: Upload test reports
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results (Windows)

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — macOS (Apple Silicon)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test-macos:
    name: Build & test (macOS arm64)
    needs: changes
    runs-on: macos-14
    timeout-minutes: 60
    env:
      # platform_smoke gates the whole macOS build+smoke required check;
      # platform_full additionally promotes the test step to the full workspace
      # nextest. Linux owns full correctness; macOS proves the Apple Silicon
      # linker/WASI prerequisites + platform-sensitive crates per-PR, with the
      # full duplicated nextest reserved for platform/toolchain/ABI changes and
      # the nightly cross-platform matrix.
      RUN_CODE_PATH: ${{ needs.changes.outputs.platform_smoke }}
      RUN_FULL_NEXTEST: ${{ needs.changes.outputs.platform_full }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy macOS arm64 CI while satisfying the required check."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: env.RUN_CODE_PATH == 'true'

      - uses: ./.github/actions/setup-rust-build
        if: env.RUN_CODE_PATH == 'true'
        with:
          targets: 'aarch64-apple-darwin, x86_64-apple-darwin'
          tools: nextest
          cache-shared-key: build-test-macos

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: env.RUN_CODE_PATH == 'true'
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Set macOS deployment target
        if: env.RUN_CODE_PATH == 'true'
        run: echo "MACOSX_DEPLOYMENT_TARGET=13.0" >> "$GITHUB_ENV"

      - name: Build libhew.a (runtime + stdlib)
        if: env.RUN_CODE_PATH == 'true'
        run: |
          cargo build -p hew-lib --release
          cargo build -p hew-lib

      - name: Build frontend (release)
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-cli --release

      - name: Install WASI runner prerequisites
        if: env.RUN_CODE_PATH == 'true'
        run: |
          rustup target add wasm32-wasip1
          brew install wasmtime
          wasmtime --version
          command -v wasm-ld
          wasm-ld --version

      - name: Build hew-runtime for wasm32-wasip1 (release)
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Build hew-runtime for wasm32-wasip1 (debug)
        # The platform smoke tests run as debug binaries (cargo nextest run, no
        # --release). bootstrap_wasi_runner in support/mod.rs derives the build
        # profile from the test binary path and looks for the same profile's
        # libhew_runtime.a before falling back to an on-demand build. Without
        # this step the debug staticlib is absent at test startup, causing
        # multiple parallel test processes to each launch `cargo build` for it
        # concurrently — Cargo writes the archive non-atomically, so races
        # corrupt or transiently delete the file and wasm-ld then fails with
        # "cannot open .../wasm32-wasip1/debug/libhew_runtime.a".
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features

      - name: Build hew-std for wasm32-wasip1 (debug)
        # Pre-build the stdlib WASI archive for the same reason: bootstrap_wasi_runner
        # builds libhew_std.a on demand if absent, same concurrent-write race applies.
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-std --target wasm32-wasip1

      - name: Run platform smoke tests
        # Default macOS path: prove the Apple Silicon build links and the
        # platform-sensitive crates pass, without re-running the whole
        # 9500-test workspace that Linux already owns. The smoke set is the
        # native/ABI/codegen/CLI surface where macOS-specific breakage lives
        # (linker, dylib, WASI prereqs, process spawning).
        # hew-cabi excluded — its #[no_mangle] symbols conflict with hew-runtime
        # when both link into a test binary.
        if: env.RUN_CODE_PATH == 'true' && env.RUN_FULL_NEXTEST != 'true'
        run: >-
          cargo nextest run
          -p hew-runtime
          -p hew-codegen-rs
          -p hew-compile
          -p hew-cli
          -p hew-lib
          --profile ci
          -E 'not binary(~oracle) - test(~coro_substrate_leak)'

      - name: Run full Rust workspace tests
        # Platform/toolchain/ABI change: run the full workspace nextest on
        # macOS so a native-linking or cross-platform regression is caught
        # per-PR, not only by the nightly matrix.
        # hew-cabi has #[no_mangle] symbols that conflict with hew-runtime
        # when both link into a test binary.
        #
        # Skip the leak-slope oracles AND the coro substrate-leak exec test on
        # the 3-core macos-14 runner. Both compile/run Hew programs through LLVM
        # at test time and measure RSS/leak behaviour over loops; on 3 cores
        # under the subprocess-intensive group's parallelism they exceed the ci
        # profile's exec budget (coro_substrate_leak_clean_native ran >480s and
        # was terminated) and slope/leak measurement is timing-sensitive on a
        # noisy cloud runner. The Linux job runs the full oracle + coro-leak set
        # on its faster runner, so leak coverage is not lost.
        if: env.RUN_CODE_PATH == 'true' && env.RUN_FULL_NEXTEST == 'true'
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci
          -E 'not binary(~oracle) - test(~coro_substrate_leak)'
