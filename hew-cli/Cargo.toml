[package]
name = "hew-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "The Hew programming language compiler"
build = "build.rs"
readme = "README.md"
repository = "https://github.com/hew-lang/hew"
keywords = ["hew", "compiler", "programming-language"]
categories = ["compilers", "command-line-utilities"]

[[bin]]
name = "hew"
path = "src/main.rs"

[dependencies]
hew-compile = { path = "../hew-compile" }
hew-lexer = { path = "../hew-lexer" }
hew-parser = { path = "../hew-parser" }
hew-types = { path = "../hew-types" }
hew-serialize = { path = "../hew-serialize" }
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
pulldown-cmark = "0.13"
rustyline = "17"
tempfile = "3"
toml = "1"
serde.workspace = true
serde_json.workspace = true
notify = "8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
fd-lock = "4"
object = "0.37"

[lints]
workspace = true
