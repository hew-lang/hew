name: Nightly Sanitizers

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime ASan — memory safety for the actor runtime
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-asan:
    name: Rust runtime ASan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install llvm-symbolizer (${{ env.LLVM_VERSION }})
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-${{ env.LLVM_VERSION }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-runtime-asan/
          key: runtime-asan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-asan-${{ runner.os }}-

      - name: Run hew-runtime ASan tests
        env:
          CARGO_TARGET_DIR: target/sanitizer-runtime-asan
          RUSTFLAGS: -Zsanitizer=address -Cforce-frame-pointers=yes
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/hew-runtime/lsan.supp
          ASAN_SYMBOLIZER_PATH: /usr/lib/llvm-${{ env.LLVM_VERSION }}/bin/llvm-symbolizer
        run: |
          # Nightly Rust supports ASan for this target.
          cargo +nightly test --target x86_64-unknown-linux-gnu -p hew-runtime --lib

  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime TSan — data-race detection for the actor runtime
  #
  # Scope: core concurrency primitives (reply-channel, mailbox, scheduler).
  # Optional features (tokio, quinn, profiler) are excluded to avoid async-
  # runtime instrumentation noise and keep the job focused and fast.
  #
  # continue-on-error: upstream Rust/Cargo build-std + TSan link failures
  # have no clean repo-side fix as of 2026-04 (duplicate lang items, panic-
  # strategy mismatch).  Kept for signal; does not gate releases.
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-tsan:
    name: Rust runtime TSan (advisory)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-runtime-tsan/
          key: runtime-tsan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-tsan-${{ runner.os }}-

      - name: Run hew-runtime TSan tests
        env:
          CARGO_TARGET_DIR: target/sanitizer-runtime-tsan
          RUSTFLAGS: -Zsanitizer=thread -Cforce-frame-pointers=yes
          # halt_on_error=1 surfaces races immediately rather than summarising
          # them at process exit, which makes CI output easier to triage.
          TSAN_OPTIONS: halt_on_error=1
        run: |
          # --no-default-features excludes the tokio/quinn/profiler optional
          # features; the core runtime concurrency primitives (reply-channel,
          # mailbox, scheduler) are exercised by the lib tests without them.
          # --test-threads=1 avoids two TSan-specific pitfalls: (a) the ~20x
          # slowdown makes timing-sensitive timer tests unreliable under
          # parallel load; (b) single-threaded ensures TSan race reports are
          # isolated to the test that triggered them, not cross-test noise.
          cargo +nightly test \
            --target x86_64-unknown-linux-gnu \
            -p hew-runtime \
            --no-default-features \
            --lib \
            -- --test-threads=1
