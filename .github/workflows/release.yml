# Release workflow — builds the Hew compiler for multiple platforms and creates
# a GitHub Release with signed/notarized binaries and checksums.
#
# Triggers on tag push matching `v*` (e.g. v0.1.0).
#
# Artifacts per platform:
#   bin/hew           — compiler driver (with embedded MLIR codegen)
#   bin/adze          — package manager
#   bin/hew-lsp       — Language Server Protocol server
#   lib/libhew.a      — combined runtime + stdlib static library
#   std/              — standard library sources
#   completions/      — shell completions (bash, zsh, fish), generated at build time
#
# Required secrets for macOS code signing/notarization on tag releases
# (workflow_dispatch can still be used for unsigned dry runs):
#   APPLE_CERTIFICATE_P12       — Base64-encoded .p12 signing certificate
#   APPLE_CERTIFICATE_PASSWORD  — Password for the .p12 file
#   APPLE_API_KEY_P8            — App Store Connect API private key (.p8 contents)
#   APPLE_API_KEY_ID            — App Store Connect API key ID
#   APPLE_API_ISSUER_ID         — App Store Connect API issuer ID
#
# Required secrets for Homebrew tap updates (optional — skipped if absent):
#   HOMEBREW_TAP_TOKEN           — GitHub PAT with actions:write scope for hew-lang/homebrew-hew
#
# Required secrets for VS Code extension publishing (optional — skipped if absent):
#   VSCE_PAT                     — VS Code Marketplace Personal Access Token

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  LLVM_VERSION: "22"
  # Resolve tag from push event or manual dispatch input
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build — macOS and Windows release artifacts
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-aarch64
            os: macos-15
            rust_target: aarch64-apple-darwin
          - target: darwin-x86_64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
          - target: windows-x86_64
            os: windows-2022
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    # Windows MLIR builds can be flaky — don't block the release
    continue-on-error: ${{ startsWith(matrix.target, 'windows') }}
    # 180 min to accommodate first-run LLVM build from source on Windows (~90-120 min)
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      # ── LLVM/MLIR installation ──────────────────────────────────────────

      - name: Install LLVM/MLIR (macOS)
        if: startsWith(matrix.target, 'darwin')
        run: |
          brew install llvm@${{ env.LLVM_VERSION }} ninja zstd
          # Expose the brew LLVM prefix and binaries for later steps
          LLVM_PREFIX="$(brew --prefix llvm@${{ env.LLVM_VERSION }})"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Configure embedded codegen toolchain (macOS)
        if: startsWith(matrix.target, 'darwin')
        run: |
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=13.0" >> "$GITHUB_ENV"

      - name: Install build tools (Windows)
        if: startsWith(matrix.target, 'windows')
        run: choco install ninja cmake -y
        shell: pwsh

      - name: Setup MSVC environment (Windows)
        if: startsWith(matrix.target, 'windows')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore LLVM+MLIR cache (Windows)
        if: startsWith(matrix.target, 'windows')
        id: cache-llvm-windows
        uses: actions/cache/restore@v4
        with:
          path: C:\llvm-22
          key: llvm-clang-mlir-22.1.0-win64-msvc-archive-v1

      - name: Install LLVM+MLIR archive (Windows)
        if: startsWith(matrix.target, 'windows') && steps.cache-llvm-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $archive = "clang+llvm-22.1.0-x86_64-pc-windows-msvc.tar.xz"
          $bundle = "${archive}.jsonl"
          $base = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0"

          curl.exe -L --retry 5 --retry-delay 5 `
            -o $archive `
            "$base/clang%2Bllvm-22.1.0-x86_64-pc-windows-msvc.tar.xz"
          curl.exe -L --retry 5 --retry-delay 5 `
            -o $bundle `
            "$base/clang%2Bllvm-22.1.0-x86_64-pc-windows-msvc.tar.xz.jsonl"
          gh attestation verify --repo llvm/llvm-project $archive --bundle $bundle

          New-Item -ItemType Directory -Force C:\llvm-extract | Out-Null
          tar -xf $archive -C C:\llvm-extract
          $root = Get-ChildItem C:\llvm-extract -Directory | Select-Object -First 1
          Move-Item $root.FullName C:\llvm-22

          if (!(Test-Path C:\llvm-22\bin\clang.exe)) {
            throw "LLVM archive did not provide clang.exe"
          }
          if (!(Test-Path C:\llvm-22\lib\cmake\llvm\LLVMConfig.cmake)) {
            throw "LLVM archive did not provide LLVMConfig.cmake"
          }
          if (!(Test-Path C:\llvm-22\lib\cmake\mlir\MLIRConfig.cmake)) {
            throw "LLVM archive did not provide MLIRConfig.cmake"
          }

          Remove-Item -Recurse -Force C:\llvm-extract
          Remove-Item -Force $archive, $bundle

      - name: Save LLVM+MLIR cache (Windows)
        if: startsWith(matrix.target, 'windows') && steps.cache-llvm-windows.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\llvm-22
          key: llvm-clang-mlir-22.1.0-win64-msvc-archive-v1

      - name: Configure embedded codegen toolchain (Windows)
        if: startsWith(matrix.target, 'windows')
        run: |
          echo "LLVM_PREFIX=C:\llvm-22" >> $env:GITHUB_ENV
          echo "C:\llvm-22\bin" >> $env:GITHUB_PATH
          echo "CC=cl" >> $env:GITHUB_ENV
          echo "CXX=cl" >> $env:GITHUB_ENV
        shell: pwsh

      # ── Rust toolchain ──────────────────────────────────────────────────

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust artifacts (Darwin)
        if: startsWith(matrix.target, 'darwin')
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ matrix.target }}-cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-cargo-${{ matrix.os }}-

      - name: Cache Rust artifacts
        if: ${{ !startsWith(matrix.target, 'darwin') }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-cargo-

      # ── Rust builds ─────────────────────────────────────────────────────

      - name: Build hew, adze, and hew-lsp
        env:
          HEW_EMBED_STATIC: "1"
        run: cargo build -p hew-cli -p adze-cli -p hew-lsp --release --target ${{ matrix.rust_target }}

      - name: Build libhew.a (runtime + stdlib)
        run: cargo build -p hew-lib --release --target ${{ matrix.rust_target }}

      - name: Smoke test hew-lsp (Unix)
        if: "!startsWith(matrix.target, 'windows')"
        run: |
          ./target/${{ matrix.rust_target }}/release/hew-lsp --version

      - name: Smoke test hew-lsp (Windows)
        if: startsWith(matrix.target, 'windows')
        run: ./target/${{ matrix.rust_target }}/release/hew-lsp.exe --version

      # ── Package archive ─────────────────────────────────────────────────

      - name: Package archive (Unix)
        if: "!startsWith(matrix.target, 'windows')"
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCHIVE_NAME="hew-v${VERSION}-${{ matrix.target }}"
          RELEASE_DIR="target/${{ matrix.rust_target }}/release"

          mkdir -p "${ARCHIVE_NAME}/bin" "${ARCHIVE_NAME}/lib" \
                   "${ARCHIVE_NAME}/std" "${ARCHIVE_NAME}/completions"

          # Binaries
          cp "target/${{ matrix.rust_target }}/release/hew"           "${ARCHIVE_NAME}/bin/"
          cp "target/${{ matrix.rust_target }}/release/adze"          "${ARCHIVE_NAME}/bin/"
          cp "target/${{ matrix.rust_target }}/release/hew-lsp"          "${ARCHIVE_NAME}/bin/"
          chmod +x "${ARCHIVE_NAME}/bin/"*

          # Combined runtime + stdlib library (flat path — universal fallback)
          cp "${RELEASE_DIR}/libhew.a" "${ARCHIVE_NAME}/lib/"

          # Target-specific lib subtree so find_hew_lib() prefers lib/<triple>/
          # on installed native targets before falling back to the flat path.
          mkdir -p "${ARCHIVE_NAME}/lib/${{ matrix.rust_target }}"
          cp "${RELEASE_DIR}/libhew.a" "${ARCHIVE_NAME}/lib/${{ matrix.rust_target }}/"

          # Standard library sources (all .hew files, including subdirectories)
          cp -r std/. "${ARCHIVE_NAME}/std/"

          # Generate shell completions from built binaries
          for shell in bash zsh fish; do
            "${ARCHIVE_NAME}/bin/hew" completions "${shell}" > "${ARCHIVE_NAME}/completions/hew.${shell}"
            "${ARCHIVE_NAME}/bin/adze" completions "${shell}" > "${ARCHIVE_NAME}/completions/adze.${shell}"
          done

          # Licenses and docs
          cp LICENSE-MIT LICENSE-APACHE NOTICE README.md "${ARCHIVE_NAME}/"

          # Strip packaged binaries when present; missing artifacts are expected
          # for targets that do not build every binary, but strip failures on
          # existing files must still fail the job.
          for b in hew adze hew-lsp; do
            bin="${ARCHIVE_NAME}/bin/${b}"
            if [[ -f "${bin}" ]]; then
              strip "${bin}"
            fi
          done

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Verify macOS binaries have no non-system dynamic dependencies
        if: startsWith(matrix.target, 'darwin')
        run: |
          for bin in "${ARCHIVE_NAME}"/bin/*; do
            scripts/verify-macos-binary.sh "${bin}"
          done

      - name: Package archive (Windows)
        if: startsWith(matrix.target, 'windows')
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          $ArchiveName = "hew-v${Version}-${{ matrix.target }}"
          $ReleaseDir = "target/${{ matrix.rust_target }}/release"

          New-Item -ItemType Directory -Path "${ArchiveName}/bin", "${ArchiveName}/lib", "${ArchiveName}/std", "${ArchiveName}/completions" -Force | Out-Null

          Copy-Item "target/${{ matrix.rust_target }}/release/hew.exe"          "${ArchiveName}/bin/"
          Copy-Item "target/${{ matrix.rust_target }}/release/adze.exe"         "${ArchiveName}/bin/"
          Copy-Item "target/${{ matrix.rust_target }}/release/hew-lsp.exe"            "${ArchiveName}/bin/"
          Copy-Item "${ReleaseDir}/hew.lib"                                      "${ArchiveName}/lib/"

          # Standard library sources (all .hew files, including subdirectories)
          Copy-Item "std" "${ArchiveName}/std" -Recurse

          # Generate shell completions from built binaries
          foreach ($shell in @("bash", "zsh", "fish", "powershell")) {
            & "${ArchiveName}/bin/hew.exe" completions $shell | Out-File -Encoding utf8NoBOM "${ArchiveName}/completions/hew.${shell}"
            & "${ArchiveName}/bin/adze.exe" completions $shell | Out-File -Encoding utf8NoBOM "${ArchiveName}/completions/adze.${shell}"
          }

          # Licenses
          Copy-Item "LICENSE-MIT" "${ArchiveName}/"
          Copy-Item "LICENSE-APACHE" "${ArchiveName}/"
          Copy-Item "NOTICE" "${ArchiveName}/"
          Copy-Item "README.md" "${ArchiveName}/"

          echo "ARCHIVE_NAME=${ArchiveName}" >> $env:GITHUB_ENV
        shell: pwsh

      # ── macOS code signing & notarization ───────────────────────────────

      - name: Validate macOS signing secrets (tag releases)
        if: startsWith(matrix.target, 'darwin') && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          missing=0
          for secret_name in \
            APPLE_CERTIFICATE_P12 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_API_KEY_P8 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::${secret_name} secret is required for macOS tag releases"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Code sign binaries (macOS)
        if: startsWith(matrix.target, 'darwin') && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Import signing certificate into a temporary keychain
          echo "${APPLE_CERTIFICATE_P12}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          # Find the Developer ID Application identity from the imported cert
          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')

          if [ -z "${IDENTITY}" ]; then
            echo "::error::No Developer ID Application certificate found in keychain"
            exit 1
          fi
          echo "Signing with identity: ${IDENTITY}"

          # Sign each binary with hardened runtime and secure timestamp
          for bin in hew adze hew-lsp; do
            codesign --force --options runtime --timestamp \
              --sign "${IDENTITY}" "${ARCHIVE_NAME}/bin/${bin}"
          done

          # Verify signatures
          for bin in hew adze hew-lsp; do
            codesign --verify --verbose "${ARCHIVE_NAME}/bin/${bin}"
          done

          rm -f certificate.p12

      - name: Notarize archive (macOS)
        if: startsWith(matrix.target, 'darwin') && env.APPLE_CERTIFICATE_P12 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_API_KEY_P8 != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER_ID != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # Write the API key (base64-encoded in secret) to disk
          mkdir -p ~/private_keys
          echo "${APPLE_API_KEY_P8}" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          ditto -c -k --keepParent "${ARCHIVE_NAME}" "${ARCHIVE_NAME}-notarize.zip"
          xcrun notarytool submit "${ARCHIVE_NAME}-notarize.zip" \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait
          rm -f "${ARCHIVE_NAME}-notarize.zip"
          rm -rf ~/private_keys

      # ── Create final archive ────────────────────────────────────────────

      - name: Create tar.gz (Unix)
        if: "!startsWith(matrix.target, 'windows')"
        run: tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Smoke test packaged archive (Unix)
        if: "!startsWith(matrix.target, 'windows')"
        run: |
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "${smoke_root}"' EXIT

          cat > "${smoke_root}/pkg-smoke.hew" <<'HEWEOF'
          fn main() {
              println("pkg-smoke-ok")
          }
          HEWEOF

          staging="${smoke_root}/staging"
          mkdir -p "${staging}"
          tar -xf "${ARCHIVE_NAME}.tar.gz" -C "${staging}" --strip-components=1

          output=$(HEW_STD="${staging}/std" "${staging}/bin/hew" run "${smoke_root}/pkg-smoke.hew")
          echo "${output}"
          echo "${output}" | grep -q "pkg-smoke-ok"

      - name: Create zip (Windows)
        if: startsWith(matrix.target, 'windows')
        run: Compress-Archive -Path "${env:ARCHIVE_NAME}" -DestinationPath "${env:ARCHIVE_NAME}.zip"
        shell: pwsh

      - name: Smoke test packaged archive (Windows)
        if: startsWith(matrix.target, 'windows')
        run: |
          $SmokeRoot = Join-Path $PWD "pkg-smoke"
          Remove-Item -Recurse -Force $SmokeRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $SmokeRoot | Out-Null

          $SmokeFile = Join-Path $SmokeRoot "pkg-smoke.hew"
          Set-Content -Path $SmokeFile -Encoding utf8NoBOM -Value @'
          fn main() {
              println("pkg-smoke-ok")
          }
          '@

          Expand-Archive -Path "${env:ARCHIVE_NAME}.zip" -DestinationPath $SmokeRoot -Force
          $Staging = Join-Path $SmokeRoot "${env:ARCHIVE_NAME}"
          $env:HEW_STD = Join-Path $Staging "std"

          $Output = & (Join-Path $Staging "bin/hew.exe") run $SmokeFile | Out-String
          $Output = $Output.Trim()
          Write-Host $Output
          if ($Output -notmatch "pkg-smoke-ok") {
            throw "Packaged archive smoke output did not contain pkg-smoke-ok"
          }
        shell: pwsh

      # ── Upload artifact ─────────────────────────────────────────────────

      - name: Upload artifact (Unix)
        if: "!startsWith(matrix.target, 'windows')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.tar.gz

      - name: Upload artifact (Windows)
        if: startsWith(matrix.target, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.zip

      - name: Upload hew-lsp standalone (Unix)
        if: "!startsWith(matrix.target, 'windows')"
        uses: actions/upload-artifact@v4
        with:
          name: hew-lsp-${{ matrix.target }}
          path: target/${{ matrix.rust_target }}/release/hew-lsp

      - name: Upload hew-lsp standalone (Windows)
        if: startsWith(matrix.target, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: hew-lsp-${{ matrix.target }}
          path: target/${{ matrix.rust_target }}/release/hew-lsp.exe

  # ─────────────────────────────────────────────────────────────────────────
  # Linux build — glibc baseline artifacts built inside Ubuntu 22.04
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - target: linux-aarch64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    container: ubuntu:22.04
    timeout-minutes: 180

    steps:
      - name: Install baseline build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential ca-certificates cmake curl git gnupg lsb-release \
            ninja-build pkg-config wget xz-utils \
            libssl-dev zlib1g-dev libzstd-dev

          mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${{ env.LLVM_VERSION }} main" \
            > /etc/apt/sources.list.d/llvm.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            llvm-${{ env.LLVM_VERSION }}-dev \
            libmlir-${{ env.LLVM_VERSION }}-dev \
            mlir-${{ env.LLVM_VERSION }}-tools \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Configure embedded codegen toolchain
        run: |
          {
            echo "LLVM_PREFIX=/usr/lib/llvm-${{ env.LLVM_VERSION }}"
            echo "CC=clang-${{ env.LLVM_VERSION }}"
            echo "CXX=clang++-${{ env.LLVM_VERSION }}"
          } >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ matrix.target }}-jammy-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-jammy-cargo-

      - name: Build hew, adze, and hew-lsp
        env:
          HEW_EMBED_STATIC: "1"
        run: cargo build -p hew-cli -p adze-cli -p hew-lsp --release --target ${{ matrix.rust_target }}

      - name: Build libhew.a (runtime + stdlib)
        run: cargo build -p hew-lib --release --target ${{ matrix.rust_target }}

      - name: Verify Linux binaries
        run: |
          ldd --version 2>&1 | sed -n "1p"
          "target/${{ matrix.rust_target }}/release/hew" --version
          "target/${{ matrix.rust_target }}/release/adze" --version
          "target/${{ matrix.rust_target }}/release/hew-lsp" --version
          test -f "target/${{ matrix.rust_target }}/release/libhew.a"

          if ldd "target/${{ matrix.rust_target }}/release/hew" | grep -Eqi 'llvm|mlir'; then
            echo "::error::Linux release binary dynamically links LLVM/MLIR"
            exit 1
          fi

      - name: Package archive
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCHIVE_NAME="hew-v${VERSION}-${{ matrix.target }}"
          RELEASE_DIR="target/${{ matrix.rust_target }}/release"

          mkdir -p "${ARCHIVE_NAME}/bin" "${ARCHIVE_NAME}/lib" \
                   "${ARCHIVE_NAME}/std" "${ARCHIVE_NAME}/completions"

          cp "${RELEASE_DIR}/hew" "${ARCHIVE_NAME}/bin/"
          cp "${RELEASE_DIR}/adze" "${ARCHIVE_NAME}/bin/"
          cp "${RELEASE_DIR}/hew-lsp" "${ARCHIVE_NAME}/bin/"
          chmod +x "${ARCHIVE_NAME}/bin/"*

          cp "${RELEASE_DIR}/libhew.a" "${ARCHIVE_NAME}/lib/"
          mkdir -p "${ARCHIVE_NAME}/lib/${{ matrix.rust_target }}"
          cp "${RELEASE_DIR}/libhew.a" "${ARCHIVE_NAME}/lib/${{ matrix.rust_target }}/"

          cp -r std/. "${ARCHIVE_NAME}/std/"

          for shell in bash zsh fish; do
            "${ARCHIVE_NAME}/bin/hew" completions "${shell}" > "${ARCHIVE_NAME}/completions/hew.${shell}"
            "${ARCHIVE_NAME}/bin/adze" completions "${shell}" > "${ARCHIVE_NAME}/completions/adze.${shell}"
          done

          cp LICENSE-MIT LICENSE-APACHE NOTICE README.md "${ARCHIVE_NAME}/"

          for b in hew adze hew-lsp; do
            strip "${ARCHIVE_NAME}/bin/${b}"
          done

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Create tar.gz
        run: tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Smoke test packaged archive
        run: |
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "${smoke_root}"' EXIT

          cat > "${smoke_root}/pkg-smoke.hew" <<'HEWEOF'
          fn main() {
              println("pkg-smoke-ok")
          }
          HEWEOF

          staging="${smoke_root}/staging"
          mkdir -p "${staging}"
          tar -xf "${ARCHIVE_NAME}.tar.gz" -C "${staging}" --strip-components=1

          output=$(env -i PATH=/usr/bin:/bin HOME="${HOME}" HEW_STD="${staging}/std" "${staging}/bin/hew" run "${smoke_root}/pkg-smoke.hew")
          echo "${output}"
          echo "${output}" | grep -q "pkg-smoke-ok"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.tar.gz

      - name: Upload hew-lsp standalone
        uses: actions/upload-artifact@v4
        with:
          name: hew-lsp-${{ matrix.target }}
          path: target/${{ matrix.rust_target }}/release/hew-lsp

  # ─────────────────────────────────────────────────────────────────────────
  # FreeBSD build — x86_64 via QEMU VM (tier-2, continue-on-error)
  # ─────────────────────────────────────────────────────────────────────────
  build-freebsd:
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Compute archive name
        id: archive
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "name=hew-v${VERSION}-freebsd-x86_64" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM+MLIR cache (FreeBSD)
        id: cache-llvm-freebsd
        uses: actions/cache/restore@v4
        with:
          path: llvm-freebsd-install.tar.zst
          key: llvm-mlir-22.1.0-freebsd15-amd64-v1

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          mem: 8192
          prepare: |
            pkg install -y rust cmake ninja git pkgconf libffi

          run: |
            set -eux

            # ── LLVM/MLIR ──────────────────────────────────────────────────
            LLVM_PREFIX=/usr/local/llvm22-src
            if [ -f llvm-freebsd-install.tar.zst ]; then
              echo "==> Restoring LLVM from cache"
              zstd -d llvm-freebsd-install.tar.zst -o llvm-freebsd-install.tar
              tar xf llvm-freebsd-install.tar -C /
              rm -f llvm-freebsd-install.tar
            else
              echo "==> Building LLVM 22 from source (this will take ~40 min)"
              git clone --depth 1 --branch llvmorg-22.1.0 \
                --filter=blob:none --sparse \
                https://github.com/llvm/llvm-project.git /tmp/llvm-src
              (cd /tmp/llvm-src && git sparse-checkout set llvm mlir cmake third-party)

              cmake -S /tmp/llvm-src/llvm -B /tmp/llvm-build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${LLVM_PREFIX}" \
                -DLLVM_ENABLE_PROJECTS="mlir" \
                -DLLVM_TARGETS_TO_BUILD="X86" \
                -DLLVM_BUILD_TOOLS=ON \
                -DLLVM_BUILD_UTILS=ON \
                -DLLVM_INSTALL_UTILS=ON \
                -DLLVM_INCLUDE_TESTS=OFF \
                -DLLVM_INCLUDE_BENCHMARKS=OFF \
                -DLLVM_INCLUDE_EXAMPLES=OFF \
                -DLLVM_INCLUDE_DOCS=OFF \
                -DLLVM_ENABLE_BINDINGS=OFF \
                -DLLVM_ENABLE_ZLIB=ON \
                -DLLVM_ENABLE_ZSTD=OFF \
                -DLLVM_BUILD_LLVM_DYLIB=OFF \
                -DBUILD_SHARED_LIBS=OFF \
                -DMLIR_BUILD_MLIR_C_DYLIB=OFF \
                -DMLIR_ENABLE_BINDINGS_PYTHON=OFF

              cmake --build /tmp/llvm-build -j$(sysctl -n hw.ncpu)
              cmake --install /tmp/llvm-build

              # Create archive for caching
              tar cf llvm-freebsd-install.tar "${LLVM_PREFIX}"
              zstd -T0 llvm-freebsd-install.tar -o llvm-freebsd-install.tar.zst
              rm -f llvm-freebsd-install.tar

              # Clean up build dirs
              rm -rf /tmp/llvm-src /tmp/llvm-build
            fi

            # ── Rust builds (release) ──────────────────────────────────────
            HEW_EMBED_STATIC=1 cargo build -p hew-cli -p adze-cli -p hew-lsp -p hew-serialize --release
            cargo build -p hew-lib --release

            # ── Package archive ────────────────────────────────────────────
            ARCHIVE_NAME="${{ steps.archive.outputs.name }}"

            mkdir -p "${ARCHIVE_NAME}/bin" "${ARCHIVE_NAME}/lib" \
                     "${ARCHIVE_NAME}/std" "${ARCHIVE_NAME}/completions"

            # Binaries
            cp target/release/hew           "${ARCHIVE_NAME}/bin/"
            cp target/release/adze          "${ARCHIVE_NAME}/bin/"
            cp target/release/hew-lsp       "${ARCHIVE_NAME}/bin/"
            chmod +x "${ARCHIVE_NAME}/bin/"*

            # Combined runtime + stdlib library
            cp target/release/libhew.a "${ARCHIVE_NAME}/lib/"

            # Standard library sources (all .hew files, including subdirectories)
            cp -r std/. "${ARCHIVE_NAME}/std/"

            # Generate shell completions from built binaries
            for shell in bash zsh fish; do
              "${ARCHIVE_NAME}/bin/hew" completions "${shell}" > "${ARCHIVE_NAME}/completions/hew.${shell}"
              "${ARCHIVE_NAME}/bin/adze" completions "${shell}" > "${ARCHIVE_NAME}/completions/adze.${shell}"
            done

            # Licenses and docs
            cp LICENSE-MIT LICENSE-APACHE NOTICE README.md "${ARCHIVE_NAME}/"

            # Strip packaged binaries when present; missing artifacts are expected
            # for targets that do not build every binary, but strip failures on
            # existing files must still fail the job.
            for b in hew adze hew-lsp; do
              bin="${ARCHIVE_NAME}/bin/${b}"
              if [[ -f "${bin}" ]]; then
                strip "${bin}"
              fi
            done

            tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

            echo "==> Package-layout smoke test"
            smoke_root=$(mktemp -d)
            trap 'rm -rf "${smoke_root}"' EXIT

            cat > "${smoke_root}/pkg-smoke.hew" <<'HEWEOF'
            fn main() {
                println("pkg-smoke-ok")
            }
            HEWEOF

            mkdir -p "${smoke_root}/staging"
            tar -xf "${ARCHIVE_NAME}.tar.gz" -C "${smoke_root}/staging" --strip-components=1

            output=$(HEW_STD="${smoke_root}/staging/std" "${smoke_root}/staging/bin/hew" run "${smoke_root}/pkg-smoke.hew")
            echo "${output}"
            echo "${output}" | grep -q "pkg-smoke-ok"

      - name: Save LLVM+MLIR cache (FreeBSD)
        if: steps.cache-llvm-freebsd.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: llvm-freebsd-install.tar.zst
          key: llvm-mlir-22.1.0-freebsd15-amd64-v1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.name }}.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # Linux packages — build .deb, .rpm, .pkg.tar.zst from glibc tarballs
  # ─────────────────────────────────────────────────────────────────────────
  linux-packages:
    needs: build-linux
    if: ${{ !cancelled() && needs.build-linux.result != 'failure' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-24.04
            artifact_pattern: "hew-v*-linux-x86_64"
          - arch: aarch64
            os: ubuntu-24.04-arm
            artifact_pattern: "hew-v*-linux-aarch64"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.artifact_pattern }}
          path: dist/
          merge-multiple: true

      - name: Build Linux packages
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Arch Linux Docker image only supports x86_64
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            FORMATS="debian,rpm"
          else
            FORMATS="debian,rpm,arch"
          fi
          installers/build-packages.sh \
            --version "${VERSION}" \
            --arch "${{ matrix.arch }}" \
            --skip-build \
            --only "${FORMATS}"

      - name: Smoke test Linux packages in Docker
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Arch Linux Docker image only supports x86_64
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            FORMATS="debian,rpm"
          else
            FORMATS="debian,rpm,arch"
          fi
          installers/docker/test-all-packages.sh \
            --version "${VERSION}" \
            --arch "${{ matrix.arch }}" \
            --skip-build \
            --only "${FORMATS}"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst

  # ─────────────────────────────────────────────────────────────────────────
  # Alpine package — musl-native build (separate from glibc Linux packages)
  # ─────────────────────────────────────────────────────────────────────────
  alpine-package:
    needs: build
    if: ${{ !cancelled() && needs.build.result != 'failure' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-24.04
            rust_musl_target: x86_64-unknown-linux-musl
          - arch: aarch64
            os: ubuntu-24.04-arm
            rust_musl_target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_musl_target }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use the pre-built LLVM+MLIR from the Alpine Docker image (musl-based).
      # Ubuntu's glibc LLVM causes linker errors when targeting musl.
      - name: Pull pre-built LLVM+MLIR for Alpine (musl)
        run: |
          docker pull ghcr.io/hew-lang/llvm-alpine:22
          container_id=$(docker create ghcr.io/hew-lang/llvm-alpine:22)
          sudo docker cp "${container_id}:/opt/llvm-22" /opt/llvm-22
          docker rm "${container_id}"

      - name: Install musl cross-compiler and build tools
        run: |
          sudo apt-get update && sudo apt-get install -y \
            musl-tools cmake ninja-build clang

      - name: Configure LLVM toolchain (musl)
        run: |
          echo "LLVM_PREFIX=/opt/llvm-22" >> "$GITHUB_ENV"
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Cache Rust artifacts (musl)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: alpine-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            alpine-${{ matrix.arch }}-cargo-

      - name: Build musl Rust binaries
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          HEW_EMBED_STATIC: "1"
        run: |
          cargo build --release --target ${{ matrix.rust_musl_target }} \
            -p hew-cli -p adze-cli -p hew-lsp -p hew-serialize -p hew-lib

      - name: Assemble Alpine tarball and build .apk
        run: |
          VERSION="${RELEASE_TAG#v}"

          MUSL_REL="target/${{ matrix.rust_musl_target }}/release"

          # Assemble the musl tarball from binaries built above.
          PLATFORM="linux-musl-${{ matrix.arch }}"
          ARCHIVE_NAME="hew-v${VERSION}-${PLATFORM}"
          mkdir -p "${ARCHIVE_NAME}/bin" "${ARCHIVE_NAME}/lib" \
                   "${ARCHIVE_NAME}/std" "${ARCHIVE_NAME}/completions"

          for bin in hew adze hew-lsp; do
            cp "${MUSL_REL}/${bin}" "${ARCHIVE_NAME}/bin/"
            chmod +x "${ARCHIVE_NAME}/bin/${bin}"
          done

          cp "${MUSL_REL}/libhew.a" "${ARCHIVE_NAME}/lib/"
          cp -r std/. "${ARCHIVE_NAME}/std/"

          # Generate shell completions from built binaries
          for shell in bash zsh fish; do
            "${ARCHIVE_NAME}/bin/hew" completions "${shell}" > "${ARCHIVE_NAME}/completions/hew.${shell}"
            "${ARCHIVE_NAME}/bin/adze" completions "${shell}" > "${ARCHIVE_NAME}/completions/adze.${shell}"
          done

          cp LICENSE-MIT LICENSE-APACHE NOTICE README.md "${ARCHIVE_NAME}/"

          # Strip packaged binaries when present; missing artifacts are expected
          # for targets that do not build every binary, but strip failures on
          # existing files must still fail the job.
          for b in hew adze hew-lsp; do
            bin="${ARCHIVE_NAME}/bin/${b}"
            if [[ -f "${bin}" ]]; then
              strip "${bin}"
            fi
          done

          mkdir -p dist
          tar czf "dist/${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

          # Build .apk from the musl tarball
          installers/build-packages.sh \
            --version "${VERSION}" \
            --arch "${{ matrix.arch }}" \
            --skip-build \
            --only alpine

      - name: Upload Alpine packages
        uses: actions/upload-artifact@v4
        with:
          name: alpine-packages-${{ matrix.arch }}
          path: |
            dist/*.apk
            dist/hew-v*-linux-musl-*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # Docker clean-room test — verifies the Linux release tarball installs and
  # runs correctly inside a pristine Ubuntu 24.04 container for each native
  # Linux release target. Reuses the already-built release artifacts so no LLVM
  # rebuild is needed; typical runtime is 5–10 min per target.
  # Gates the release job so we never publish a broken installer.
  # ─────────────────────────────────────────────────────────────────────────
  docker-clean-room-test:
    needs: build-linux
    name: Docker clean-room test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-24.04
          - target: linux-aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    if: ${{ !cancelled() && needs.build-linux.result != 'failure' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download Linux release artifact
        uses: actions/download-artifact@v4
        with:
          pattern: hew-v*-${{ matrix.target }}
          path: artifacts
          merge-multiple: true

      - name: Stage release tarball for Docker build
        run: |
          mkdir -p dist/test-tarball
          TARBALL=$(find artifacts -name "hew-v*-${{ matrix.target }}.tar.gz" | head -1)
          tar -xf "${TARBALL}" -C dist/test-tarball --strip-components=1

      - name: Build Ubuntu 24.04 test image
        run: |
          docker build \
            -f installers/docker/Dockerfile.ubuntu-test \
            --build-context tarball=dist/test-tarball \
            -t hew-ubuntu-test-${{ matrix.target }} \
            .

      - name: Run stdlib smoke test in container
        run: docker run --rm hew-ubuntu-test-${{ matrix.target }}

  # ─────────────────────────────────────────────────────────────────────────
  # Release — download all artifacts, generate checksums, publish
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [build, build-linux, build-freebsd, linux-packages, alpine-package, docker-clean-room-test]
    runs-on: ubuntu-24.04
    # Run as long as build and build-linux didn't hard-fail and the Docker
    # clean-room tarball smoke test passed; the Windows continue-on-error leg
    # in build and the separate FreeBSD continue-on-error job do not block release
    if: ${{ !cancelled() && needs.build.result != 'failure' && needs.build-linux.result != 'failure' && needs.docker-clean-room-test.result == 'success' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "hew-v*"
          path: artifacts
          merge-multiple: true

      - name: Download linux package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "linux-packages-*"
          path: artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Download Alpine package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "alpine-packages-*"
          path: artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum \
            hew-v*-*.tar.gz hew-v*-*.zip \
            hew_*.deb hew-*.rpm hew-bin-*.pkg.tar.zst hew-*.apk \
            2>/dev/null | tee checksums.txt
          VERSION="${RELEASE_TAG#v}"
          mv checksums.txt "hew-v${VERSION}-checksums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: .github/RELEASE_NOTES_v0.4.0.md
          generate_release_notes: true
          files: |
            artifacts/hew-v*-*.tar.gz
            artifacts/hew-v*-*.zip
            artifacts/hew_*.deb
            artifacts/hew-*.rpm
            artifacts/hew-bin-*.pkg.tar.zst
            artifacts/hew-*.apk
            artifacts/hew-v*-checksums.txt

  # ─────────────────────────────────────────────────────────────────────────
  # Docker — multi-arch image pushed to ghcr.io/hew-lang/hew
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    needs: [build, build-linux]
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() && needs.build.result != 'failure' && needs.build-linux.result != 'failure' }}
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: installers/docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/hew-lang/hew:${{ steps.version.outputs.version }}
            ghcr.io/hew-lang/hew:latest

  # ─────────────────────────────────────────────────────────────────────────
  # Homebrew — trigger formula update in hew-lang/homebrew-hew
  # ─────────────────────────────────────────────────────────────────────────
  homebrew:
    needs: release
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    timeout-minutes: 5

    steps:
      - name: Trigger homebrew-hew formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set — skipping homebrew update"
            exit 0
          fi
          VERSION="${RELEASE_TAG#v}"
          gh workflow run update-formula.yml \
            -R hew-lang/homebrew-hew \
            -f version="${VERSION}"

  # ─────────────────────────────────────────────────────────────────────────
  # Playground — trigger Docker image rebuild in hew-lang/playground
  # ─────────────────────────────────────────────────────────────────────────
  playground:
    needs: release
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    timeout-minutes: 5

    steps:
      - name: Trigger playground image rebuild
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set — skipping playground trigger"
            exit 0
          fi
          VERSION="${RELEASE_TAG#v}"
          # Check if the playground repo exists before dispatching
          if ! gh repo view hew-lang/playground --json name >/dev/null 2>&1; then
            echo "::warning::hew-lang/playground repo not found — skipping playground trigger"
            exit 0
          fi
          # Resolve the default branch via REST (avoids a GraphQL defaultBranchRef
          # lookup that PATs without full repo scope cannot satisfy).
          PLAYGROUND_REF=$(gh api repos/hew-lang/playground --jq '.default_branch' 2>/dev/null || echo "main")
          gh workflow run build.yml \
            -R hew-lang/playground \
            --ref "${PLAYGROUND_REF}" \
            -f version="${VERSION}"

  # ─────────────────────────────────────────────────────────────────────────
  # VS Code Extension — package + publish with bundled hew-lsp per platform
  # ─────────────────────────────────────────────────────────────────────────
  vscode-extension:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.build.result != 'failure' && needs.build-linux.result != 'failure' }}
    timeout-minutes: 15

    # Map hew release targets to VS Code platform identifiers
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            vscode_target: linux-x64
            binary: hew-lsp
          - target: linux-aarch64
            vscode_target: linux-arm64
            binary: hew-lsp
          - target: darwin-aarch64
            vscode_target: darwin-arm64
            binary: hew-lsp
          - target: windows-x86_64
            vscode_target: win32-x64
            binary: hew-lsp.exe

    steps:
      - name: Download hew-lsp binary
        uses: actions/download-artifact@v4
        with:
          name: hew-lsp-${{ matrix.target }}
          path: lsp-binary/
        continue-on-error: true
        id: download

      - name: Clone vscode-hew
        if: steps.download.outcome == 'success'
        run: |
          git clone --depth 1 https://github.com/hew-lang/vscode-hew.git extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.download.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        if: steps.download.outcome == 'success'
        run: cd extension && npm ci

      - name: Bundle LSP binary
        if: steps.download.outcome == 'success'
        run: |
          mkdir -p extension/server
          cp "lsp-binary/${{ matrix.binary }}" "extension/server/${{ matrix.binary }}"
          chmod +x "extension/server/${{ matrix.binary }}"

      - name: Package extension
        if: steps.download.outcome == 'success'
        run: |
          cd extension
          npx vsce package --target ${{ matrix.vscode_target }}

      - name: Upload .vsix artifact
        if: steps.download.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: extension/*.vsix

  # Publish all platform-specific .vsix packages in a single job
  vscode-publish:
    needs: vscode-extension
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.vscode-extension.result != 'failure' }}
    timeout-minutes: 10

    steps:
      - name: Download all .vsix packages
        uses: actions/download-artifact@v4
        with:
          pattern: "vsix-*"
          path: vsix/
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          shopt -s nullglob
          vsix_files=(vsix/*.vsix)
          if [ ${#vsix_files[@]} -eq 0 ]; then
            echo "::warning::No .vsix files found — skipping marketplace publish"
            exit 0
          fi
          if [ -z "${VSCE_PAT}" ]; then
            echo "::warning::VSCE_PAT secret not set — skipping marketplace publish"
            echo "Built .vsix files:"
            ls -lh "${vsix_files[@]}"
            exit 0
          fi
          # --skip-duplicate avoids failure when a version is already published
          vsce publish --skip-duplicate --packagePath "${vsix_files[@]}"
