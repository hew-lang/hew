name: Codegen Silent-Failure Lint
on:
  pull_request:
    paths:
      - 'hew-codegen/src/**'

jobs:
  codegen-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for silent error swallowing in codegen
        run: |
          # Find .ok()? patterns in codegen that aren't justified
          VIOLATIONS=$(grep -rn '\.ok()?' hew-codegen/src/ | grep -v '// JUSTIFIED' | grep -v '#\[' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Found .ok()? patterns in codegen without // JUSTIFIED comment:"
            echo "$VIOLATIONS"
            echo ""
            echo "If intentional, add '// JUSTIFIED: <reason>' on the same line."
            # Warning only for now — will become error after existing violations are cleaned up
          fi

          # Find unwrap_or_default() in codegen
          DEFAULTS=$(grep -rn 'unwrap_or_default()' hew-codegen/src/ | grep -v '// JUSTIFIED' || true)
          if [ -n "$DEFAULTS" ]; then
            echo "::warning::Found unwrap_or_default() patterns in codegen without justification:"
            echo "$DEFAULTS"
          fi

      - name: Check for new DROP-TODO markers
        run: |
          # Report any DROP-TODO markers so they don't get forgotten
          TODOS=$(grep -rn 'DROP-TODO\|WASM-TODO' hew-codegen/src/ hew-runtime/src/ || true)
          if [ -n "$TODOS" ]; then
            echo "::notice::Found resource cleanup TODOs (track these):"
            echo "$TODOS"
          fi
