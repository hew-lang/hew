# Nextest configuration for the Hew workspace.
# https://nexte.st/docs/configuration/

# ── Test groups ────────────────────────────────────────────────────────────────
# subprocess-intensive: tests that spawn the full `hew` compiler binary
# (compile + codegen + link + run).  Each test consumes several cores while the
# compiler runs, so allowing all 16 to run in parallel causes self-starvation:
# compile times balloon and timeout hang-guards fire even though no test is
# genuinely stuck.  Capping at 8 concurrent subprocess tests leaves headroom for
# the OS scheduler and avoids the oversubscription that causes eval_e2e flakes.
[test-groups]
subprocess-intensive = { max-threads = 8 }
# process-timing: tests that measure process-group signal delivery timing (SIGKILL
# propagation to grandchildren, process-group watchdog latency).  Under 16-core
# concurrent load the OS scheduler takes variable time to deliver signals and
# reap children; capping at 4 concurrent process-timing tests prevents the
# scheduler saturation that caused bounded_child_timeout false-failures in S117.
process-timing = { max-threads = 4 }
# real-timing: tests whose assertions irreducibly measure real wall-clock / OS-level
# timing — SIGKILL delivery to a process group, two-process loopback round-trips —
# and therefore cannot be made deterministic via the simulated-time seam (simtime is
# in-process).  They run ONE-AT-A-TIME (max-threads = 1) so no concurrent test steals
# the scheduler headroom their delivery windows need, and they are excluded from the
# lane/smoke fast tiers (see those profiles' default-filter) so they never gate fast
# iteration.  This is a quarantine, not a parking lot: a timing test that CAN be made
# deterministic is fixed at the root by the de-flake initiative, never parked here.
real-timing = { max-threads = 1 }

[profile.default]
# Exclude hew-wasm by default (requires wasmtime). Exclude sandbox parity from
# generic nextest runs because it spawns the hew-sandbox-vm Node runner; CI
# enforces it through the provisioned `make sandbox-parity` step.
# binary(parity) is the standalone parity binary; the parity_ratchet binary also
# holds VM-dependent work — its live_gate test spawns the Node runner and asserts
# node_modules is installed, so it is excluded by name here while the binary's
# structural ratchet tests (which need no VM) keep running. make sandbox-parity
# runs both via plain `cargo test` (no nextest profile), so the live gate stays
# enforced where the deps are provisioned.
default-filter = "not package(hew-wasm) - binary(parity) - test(live_gate_matches_declared_coverage)"
# Global concurrency cap: defaults to all available cores (num-cpus), which is
# fine for pure in-process tests.  The subprocess-intensive group above provides
# the finer-grained cap for tests that spawn child processes.
test-threads = "num-cpus"

[[profile.default.overrides]]
# eval_e2e and adze eval tests each spawn the full hew compiler binary (AOT
# compile + codegen + link + subprocess execute).  Route them into the
# subprocess-intensive group so at most 8 run concurrently, preventing
# compiler-process oversubscription that inflates compile times and causes
# the eval hang-guard to fire spuriously.
filter = "binary(eval_e2e)"
test-group = "subprocess-intensive"

[profile.ci]
# CI profile: runs all tests and produces JUnit XML for GitHub Actions reporting.
# Exclude test_runner_e2e tests — they are slower than the main nextest path,
# and the same scenarios are covered by the ctest E2E suite that runs after the
# codegen build step.
# Exclude sandbox parity from generic nextest runs because it needs
# `npm --prefix hew-sandbox-vm ci`; CI enforces it through the provisioned
# `make sandbox-parity` step. binary(parity) is the standalone parity binary;
# the parity_ratchet binary's live_gate test also drives the Node VM and asserts
# node_modules is present, so it is excluded by name while parity_ratchet's
# structural ratchet tests (no VM) keep running in this profile. make
# sandbox-parity runs the live gate via plain `cargo test`, so it stays enforced
# where the npm deps are provisioned.
default-filter = "not package(hew-wasm) - binary(test_runner_e2e) - binary(parity) - test(live_gate_matches_declared_coverage)"
# Defense-in-depth for tests that bypass the bounded exec helper: nextest kills
# tests after 3 × 100 s = 300 s without status updates/output.
slow-timeout = { period = "100s", terminate-after = 3 }

[[profile.ci.overrides]]
# Codegen exec/e2e integration binaries spawn full compile+link+run child
# processes; on 4-core hosted runners an unthrottled exec test starves under
# workspace-wide parallelism and hits the 300s slow-timeout (coro_emission_exec
# on macos-14). Same medicine as eval_e2e: cap concurrency, change no coverage.
filter = "binary(~exec)"
test-group = "subprocess-intensive"
# Hosted 4-core runners run throttled exec tests past the default 300s kill
# window even when healthy (each spawns compile+link+run children sharing 4
# cores with up to 7 siblings). Wider terminate budget on ci only; the tests'
# internal timeouts still bound genuine hangs.
slow-timeout = { period = "120s", terminate-after = 4 }
# One retry absorbs hosted-runner subprocess-spawn flakes (a child `hew run`
# failing to launch in ~0.02s); the compile-run assertions stay strict, so a
# real regression fails both attempts.
retries = 1

[[profile.ci.overrides]]
# await_e2e tests each call `hew run` at least twice (the
# multiple_awaits_in_one_handler_resume_correctly_under_both_pools test runs
# the fixture with the default pool and then HEW_WORKERS=1). On a 4-core
# hosted runner, unthrottled await_e2e parallelism shares cores with the
# exec/e2e group and can push a single compile+codegen+link+run cycle past
# the 30s internal test timeout even when no test is genuinely stuck.
#
# SHIM: routing into subprocess-intensive (max-threads=8) and adding retries=1
# absorbs subprocess-spawn oversubscription on hosted runners; these do NOT
# mask a real await/resume regression.
# WHEN obsolete: when await fixtures are pre-compiled once at test-suite
#   startup and tests only launch the native executable (not a full compiler
#   invocation). Tracked: #1858 / PR #1863.
# WHAT the real solution looks like: build fixture binaries once in a
#   test-setup hook; each test launches the pre-built binary directly.
# Correctness invariant: a real lost-wake or mis-resume failure fails on
#   BOTH attempts — the bounded run_bounded_command turns a hang into a
#   non-zero exit on every try; only a transient resource-starvation exit
#   is absorbed by the retry.
filter = "binary(await_e2e)"
test-group = "subprocess-intensive"
slow-timeout = { period = "120s", terminate-after = 4 }
retries = 1                                             # SHIM: see comment above; remove when build-once fixture work (#1858) lands

[[profile.ci.overrides]]
# eval_e2e tests spawn the full hew compiler binary (AOT compile + codegen +
# link + subprocess execute).  Route them into the subprocess-intensive group
# so at most 8 run concurrently, preventing compiler-process oversubscription
# that inflates compile times and causes the eval hang-guard to fire spuriously.
filter = "binary(eval_e2e)"
test-group = "subprocess-intensive"

[[profile.ci.overrides]]
# eval_std_observe_scrape drives a compiled program that binds an ephemeral
# observe/pprof port and scrapes it; under hosted-runner load the bind/scrape
# handshake can miss its window (one cold failure on an otherwise green job).
# One retry absorbs the port-timing jitter; the assertions stay strict.
filter = "test(eval_std_observe_scrape)"
retries = 1

[[profile.ci.overrides]]
# connection_drop_wakes_pending_remote_ask is a known timing-sensitive test
# that relies on a channel wake-up racing against a drop. Allow one automatic
# retry in CI to absorb transient scheduler jitter without masking real failures.
filter = "test(connection_drop_wakes_pending_remote_ask)"
retries = 1

[[profile.ci.overrides]]
# circuit_breaker_trips_on_repeated_crashes injects two crashes and expects the
# breaker (max_crashes=2) to OPEN. Two distinct flakes were diagnosed 2026-06-18:
#   (1) FIXED — a causality bug: the test read hew_crash_log_count() the instant
#       it observed the monitor DOWN, but the crash-log push runs on the crashing
#       worker AFTER the trap that delivers DOWN (signal.rs), so the read raced
#       the push and fast-failed (~0.02s) under load. Now waits for the crash
#       count to reach its target (wait_for_crash_count, a logical-event wait);
#       the wait ceilings were widened to 30s contention headroom.
#   (2) RESIDUAL (this retry) — under peak contention (~1-8% scaling with load)
#       the breaker stays CLOSED at the 30s ceiling even though both deaths are
#       observed and both crashes hit the GLOBAL log (down_count=2, crash_log=2,
#       circuit_state=0). The per-child circuit crash_stats reached <2: one of the
#       two crashes was not classified Crashed by the supervisor's apply_restart
#       path under contention, so it never reached circuit_breaker_record_crash.
# SHIM: retry absorbs the residual production circuit-breaker crash-classification
#   race; the fast causality flake is gone, so this no longer masks that class.
# WHEN obsolete: when the supervisor reliably classifies every fault-injected
#   crash on a freshly-restarted child as Crashed under contention (production
#   crash-counting fix), making the breaker open deterministically.
# WHAT the real solution looks like: harden apply_restart's exit-state read so a
#   crash on a child mid-restart is always counted into the per-child crash_stats;
#   then the test reaches 100/100 and this retry is removed.
# Correctness invariant: a genuinely broken breaker (never opens on 2 crashes)
#   fails on BOTH attempts — the retry only absorbs the intermittent miscount.
filter = "test(circuit_breaker_trips_on_repeated_crashes)"
retries = 1

[[profile.ci.overrides]]
# eval_file_cross_chunk_failure_preserves_prior_chunk_stdout drives a full
# compile+link+execute of two chunks via `hew eval -f`. Under heavy CI load
# (Linux Rust/codegen, macOS arm64) the pre-codegen tempdir/object setup in
# hew-cli/src/{compile.rs,eval/repl.rs} can fail with exit 1 before codegen
# runs, where a clean run yields the codegen-emitted panic exit 101. One retry
# absorbs the transient resource-pressure jitter without masking a real
# regression — the strict `== Some(101)` invariant remains in the assertion
# (with stderr context for diagnosability if the retry also fails).
filter = "test(eval_file_cross_chunk_failure_preserves_prior_chunk_stdout)"
retries = 1

[[profile.ci.overrides]]
# Mirror of the override above for the --json variant. Both tests share
# write_cross_chunk_failure_file and exercise the same chunk pipeline; they
# flake under the same conditions.
filter = "test(eval_json_file_cross_chunk_failure_preserves_prior_chunk_stdout)"
retries = 1

[[profile.ci.overrides]]
# bounded_child_timeout_kills_grandchild_process_group measures SIGKILL delivery
# to a process group (spawned via BoundedChild::spawn) and polls for grandchild
# reaping via /proc checks.  The test already uses adaptive polling (up to 5 s
# per phase) instead of fixed sleeps, but under 16-core concurrent preflight load
# the OS scheduler can delay signal delivery past the adaptive window.
#
# Two-part mitigation:
#   1. real-timing group (max-threads = 1): serializes the genuinely-real timing
#      tests so the scheduler has full headroom for signal delivery, and keeps this
#      test off the lane/smoke fast tiers — its assertion measures real OS behaviour.
#   2. retries = 1: absorbs any remaining scheduler jitter that slips past the
#      serialization, using the strict eventual-invariant assertion already in the test.
#
# SHIM: retry absorbs OS scheduler jitter under concurrent load (now serialized in
# the real-timing quarantine group).
# WHEN obsolete: when the de-flake work replaces the adaptive-poll loop with a
#   kernel-level handshake (e.g. a pipe from the grandchild that the test reads
#   with a blocking call rather than a 25ms-tick poll), the scheduler jitter risk
#   is eliminated and this retry can be removed.
# WHAT the real solution looks like: grandchild writes its PID to a pipe (not a
#   file); test blocks on pipe read; signal delivery test proceeds only after the
#   pipe delivers. Tracked: .tmp/deferred-v05-followups.md
#   "bounded_child de-flake: pipe-based handshake replaces file-poll".
# Correctness invariant: the retry does not mask real regressions — a genuine
#   broken killpg() would fail on BOTH attempts because the grandchild would
#   still be alive after the kill, causing the kill(pid, 0) == 0 assertion to
#   fail on both the first try and the retry.
filter = "test(bounded_child_timeout_kills_grandchild_process_group)"
test-group = "real-timing"
retries = 1                                                           # SHIM: see comment above; remove when pipe-handshake de-flake lands
# Defense-in-depth: the test's internal wait_with_timeout fires at 1 s; 90 s
# nextest kill (30 s × 3) bounds a wedged test that bypasses that guard.
# Does NOT cover A1 (worker/disk death) or A2 (process-wide starvation) —
# those defeat per-test timeouts entirely; see task #47 / supervisor.rs / channel.rs.
slow-timeout = { period = "30s", terminate-after = 3 }

[[profile.ci.overrides]]
# The two-process remote-ask pair (echo: T-01, timeout: T-02) spawns a second
# OS process and round-trips an ask over loopback TCP.  Under load (~5-15% of
# full-workspace CI runs) the connection is DROPPED between the registry-lookup
# and the ask: the client observes ConnectionDropped / "echo ask returned null"
# (helper exit 101) while the server's membership record still shows ALIVE and
# active_conns=0.  This is a connection-lifecycle bug — the outbound connection
# tears down between lookup completion and ask dispatch, leaving an ask in-flight
# with no live transport — not a runner environment quirk.
#
# SHIM: retry absorbs the connection-lifecycle drop that occurs between registry-
#   lookup completion and ask dispatch under concurrent load.  The real-timing
#   serialisation group reduces contention but does not eliminate the race.
# WHEN obsolete: when the connection-lifecycle path holds the connection open
#   across the lookup→ask gap (or re-establishes it transparently on the ask
#   path), making ConnectionDropped between lookup and ask impossible.
# WHAT the real solution looks like: the outbound connection pool keeps the
#   connection alive until the ask completes; a dropped connection triggers a
#   transparent reconnect-and-retry at the transport layer before surfacing
#   ConnectionDropped to the caller.  Tracked: production connection-lifecycle
#   follow-on.
# Correctness invariant: a real remote-ask regression (null reply from a live
#   node on a stable connection) fails on both attempts; the retry only absorbs
#   the intermittent mid-lookup connection drop.
filter = "test(two_process_remote_ask_echo_double_returns_42) | test(remote_ask_two_process_echo_client_helper) | test(remote_ask_two_process_echo_server_helper) | test(two_process_remote_ask_timeout_returns_timeout_under_1500ms) | test(remote_ask_two_process_timeout_client_helper) | test(remote_ask_two_process_timeout_server_helper)"
retries = 1
test-group = "real-timing"
# Defense-in-depth: the test's internal wait_output fires at 40 s; 90 s nextest
# kill (30 s × 3) bounds a wedged test that bypasses that guard.
# Does NOT cover A1 (worker/disk death) or A2 (process-wide starvation) —
# those defeat per-test timeouts entirely; see task #47 / supervisor.rs / channel.rs.
slow-timeout = { period = "30s", terminate-after = 3 }

[[profile.ci.overrides]]
# tcp_stream_backing_records_error_on_reset is a loopback-TCP reset test: it
# gates the RST on an explicit "accepted" handshake, forces it via SO_LINGER=0 +
# drop, joins the peer thread (so the RST is sent before the read), then blocks
# on a single read that returns None on RST/EOF. It is determinism-clean — the
# join + blocking read ARE the synchronization, with no wall-clock "let the RST
# arrive" sleep (removed 2026-06-18). This slow-timeout is purely a HANG CEILING
# for genuine physical-runner latency: inside the FreeBSD VM under QEMU emulation
# the connect/accept/RST round-trip can exceed the default 300s ci slow-timeout.
# It is NOT a jitter-absorb window — the test makes no timing bet, so a real
# regression fails fast (wrong read result), and the wide period only prevents a
# false KILL on a slow VM. The assertion stays strict (next() must return None).
filter = "test(tcp_stream_backing_records_error_on_reset)"
slow-timeout = { period = "120s", terminate-after = 6 }

[[profile.ci.overrides]]
# child_supervisor_recovery_recreates_nested_subtree polls a nested supervisor
# rebuild across escalation.  The test is 0.21s isolated; under the full
# cargo llvm-cov workspace population (~3-8% of coverage runs) the restart wake
# is LOST: hew_supervisor_wait_restart reaches its 30s ceiling and the test
# times out even though the nested subtree is eventually recreated.  The
# mechanism: the dispatch-count polling loop's per-instruction instrumentation
# overhead delays the signal delivery path long enough that the restart-wake
# notification is consumed before wait_restart observes it, leaving wait_restart
# blocked at its deadline.  This is a production lost-wake bug in the
# restart-wake/signal path under instrumented load, not a scheduler-timing
# approximation.
#
# Route into the process-timing group (max-threads=4) so the scheduler has
# headroom.
#
# SHIM: retry absorbs the lost-wake on the restart-wake/signal path that occurs
#   when cargo llvm-cov instrumentation delays dispatch-count delivery past the
#   wait_restart ceiling (~3-8% under full workspace coverage population).
# WHEN obsolete: when the restart-wake path delivers its signal reliably under
#   instrumentation — either the wake is made edge-triggered (not level-
#   triggered) so a missed notification is re-checked, or wait_restart uses a
#   condvar/futex that cannot lose the wake even under instrumented delay.
#   Tracked: production restart-wake follow-on (hew_supervisor_wait_restart
#   lost-wake under instrumented contention).
# WHAT the real solution looks like: replace the dispatch-count polling loop with
#   a condvar or channel that holds the completion signal until the waiter
#   arrives, making the wake delivery order-independent.
# Correctness invariant: a real escalation-rebuild regression (subtree never
#   recreated) fails on both attempts — the poll times out on the first try and
#   the retry alike; the retry only absorbs the intermittent lost-wake where the
#   subtree IS rebuilt but wait_restart misses the signal.
filter = "test(child_supervisor_recovery_recreates_nested_subtree)"
test-group = "process-timing"
retries = 1

[profile.ci.junit]
path = "junit.xml"

[profile.smoke]
# Smoke profile: fast, deterministic in-process tests only.  Designed to give
# a pass/fail signal in under 5 minutes before committing to a full build.
# Used by the `ci-preflight-smoke` tier in the dispatcher's fallback lane.
#
# What it runs: pure in-process unit and integration tests that do not spawn
# the full `hew` compiler binary or the sandbox Node runner, do not need
# pre-built libhew.a or wasm32 runtimes, and do not connect to network services.
# Key oracle: `fmt_roundtrip_corpus::every_hew_file_roundtrips_through_formatter`
# in hew-parser — a deterministic corpus scan that surfaced the S115/S119
# formatter-AST regressions before the heavy tier ran.
#
# What it excludes (intentional; the ci profile covers these):
#   eval_e2e     — spawns `hew` binary, needs pre-built runtimes, slow
#   test_runner_e2e — same (subprocess-intensive)
#   parity        — needs Node runner + npm install
#   live_gate_matches_declared_coverage — lives in the `parity_ratchet` binary
#     (which `binary(parity)` does NOT match), spawns the Node VM and asserts
#     npm-provisioned coverage; excluded by test name, like the default-filter.
#   hew-wasm      — requires wasmtime
#
# Coverage contract: the smoke tier is a FAST FAIL-EARLY gate; the heavy tier
# (test-rust / make test) still runs on smoke pass and provides full coverage.
# The smoke tier does NOT replace the ci profile — it precedes it.
default-filter = "not package(hew-wasm) - binary(eval_e2e) - binary(test_runner_e2e) - binary(parity) - test(live_gate_matches_declared_coverage) - test(bounded_child_timeout_kills_grandchild_process_group) - test(two_process_remote_ask_echo_double_returns_42) - test(remote_ask_two_process_echo_client_helper) - test(remote_ask_two_process_echo_server_helper) - test(two_process_remote_ask_timeout_returns_timeout_under_1500ms) - test(remote_ask_two_process_timeout_client_helper) - test(remote_ask_two_process_timeout_server_helper)"
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.smoke.overrides]]
# Route any eval_e2e tests that slip past the default-filter into the group cap.
# This is a safety net; the default-filter above should exclude them entirely.
filter = "binary(eval_e2e)"
test-group = "subprocess-intensive"

[profile.lane]
# Lane-iteration tier: in-process unit and IR-shape tests only.
#
# Purpose: make per-crate gates fast during lane development so iteration does
# not pay for the subprocess-spawning exec/e2e corpus on every run.
# Typical wall-clock: < 2 min per crate on a warm build.
#
# Usage:
#   make test-lane CRATE=hew-types    — single crate, fast tier
#   make test-lane-all                — full workspace, fast tier
#   cargo nextest run -p <crate> --profile lane
#
# Coverage contract:
#   - This tier is for ITERATION.  Acceptance requires the plan's named proving
#     gates (e.g. make test-types, make test-compiler-pipeline).
#   - Full exec/e2e corpus belongs to the integrated gate (profile.ci).
#   - profile.ci and the preflight fallback are UNCHANGED by this profile.
#
# Binary-name survey (2026-06-10):
#   Excluded by binary(~exec)   — all *_exec codegen/JIT tests
#   Excluded by binary(~e2e)    — all *_e2e hew-cli/codegen/runtime tests
#   Excluded by binary(~oracle) — leak-oracle hew-cli tests
#   Excluded by binary(machine_lifecycle) — subprocess; name outside the patterns
#   Excluded by binary(zeroarg_module_enum_emission) — subprocess; name outside patterns
#   Excluded by binary(jit_trap_bridge)  — JIT-deferred; name outside the patterns
#   Already excluded from smoke base:    eval_e2e, test_runner_e2e, parity, hew-wasm
#
# Matcher semantics (nextest 0.9.132, verified empirically): a bare string in
# binary(...) is an EXACT-equality match and nextest errors out when it matches
# no binary name.  Substring exclusion therefore needs the contains matcher
# `~`: binary(~exec).  The exact-name exclusions below are valid bare strings
# because those binaries exist.
default-filter = "not package(hew-wasm) - binary(eval_e2e) - binary(test_runner_e2e) - binary(parity) - binary(~exec) - binary(~e2e) - binary(~oracle) - binary(machine_lifecycle) - binary(zeroarg_module_enum_emission) - binary(jit_trap_bridge) - test(bounded_child_timeout_kills_grandchild_process_group) - test(two_process_remote_ask_echo_double_returns_42) - test(remote_ask_two_process_echo_client_helper) - test(remote_ask_two_process_echo_server_helper) - test(two_process_remote_ask_timeout_returns_timeout_under_1500ms) - test(remote_ask_two_process_timeout_client_helper) - test(remote_ask_two_process_timeout_server_helper)"
test-threads = "num-cpus"
slow-timeout = { period = "30s", terminate-after = 2 }

[[profile.lane.overrides]]
# Safety net: route any exec-named tests that slip past the default-filter into
# the subprocess-intensive group.  The default-filter should exclude them entirely.
filter = "binary(~exec)"
test-group = "subprocess-intensive"
