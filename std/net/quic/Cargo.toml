[package]
name = "hew-std-net-quic"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Hew std::net::quic — QUIC transport protocol"
readme = "README.md"
repository = "https://github.com/hew-lang/hew"
keywords = ["hew", "stdlib", "quic"]
categories = ["compilers", "network-programming"]

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
quinn = "0.11"
rustls = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2.0"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync"] }
libc = "0.2"
hew-cabi = { path = "../../../hew-cabi" }
hew-runtime = { path = "../../../hew-runtime" }

[lints]
workspace = true
