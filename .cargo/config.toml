# ── Linux linker (x86_64) ─────────────────────────────────────────────────────
# mold is not forced globally here because it requires a running mold install
# AND a compatible driver.  Not every Linux workflow or runner has mold; forcing
# it via .cargo/config.toml breaks release-gate, coverage-nightly, and sanitizer
# jobs that run on bare ubuntu runners without mold installed.
#
# CI opt-in: ci.yml's build-and-test job sets
#   CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
# using gcc's -fuse-ld= flag (no clang dependency) after apt-installing mold.
#
# Dev opt-in: for local Linux x86_64 development with mold installed,
# add to your shell profile:
#   export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C link-arg=-fuse-ld=mold"
#
# WHY opt-in not forced: forcing clang + --ld-path=mold here breaks every
# CI workflow that lacks both clang-as-linker-driver AND mold.  gcc's
# -fuse-ld=mold is cleaner but still requires mold installed; an env var
# scoped to the job that installs mold is the correct isolation boundary.
# WHEN obsolete: if every CI runner provisions mold unconditionally and
# the project drops non-mold Linux workflows.

# Windows uses the LLVM linker from the same provisioned LLVM 22 toolchain that
# supplies clang.exe for `hew build` and llvm-config for llvm-sys.  Keep this
# pinned to lld-link rather than relying on a Developer Command Prompt: the
# provisioned LLVM 22.1.6 release includes lld-link.exe, lld-link auto-detects
# the MSVC/Windows SDK libraries, and building under vcvars64.bat has broken
# llvm-sys detection on the Windows validation host.  A clean Windows checkout
# should have the LLVM bin directory on PATH instead of requiring vcvars.
[target.x86_64-pc-windows-msvc]
linker = "lld-link"

# ── Shared compilation cache (opt-in) ─────────────────────────────────────────
# sccache provides a content-addressed object cache that is safe to share across
# concurrent worktrees.  Each worktree keeps its own CARGO_TARGET_DIR (separate
# Cargo locks, no contention on linking or index files) while sccache deduplicates
# compilation units across worktrees.
#
# To opt in, install sccache and start the server:
#   cargo install sccache          # or: brew install sccache
#   sccache --start-server
#
# Then set RUSTC_WRAPPER=sccache in your shell or per-session env:
#   export RUSTC_WRAPPER=sccache
#
# WHY opt-in not forced: sccache requires a running server; forcing it via this
# file would cause every CI agent and cold checkout to fail if the server is absent.
# WHEN obsolete: if this project adopts a managed remote build cache (e.g. GitHub
# Actions cache with sccache-action) or Cargo's own shared-cache protocol lands, the
# per-developer opt-in can be promoted to a project-wide default.
# WHAT the real solution looks like: `RUSTC_WRAPPER=sccache` in the CI action env
# (one shared server per CI runner) and in team `~/.profile` for local use.
#
# Do NOT set build.target-dir here to a shared path: concurrent worktrees need
# separate Cargo target directories to avoid Cargo lock contention and artifact
# poisoning from killed builds.  The sccache layer above the target dir is the
# correct sharing point.  See LESSONS.md `lsp-first-cargo-confirmation`.

# ── macOS deployment target ────────────────────────────────────────────────────
# Default MACOSX_DEPLOYMENT_TARGET to 13.0 (Ventura — project minimum; see
# Makefile and PR #771) so that Rust-compiled objects inside libhew.a carry
# the same minimum-OS tag as the link step.  Without this, objects compiled
# against a newer Xcode SDK are tagged with that SDK's version, causing
# ld64.lld to emit "has version X, which is newer than target minimum of 13.0"
# for every archive member.
#
# `force = false` means this is only applied when MACOSX_DEPLOYMENT_TARGET is
# not already set in the caller's environment, so explicit overrides are still
# honoured (e.g. `MACOSX_DEPLOYMENT_TARGET=14.0 cargo build`).
#
# On Linux and Windows this variable is ignored by the Rust toolchain, so the
# entry is safe on all platforms.
[env]
MACOSX_DEPLOYMENT_TARGET = { value = "13.0", force = false }
