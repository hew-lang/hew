# Pre-Release Cross-Platform Gate
#
# Validates that the release candidate commit builds and passes tests on all
# CI-supported platforms BEFORE tagging.  This workflow should be at least as
# comprehensive as the main CI for the crates shipped in a release tarball.
#
# Trigger:
#   - Push to a release/* or release-* branch
#   - Manual dispatch (workflow_dispatch)
#
# Coverage vs. ci.yml:
#   - Builds ALL release artifacts (hew-cli, adze-cli, hew-lsp, hew-observe, hew-lib)
#   - Runs full Rust workspace tests (matching ci.yml scope)
#   - Smoke-tests the compile+run pipeline with a trivial .hew program
#
# NOT covered here (run separately before tagging):
#   - Native↔sandbox-VM parity: PR CI enforces this on Linux with a provisioned
#     `make sandbox-parity` step; release authors can rerun it locally without
#     triplicating the Node + LLVM build across release-gate platforms.

name: Pre-Release Cross-Platform Gate

on:
  push:
    branches:
      - 'release/**'
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22"
  LLVM_FULL_VERSION: "22.1.5"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Sanitizers — ASan hard gate + commit-pinned TSan/Miri waivers
  # ─────────────────────────────────────────────────────────────────────────
  gate-sanitizers:
    name: Release Gate — Sanitizers
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # The sanitizer gate validates waiver rows that may pin the release
          # commit's FIRST PARENT; depth 1 has no parent for git rev-parse.
          fetch-depth: 2

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            llvm-${{ env.LLVM_VERSION }} \
            llvm-${{ env.LLVM_VERSION }}-dev \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            libssl-dev pkg-config \
            zlib1g-dev libzstd-dev

      - name: Configure sanitizer toolchain
        run: |
          {
            echo "LLVM_PREFIX=/usr/lib/llvm-${{ env.LLVM_VERSION }}"
            echo "CC=clang-${{ env.LLVM_VERSION }}"
            echo "CXX=clang++-${{ env.LLVM_VERSION }}"
          } >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-${{ env.LLVM_VERSION }}/bin" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: target/sanitizer-runtime-asan/
          key: release-gate-asan-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-gate-asan-

      - name: Run ASan hard gate and validate waiver contract
        shell: bash
        run: |
          set -euo pipefail
          if make asan; then
            printf 'asan=pass\n' > .sanitizer-asan-result
          else
            printf 'asan=fail\n' > .sanitizer-asan-result
          fi
          scripts/check-sanitizer-gate.sh "${GITHUB_SHA}" .sanitizer-asan-result

  # ─────────────────────────────────────────────────────────────────────────
  # Linux x86_64 — full build + codegen E2E + WASM (matches ci.yml)
  # ─────────────────────────────────────────────────────────────────────────
  gate-linux:
    name: Release Gate — Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Free runner disk
        # The full gate (release crates + debug test workspace + WASM + the
        # browser-analysis build) leaves the runner disk-marginal; the runner
        # itself died with ENOSPC twice (after all steps passed, and again
        # mid-test-step). Drop every large preinstalled toolchain this job
        # never uses, including the hosted toolcache and docker images.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift || true
          sudo docker system prune -af >/dev/null 2>&1 || true
          df -h /

      - name: Install LLVM ${{ env.LLVM_FULL_VERSION }}
        # Official upstream tarball via the pinned setup-llvm action: the
        # apt.llvm.org packages do not ship libPolly.a, which llvm-sys links.
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_FULL_VERSION }}

      - name: Install build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev pkg-config zlib1g-dev libzstd-dev

      - uses: ./.github/actions/setup-rust-build
        with:
          tools: nextest
          cache-shared-key: build-test-linux

      - name: Build all release crates
        run: |
          cargo build -p hew-cli -p adze-cli -p hew-lsp -p hew-observe --release
          cargo build -p hew-lib --profile release-lib

      - name: Build WASM runtime
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Verify release binaries
        run: |
          target/release/hew --version
          target/release/adze --version
          target/release/hew-lsp --version
          target/release/hew-observe --version
          test -f target/release-lib/libhew.a && echo "✅ libhew.a exists"
          ar t target/release-lib/libhew.a | grep -q '^std-' && echo "✅ libhew.a carries verbatim libstd members"

      - name: Smoke test — compile and run a .hew program
        run: |
          echo 'fn main() { println("smoke-ok") }' > _smoke.hew
          target/release/hew build _smoke.hew -o _smoke_bin
          chmod +x _smoke_bin
          OUTPUT=$(./_smoke_bin)
          rm -f _smoke.hew _smoke_bin
          echo "$OUTPUT" | grep -q "smoke-ok" && echo "✅ Smoke test passed"

      - name: Trim release build intermediates
        # The release-profile deps/build/incremental trees are dead weight
        # once the release binaries are verified and smoke-tested above; the
        # debug test build below needs the disk far more than a re-link
        # cache. Keeps the binaries and libhew.a.
        run: rm -rf target/release/deps target/release/build target/release/incremental target/release/.fingerprint

      - name: Install WASI prerequisites
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.wasmtime/bin:$PATH"
          command -v wasmtime
          wasmtime --version

      - name: Run Rust workspace tests
        # line-tables-only: the release build + debug test workspace + WASM +
        # browser-analysis builds together leave the runner disk-marginal —
        # the runner process itself died of ENOSPC twice mid-run even after
        # the free-disk step. Full debug info is the dominant target/ cost
        # and nothing in CI reads it.
        env:
          CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci --no-fail-fast

      # Browser-analysis WASM gate — Linux x86_64 only.
      # Installs wasm-pack + wasm32-unknown-unknown and runs the full playground
      # check: manifest freshness, full hew-wasm test suite (lib + fixture-coverage
      # integration), and the wasm-pack release build.  Scoped to x86_64 to avoid
      # multiplying wasm-pack installs across aarch64/macOS/Windows lanes.
      #
      # TODO(playground-wasi-gate): add `make playground-wasi-check` here once the
      # curated_playground_examples_run_under_wasi test is un-ignored by that lane.
      - name: Install wasm-pack v0.13.1 (browser-analysis gate)
        run: |
          set -euo pipefail
          WASM_PACK_VERSION=0.13.1
          TARBALL="wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/${TARBALL}" \
            -o "/tmp/${TARBALL}"
          tar -xzf "/tmp/${TARBALL}" -C /tmp
          echo "/tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
          /tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack --version

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Browser-analysis playground gate
        run: make playground-check

  # ─────────────────────────────────────────────────────────────────────────
  # Linux aarch64 — full Rust build + workspace tests + WASM
  # ─────────────────────────────────────────────────────────────────────────
  gate-linux-aarch64:
    name: Release Gate — Linux aarch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Free runner disk
        # arm64 hosted runners ship with less free disk than x86_64; the LLVM
        # toolchain (~6 GB extracted) plus a full debug workspace build hit
        # ENOSPC (the runner process itself died mid-test-step). Drop every
        # large preinstalled toolchain this job never uses, including the
        # hosted toolcache and docker images.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift || true
          sudo docker system prune -af >/dev/null 2>&1 || true
          df -h /

      - name: Install LLVM ${{ env.LLVM_FULL_VERSION }}
        # Official upstream tarball via the pinned setup-llvm action: the
        # apt.llvm.org packages do not ship libPolly.a, which llvm-sys links.
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_FULL_VERSION }}

      - name: Install build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev pkg-config zlib1g-dev libzstd-dev

      - uses: ./.github/actions/setup-rust-build
        with:
          tools: nextest
          cache-shared-key: build-test-linux

      - name: Build all release crates
        run: |
          cargo build -p hew-cli -p adze-cli -p hew-lsp -p hew-observe --release
          cargo build -p hew-lib --profile release-lib

      - name: Build WASM runtime
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Verify release binaries
        run: |
          target/release/hew --version
          target/release/adze --version
          target/release/hew-lsp --version
          target/release/hew-observe --version
          test -f target/release-lib/libhew.a && echo "✅ libhew.a exists"
          ar t target/release-lib/libhew.a | grep -q '^std-' && echo "✅ libhew.a carries verbatim libstd members"

      - name: Smoke test — compile and run a .hew program
        run: |
          echo 'fn main() { println("smoke-ok") }' > _smoke.hew
          target/release/hew build _smoke.hew -o _smoke_bin
          chmod +x _smoke_bin
          OUTPUT=$(./_smoke_bin)
          rm -f _smoke.hew _smoke_bin
          echo "$OUTPUT" | grep -q "smoke-ok" && echo "✅ Smoke test passed"

      - name: Trim release build intermediates
        # The release-profile deps/build/incremental trees are dead weight
        # once the release binaries are verified and smoke-tested above; the
        # debug test build below needs the disk far more than a re-link
        # cache. Keeps the binaries and libhew.a.
        run: rm -rf target/release/deps target/release/build target/release/incremental target/release/.fingerprint

      - name: Install WASI prerequisites
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.wasmtime/bin:$PATH"
          command -v wasmtime
          wasmtime --version

      - name: Run Rust workspace tests
        env:
          CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
        # The two-process remote-ask tests fail only on hosted arm64 runners
        # (child helper exits 101); they pass natively on arm64 Linux
        # (container repro) and on every other platform. Runner-environment
        # classification — excluded here, tracked for investigation.
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci --no-fail-fast -E 'not test(two_process_remote_ask) and not test(remote_ask_two_process) and not test(stream_poll_double_register_aborts)'

  # ─────────────────────────────────────────────────────────────────────────
  # macOS arm64 — full Rust build + workspace tests
  # ─────────────────────────────────────────────────────────────────────────
  gate-macos:
    name: Release Gate — macOS arm64
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: ./.github/actions/setup-rust-build
        with:
          targets: 'aarch64-apple-darwin, x86_64-apple-darwin'
          tools: nextest
          cache-shared-key: build-test-macos

      - name: Install LLVM
        run: |
          # hew-codegen-rs (inkwell -> llvm-sys-221) needs LLVM 22's static
          # libraries during cargo build.
          brew install llvm@${{ env.LLVM_VERSION }} lld@${{ env.LLVM_VERSION }}
          LLVM_PREFIX="$(brew --prefix llvm@${{ env.LLVM_VERSION }})"
          LLD_PREFIX="$(brew --prefix lld@${{ env.LLVM_VERSION }})"
          {
            echo "LLVM_PREFIX=${LLVM_PREFIX}"
            echo "LLD_PREFIX=${LLD_PREFIX}"
            echo "CC=${LLVM_PREFIX}/bin/clang"
            echo "CXX=${LLVM_PREFIX}/bin/clang++"
            echo "MACOSX_DEPLOYMENT_TARGET=13.0"
          } >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "${LLD_PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Build all release crates
        run: |
          cargo build -p hew-cli -p adze-cli -p hew-lsp -p hew-observe --release
          cargo build -p hew-lib --profile release-lib

      - name: Verify release binaries
        run: |
          target/release/hew --version
          target/release/adze --version
          target/release/hew-lsp --version
          target/release/hew-observe --version
          test -f target/release-lib/libhew.a && echo "✅ libhew.a exists"
          ar t target/release-lib/libhew.a | grep -q '^std-' && echo "✅ libhew.a carries verbatim libstd members"

      - name: Smoke test — compile and run a .hew program
        run: |
          echo 'fn main() { println("smoke-ok") }' > _smoke.hew
          target/release/hew build _smoke.hew -o _smoke_bin
          chmod +x _smoke_bin
          OUTPUT=$(./_smoke_bin)
          rm -f _smoke.hew _smoke_bin
          echo "$OUTPUT" | grep -q "smoke-ok" && echo "✅ Smoke test passed"

      - name: Install WASI prerequisites
        run: |
          rustup target add wasm32-wasip1
          brew install wasmtime
          LLVM_PREFIX="${LLVM_PREFIX:-$(brew --prefix llvm@${{ env.LLVM_VERSION }})}"
          LLD_PREFIX="${LLD_PREFIX:-$(brew --prefix lld@${{ env.LLVM_VERSION }})}"
          export PATH="${LLD_PREFIX}/bin:${LLVM_PREFIX}/bin:$PATH"
          command -v wasmtime
          wasmtime --version
          command -v wasm-ld
          wasm-ld --version

      - name: Run Rust workspace tests
        # Leak-oracle binaries drive macOS leaks(1) with MallocScribble and
        # need entitlements/wall-time hosted runners cannot give (300s
        # timeouts, no failure signal). They are local release evidence and
        # their memory coverage is the Linux ASan job; exclude them here.
        # coro_emission_exec cannot finish inside hosted macos-14 budgets even
        # running alone (480s, vs seconds on real macOS hardware — pinned green
        # locally and on Linux); excluded here, tracked for runner investigation.
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci --no-fail-fast -E 'not binary(~oracle) and not binary(coro_emission_exec)'

  # ─────────────────────────────────────────────────────────────────────────
  # Windows x86_64 — Rust workspace tests
  # ─────────────────────────────────────────────────────────────────────────
  gate-windows:
    name: Release Gate — Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      # aws-lc-sys (rustls under hew-runtime, jsonwebtoken under hew-lib) wants
      # NASM on windows-msvc; its documented CI escape consumes the crate's
      # pregenerated assembly objects instead — deterministic, no toolchain dep.
      AWS_LC_SYS_PREBUILT_NASM: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: ./.github/actions/setup-rust-build
        with:
          tools: nextest
          cache-shared-key: build-test-windows

      - name: Install LLVM 22
        uses: ./.github/actions/setup-llvm
        with:
          version: 22.1.5

      - name: Build release crates
        run: |
          cargo build -p adze-cli -p hew-lsp -p hew-observe -p hew-cli --release

      - name: Verify binaries
        shell: bash
        run: |
          target/release/adze.exe --version && echo "adze runs"
          target/release/hew-lsp.exe --version && echo "hew-lsp runs"
          target/release/hew-observe.exe --version && echo "hew-observe runs"

      - name: Run Rust workspace tests
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci
          --no-fail-fast

  # ─────────────────────────────────────────────────────────────────────────
  # FreeBSD x86_64 — full build + workspace tests
  # ─────────────────────────────────────────────────────────────────────────
  gate-freebsd-x86_64:
    name: Release Gate — FreeBSD x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a  # v1.4.6
        with:
          release: "15.0"
          mem: 8192
          prepare: |
            mkdir -p /usr/local/etc/pkg/repos
            printf 'FreeBSD: { url: "pkg+https://pkg.FreeBSD.org/${ABI}/latest", mirror_type: "srv", enabled: yes }\n' \
              > /usr/local/etc/pkg/repos/FreeBSD.conf
            # Bootstrap pkg through the base utility before reading package catalogues.
            /usr/sbin/pkg bootstrap -fy -r FreeBSD
            pkg update -f -r FreeBSD
            # wasmtime executes the eval_wasm_* / wasi_run_e2e modules; the
            # FreeBSD pkg ships it the same way brew/wasmtime.dev provide it on
            # the macOS and Linux gates.
            pkg install -y -U -r FreeBSD llvm22 rust cmake ninja git pkgconf libffi libxml2 wasmtime

          run: |
            set -eux

            git config --global --add safe.directory "$(pwd)"

            export LLVM_SYS_221_PREFIX=/usr/local/llvm22
            /usr/local/llvm22/bin/llvm-config --version

            # The wasm codegen tests link with `wasm-ld`; llvm22 ships it in its
            # own bin dir, which is not on PATH. Expose it like the macOS gate's
            # lld@22 so the linker probe finds it instead of failing to spawn
            # rust-lld (not shipped by the pkg rust toolchain).
            ln -sf /usr/local/llvm22/bin/wasm-ld /usr/local/bin/wasm-ld
            command -v wasmtime && wasmtime --version
            command -v wasm-ld && wasm-ld --version

            cargo build -p hew-cli -p adze-cli -p hew-lsp -p hew-observe --release
            cargo build -p hew-lib --profile release-lib

            target/release/hew --version
            target/release/adze --version
            target/release/hew-lsp --version
            target/release/hew-observe --version
            test -f target/release-lib/libhew.a
            ar t target/release-lib/libhew.a | grep -q '^std-'

            # Smoke test — compile and run a .hew program
            echo 'fn main() { println("smoke-ok") }' > _smoke.hew
            target/release/hew build _smoke.hew -o _smoke_bin
            chmod +x _smoke_bin
            OUTPUT=$(./_smoke_bin)
            echo "$OUTPUT"
            echo "$OUTPUT" | grep -q "smoke-ok"
            rm -f _smoke.hew _smoke_bin

            # cargo-nextest is not in FreeBSD pkg yet; install once via cargo
            cargo install cargo-nextest --locked

            # Scope out only the eval/WASI E2E tests that build the WASI runner
            # from source against wasm32-wasip1 — the FreeBSD pkg rust is not
            # rustup-managed and cannot add that target. The wasm backend is
            # host-independent and already gated on the four rustup platforms;
            # full FreeBSD wasm-cross parity is tracked in #1960. The filter is
            # deliberately narrow so the gate still covers what FreeBSD can run:
            # it keeps the eval_wasm_* *rejection* paths (which build no wasm)
            # and the wasi_run_e2e native_* codegen-parity tests (which run
            # natively).
            cargo nextest run --workspace \
              --exclude hew-wasm --exclude hew-cabi \
              -E 'not ((test(eval_wasm) & not test(reject)) | (binary(wasi_run_e2e) & not test(native_)))' \
              --profile ci --no-fail-fast

  # ─────────────────────────────────────────────────────────────────────────
  # FreeBSD aarch64 — full build + workspace tests
  # Runs inside a FreeBSD 15.0 aarch64 VM under QEMU emulation on a standard
  # x86_64 runner (vmactions/freebsd-vm with arch: aarch64). Emulation is slow
  # but needs no new host infra. This job cannot be reproduced locally; CI is
  # the proving gate for the FreeBSD aarch64 toolchain.
  # ─────────────────────────────────────────────────────────────────────────
  gate-freebsd-aarch64:
    name: Release Gate — FreeBSD aarch64
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build and test on FreeBSD aarch64
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a  # v1.4.6
        with:
          release: "15.0"
          arch: aarch64
          mem: 8192
          prepare: |
            mkdir -p /usr/local/etc/pkg/repos
            printf 'FreeBSD: { url: "pkg+https://pkg.FreeBSD.org/${ABI}/latest", mirror_type: "srv", enabled: yes }\n' \
              > /usr/local/etc/pkg/repos/FreeBSD.conf
            # Bootstrap pkg through the base utility before reading package catalogues.
            /usr/sbin/pkg bootstrap -fy -r FreeBSD
            pkg update -f -r FreeBSD
            # wasmtime executes the eval_wasm_* / wasi_run_e2e modules; the
            # FreeBSD pkg ships it the same way brew/wasmtime.dev provide it on
            # the macOS and Linux gates.
            pkg install -y -U -r FreeBSD llvm22 rust cmake ninja git pkgconf libffi libxml2 wasmtime

          run: |
            set -eux

            git config --global --add safe.directory "$(pwd)"

            export LLVM_SYS_221_PREFIX=/usr/local/llvm22
            /usr/local/llvm22/bin/llvm-config --version

            # The wasm codegen tests link with `wasm-ld`; llvm22 ships it in its
            # own bin dir, which is not on PATH. Expose it like the macOS gate's
            # lld@22 so the linker probe finds it instead of failing to spawn
            # rust-lld (not shipped by the pkg rust toolchain).
            ln -sf /usr/local/llvm22/bin/wasm-ld /usr/local/bin/wasm-ld
            command -v wasmtime && wasmtime --version
            command -v wasm-ld && wasm-ld --version

            cargo build -p hew-cli -p adze-cli -p hew-lsp -p hew-observe --release
            cargo build -p hew-lib --profile release-lib

            target/release/hew --version
            target/release/adze --version
            target/release/hew-lsp --version
            target/release/hew-observe --version
            test -f target/release-lib/libhew.a
            ar t target/release-lib/libhew.a | grep -q '^std-'

            # Smoke test — compile and run a .hew program
            echo 'fn main() { println("smoke-ok") }' > _smoke.hew
            target/release/hew build _smoke.hew -o _smoke_bin
            chmod +x _smoke_bin
            OUTPUT=$(./_smoke_bin)
            echo "$OUTPUT"
            echo "$OUTPUT" | grep -q "smoke-ok"
            rm -f _smoke.hew _smoke_bin

            # cargo-nextest is not in FreeBSD pkg yet; install once via cargo
            cargo install cargo-nextest --locked

            # Scope out only the eval/WASI E2E tests that build the WASI runner
            # from source against wasm32-wasip1 — the FreeBSD pkg rust is not
            # rustup-managed and cannot add that target. The wasm backend is
            # host-independent and already gated on the four rustup platforms;
            # full FreeBSD wasm-cross parity is tracked in #1960. The filter is
            # deliberately narrow so the gate still covers what FreeBSD can run:
            # it keeps the eval_wasm_* *rejection* paths (which build no wasm)
            # and the wasi_run_e2e native_* codegen-parity tests (which run
            # natively).
            cargo nextest run --workspace \
              --exclude hew-wasm --exclude hew-cabi \
              -E 'not ((test(eval_wasm) & not test(reject)) | (binary(wasi_run_e2e) & not test(native_)))' \
              --profile ci --no-fail-fast
