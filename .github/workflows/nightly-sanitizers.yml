name: Nightly Sanitizers

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime ASan — memory safety for the actor runtime
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-asan:
    name: Rust runtime ASan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install llvm-symbolizer (${{ env.LLVM_VERSION }})
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-${{ env.LLVM_VERSION }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-runtime-asan/
          key: runtime-asan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-asan-${{ runner.os }}-

      - name: Run hew-runtime ASan tests
        env:
          CARGO_TARGET_DIR: target/sanitizer-runtime-asan
          RUSTFLAGS: -Zsanitizer=address -Cforce-frame-pointers=yes -Cunsafe-allow-abi-mismatch=sanitizer
          ASAN_OPTIONS: detect_leaks=1
          # Bare relative filename, not an absolute ${{ github.workspace }} path:
          # cargo runs the -p hew-runtime test binary with cwd = hew-runtime/, so
          # `suppressions=lsan.supp` resolves to hew-runtime/lsan.supp without
          # embedding the runner's workspace path. A workspace whose absolute
          # path contains a space (self-hosted runner under /Volumes/Extreme SSD/
          # ...) would otherwise make the sanitizer parse the space as a
          # key=value separator and abort with "expected '=' in LSAN_OPTIONS".
          LSAN_OPTIONS: suppressions=lsan.supp
          ASAN_SYMBOLIZER_PATH: /usr/lib/llvm-${{ env.LLVM_VERSION }}/bin/llvm-symbolizer
        run: |
          # -Cunsafe-allow-abi-mismatch=sanitizer silences the hard ABI-mismatch
          # error between the sanitizer-instrumented hew-runtime crates and the
          # prebuilt (uninstrumented) sysroot std.  The prebuilt std stays
          # uninstrumented — acceptable because these jobs detect data races and
          # leaks in hew-runtime's own code, not in std.
          cargo +nightly test \
            --target x86_64-unknown-linux-gnu \
            -p hew-runtime \
            --lib

  # ─────────────────────────────────────────────────────────────────────────
  # Compiled .hew fixture ASan — leak detection for generated code
  #
  # Scope: compiled Hew programs linked against an ASan-instrumented libhew.a.
  # The `rust-runtime-asan` job above instruments the Rust runtime crate under
  # test; this job instruments the GENERATED CODE (the LLVM IR + clang-linked
  # artefact produced by `hew compile`).  These are two different surfaces:
  # - runtime-asan: cargo test --lib sees Rust-level allocation/free paths
  # - fixture-asan: a compiled .hew binary running against ASan libhew.a sees
  #   leaks that only appear in the generated code (e.g. a hew_vec_get_str
  #   retained node that codegen failed to drop after a string compare)
  #
  # Three fixture probes:
  #   clean-probe (--emit-obj path)
  #       Exercises the previously-leaky Vec<string> index-into-compare and
  #       local drop shapes (both fixed); must produce ZERO findings.
  #   leak-probe (Hew generated-code)
  #       asan_fixture_leak_probe.hew calls malloc via extern "C" and never frees
  #       it.  The malloc call is in the LLVM IR produced by hew codegen — a
  #       genuine generated-code leak, not a standalone C program.  The gate must
  #       catch it, proving it would have flagged the historical array-repeat
  #       Vec<string>/Vec<record> leaks that were previously macOS-oracle-only.
  #   clean-probe (HEW_SANITIZE_ADDRESS=1 hew build path)
  #       The same clean fixture linked by `hew build` with HEW_SANITIZE_ADDRESS=1
  #       (the full CLI link step, not manual clang).  Proves the CLI flag
  #       integration is exercised by this gate; must produce ZERO findings.
  # ─────────────────────────────────────────────────────────────────────────
  compiled-fixture-asan:
    name: Compiled fixture ASan (generated code)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install llvm-${{ env.LLVM_VERSION }} (symbolizer + clang for link step)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          # libpolly-N-dev supplies libLLVMPolly.a: llvm-config-N --link-static
          # lists Polly, so llvm-sys requests it at link time.
          sudo apt-get install -y -qq llvm-${{ env.LLVM_VERSION }} clang-${{ env.LLVM_VERSION }} libpolly-${{ env.LLVM_VERSION }}-dev
          # Make clang-N available as `clang` (hew's link step calls `clang`).
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-${{ env.LLVM_VERSION }} 100

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-fixture-asan/
          key: fixture-asan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fixture-asan-${{ runner.os }}-

      - name: Run compiled-fixture ASan gate
        env:
          LLVM_VERSION: ${{ env.LLVM_VERSION }}
          SANITIZER_RUST_TARGET: x86_64-unknown-linux-gnu
          CARGO_TERM_COLOR: always
        run: |
          # scripts/asan-fixture-check.sh — three probes:
          #   1. Builds hew CLI + libhew.a with nightly -Zsanitizer=address.
          #   2. Compiles clean-probe + leak-probe via hew build --emit-obj,
          #      then links with clang -fsanitize=address.
          #   3. Also compiles clean-probe via HEW_SANITIZE_ADDRESS=1 hew build
          #      (the full CLI link path through hew-cli/src/link.rs).
          #   4. Runs clean-probe (zero findings), leak-probe (must catch the
          #      Hew generated-code malloc leak), clean-probe CLI-link (zero
          #      findings).
          scripts/asan-fixture-check.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime TSan — data-race detection for the actor runtime
  #
  # Scope: core concurrency primitives (reply-channel, mailbox, scheduler).
  # Optional features (tokio, quinn, profiler) are excluded to avoid async-
  # runtime noise and keep the run focused and fast.
  #
  # continue-on-error / advisory only — and it MUST stay that way until std can
  # be instrumented.  -Cunsafe-allow-abi-mismatch lets the instrumented runtime
  # link against the prebuilt, UNINSTRUMENTED sysroot std.  TSan models
  # happens-before from instrumented atomics/locks only, so it cannot see the
  # release/acquire edges inside std::sync::{Mutex,Condvar,mpsc} (futex-based,
  # uninstrumented).  The result is a flood of false positives on code that is
  # in fact correctly locked — e.g. ReplyRoutingTable::complete_pending writes
  # and hew_node_api_ask reads both happen under the same `PendingReply.outcome`
  # Mutex, yet TSan reports them as a race; the global allocator's dealloc path
  # races itself for the same reason.  Trustworthy signal needs an instrumented
  # std via -Zbuild-std, which currently fails with E0152 (duplicate lang item
  # `sized`) when building std for the host triple — tracked, out of scope here.
  # Until then this job is a build/run liveness check; any finding must be
  # hand-verified for missing synchronisation before it is believed.
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-tsan:
    name: Rust runtime TSan (advisory)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-runtime-tsan/
          key: runtime-tsan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-tsan-${{ runner.os }}-

      - name: Run hew-runtime TSan tests
        env:
          CARGO_TARGET_DIR: target/sanitizer-runtime-tsan
          RUSTFLAGS: -Zsanitizer=thread -Cforce-frame-pointers=yes -Cunsafe-allow-abi-mismatch=sanitizer
          # halt_on_error=1 surfaces races immediately rather than summarising
          # them at process exit, which makes CI output easier to triage.
          TSAN_OPTIONS: halt_on_error=1
        run: |
          # -Cunsafe-allow-abi-mismatch=sanitizer silences the hard ABI-mismatch
          # error between the sanitizer-instrumented hew-runtime crates and the
          # prebuilt (uninstrumented) sysroot std.  Because std stays
          # uninstrumented, TSan cannot see std::sync happens-before edges and
          # this job is advisory only (see the job header comment above).
          #
          # --no-default-features excludes the tokio/quinn/profiler optional
          # features; the core runtime concurrency primitives (reply-channel,
          # mailbox, scheduler) are exercised by the lib tests without them.
          # --test-threads=1 avoids two TSan-specific pitfalls: (a) the ~20x
          # slowdown makes timing-sensitive timer tests unreliable under
          # parallel load; (b) single-threaded ensures TSan race reports are
          # isolated to the test that triggered them, not cross-test noise.
          cargo +nightly test \
            --target x86_64-unknown-linux-gnu \
            -p hew-runtime \
            --no-default-features \
            --lib \
            -- --test-threads=1

  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime Miri — aliasing / uninit-read / provenance for the runtime
  #
  # Scope: hew-runtime's pure-Rust unsafe data structures (send_ptr, rc, arc,
  # tagged_union, arena, bytes, vecdeque, vec).  Miri interprets MIR, so it is
  # the only tool in this file that covers Stacked/Tree-Borrows aliasing,
  # uninitialised reads, and pointer provenance — none of which ASan or TSan
  # catch.  It is also the only lane that needs no sanitizer-capable target,
  # because it executes no native code.
  #
  # continue-on-error / advisory only — this lane is being grown incrementally
  # toward a curated green surface (issue #1826).  The FFI / syscall / socket
  # boundary deliberately stays on ASan: Miri cannot execute foreign functions,
  # so subprocess death-tests and libc-backed paths are `#[cfg_attr(miri, ignore)]`
  # and the arena chunk allocator swaps mmap/VirtualAlloc for a `cfg(miri)`
  # std::alloc shim.  --no-default-features excludes the tokio/quinn/profiler
  # optional features for the same reason TSan excludes them (async + network FFI
  # Miri cannot interpret).  Green here means "the curated non-FFI surface is
  # clean", NOT whole-crate coverage.
  #
  # MIRIFLAGS: -Zmiri-disable-isolation lets timer/clock/random read host
  # time/entropy; -Zmiri-permissive-provenance silences the benign int->ptr cast
  # warning from cross-thread pointer hand-off in tests without weakening UB
  # detection.  The toolchain is pinned (nightly + rust-src + miri) so the lane is
  # reproducible — mirrors the determinism the TSan lane is moving toward.
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-miri:
    name: Rust runtime Miri (advisory)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
        with:
          toolchain: nightly-2026-06-14
          components: miri, rust-src

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/miri-runtime/
          key: runtime-miri-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-miri-${{ runner.os }}-

      - name: Run hew-runtime Miri allowlist
        env:
          CARGO_TARGET_DIR: target/miri-runtime
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-permissive-provenance
        run: |
          # The trailing filters are the curated GREEN allowlist (substring match,
          # `::`-anchored to module boundaries).  Keep this in sync with the
          # `make miri` MIRI_ALLOWLIST.
          cargo +nightly-2026-06-14 miri test \
            -p hew-runtime \
            --no-default-features \
            --lib \
            -- send_ptr:: rc:: arc:: tagged_union:: arena:: bytes:: vecdeque:: vec::
