[package]
name = "hew-parser-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
hew-lexer = { path = "../../hew-lexer" }
hew-parser = { path = ".." }
hew-types = { path = "../../hew-types" }
hew-hir = { path = "../../hew-hir" }
hew-mir = { path = "../../hew-mir" }
hew-serialize = { path = "../../hew-serialize" }
hew-wirecodec = { path = "../../hew-wirecodec" }
rmp-serde = "1"

[[bin]]
name = "fuzz_parse"
path = "fuzz_targets/fuzz_parse.rs"
doc = false

[[bin]]
name = "fuzz_lex"
path = "fuzz_targets/fuzz_lex.rs"
doc = false

[[bin]]
name = "fuzz_structured"
path = "fuzz_targets/fuzz_structured.rs"
test = false
doc = false

[[bin]]
name = "fuzz_machine"
path = "fuzz_targets/fuzz_machine.rs"
doc = false

[[bin]]
name = "fuzz_check"
path = "fuzz_targets/fuzz_check.rs"
doc = false

[[bin]]
name = "fuzz_mir"
path = "fuzz_targets/fuzz_mir.rs"
doc = false

[[bin]]
name = "fuzz_msgpack"
path = "fuzz_targets/fuzz_msgpack.rs"
doc = false
