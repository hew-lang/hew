name: Setup Rust build environment
description: >
  Install the stable Rust toolchain, optional cargo tools (via
  taiki-e/install-action), Swatinem/rust-cache for the registry/deps
  layer, and mozilla-actions/sccache-action for the workspace-crate
  compilation cache (GitHub Actions cache backend, content-addressed,
  disk-safe).  Extracts the repeated setup sequence that every Rust job
  in ci.yml and release-gate.yml otherwise duplicates.

inputs:
  components:
    description: >
      Comma-separated toolchain components to pass to dtolnay/rust-toolchain
      (e.g. 'clippy, rustfmt' for lint; 'llvm-tools' for coverage).
      Omit or leave empty to install no extra components.
    required: false
    default: ''
  targets:
    description: >
      Comma-separated target triples to pass to dtolnay/rust-toolchain
      (e.g. 'aarch64-apple-darwin, x86_64-apple-darwin' for macOS cross).
      Omit or leave empty to add no extra targets.
    required: false
    default: ''
  tools:
    description: >
      Comma-separated tool names for taiki-e/install-action
      (e.g. 'nextest', 'nextest,cargo-llvm-cov').
      The install-action step is SKIPPED entirely when this input is empty.
    required: false
    default: ''
  cache-shared-key:
    description: >
      Swatinem/rust-cache shared-key that scopes the cache to the calling
      job class (e.g. 'lint', 'build-test-linux', 'coverage').
    required: true
  cache-prefix-key:
    description: >
      Swatinem/rust-cache prefix-key.  Bump to invalidate on toolchain or
      LLVM version changes.
    required: false
    default: 'v1-llvm22'

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master 2026-03-27
      with:
        toolchain: stable
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912  # v2.81.10
      if: inputs.tools != ''
      with:
        tool: ${{ inputs.tools }}

    # ── sccache: workspace-crate compilation cache ─────────────────────────
    # Promotes the .cargo/config.toml opt-in annotation to CI reality.
    # Uses the GitHub Actions cache backend (content-addressed, no blob
    # expansion — the ENOSPC cause that led to dropping target/ caching in
    # e9f65f19 was blob size, not sccache).  Swatinem/rust-cache below
    # continues to handle the registry/deps layer; sccache handles workspace
    # crate compilation.  The two compose: sccache caches compiler
    # invocations; Swatinem caches the registry.  SCCACHE_CACHE_SIZE bounds
    # the on-disk buffer; the GHA cache has its own 10 GB/repo ceiling.
    - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      with:
        # Always pull the latest released sccache binary unless we need to
        # pin for a specific fix.  The action itself is SHA-pinned above.
        version: "v0.10.0"

    - name: Export sccache environment variables
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_CACHE_SIZE=2G" >> "$GITHUB_ENV"

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      with:
        prefix-key: ${{ inputs.cache-prefix-key }}
        shared-key: ${{ inputs.cache-shared-key }}
