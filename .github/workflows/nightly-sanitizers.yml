name: Nightly Sanitizers

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Codegen C++ ASan+UBSan — memory/UB coverage for the embedded MLIR layer
  # ─────────────────────────────────────────────────────────────────────────
  codegen-sanitizers:
    name: Codegen C++ ASan+UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }} + MLIR
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build \
            llvm-${{ env.LLVM_VERSION }}-dev \
            libmlir-${{ env.LLVM_VERSION }}-dev \
            mlir-${{ env.LLVM_VERSION }}-tools \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: codegen-sanitizer-rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: codegen-sanitizer-rust-${{ runner.os }}-

      - name: Build hew compiler and runtime
        run: |
          cargo build -p hew-cli -p hew-runtime -p hew-serialize
          cargo build -p hew-lib

      - name: Build C++ test infrastructure with ASan+UBSan
        env:
          CC: clang-${{ env.LLVM_VERSION }}
          CXX: clang++-${{ env.LLVM_VERSION }}
        run: |
          cmake -B hew-codegen/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang-${{ env.LLVM_VERSION }} \
            -DCMAKE_CXX_COMPILER=clang++-${{ env.LLVM_VERSION }} \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DLLVM_DIR=/usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/llvm \
            -DMLIR_DIR=/usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/mlir \
            -S hew-codegen
          cmake --build hew-codegen/build -j"$(nproc)"

      - name: Run C++ unit tests (sanitizers)
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/hew-codegen/lsan.supp
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd hew-codegen/build
          ctest --output-on-failure -R "^(mlir_dialect|translate|coro_generator|coro_fib_generator)$"

      - name: Run targeted sanitizer E2E tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/hew-codegen/lsan.supp
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd hew-codegen/build
          ctest --output-on-failure -j"$(nproc)" -R "^(mlirgen|e2e_actor_basic|e2e_vec_basic|e2e_hashmap_basic|e2e_concurrency_concurrent_counter|e2e_concurrency_message_ordering|e2e_memory_.*|e2e_concurrency_.*|coro_generator|coro_fib_generator)$"

  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime ASan — memory safety for the actor runtime
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-asan:
    name: Rust runtime ASan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install llvm-symbolizer (${{ env.LLVM_VERSION }})
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-${{ env.LLVM_VERSION }}

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-runtime-asan/
          key: runtime-asan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-asan-${{ runner.os }}-

      - name: Run hew-runtime ASan tests
        env:
          CARGO_TARGET_DIR: target/sanitizer-runtime-asan
          RUSTFLAGS: -Zsanitizer=address -Cforce-frame-pointers=yes
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/hew-runtime/lsan.supp
          ASAN_SYMBOLIZER_PATH: /usr/lib/llvm-${{ env.LLVM_VERSION }}/bin/llvm-symbolizer
        run: |
          # Nightly Rust supports ASan for this target; UBSan coverage is provided
          # by the C++ sanitizer job above.
          cargo +nightly test --target x86_64-unknown-linux-gnu -p hew-runtime --lib

  # ─────────────────────────────────────────────────────────────────────────
  # Rust runtime TSan — data-race detection for the actor runtime
  #
  # Scope: core concurrency primitives (reply-channel, mailbox, scheduler).
  # Optional features (tokio, quinn, profiler) are excluded to avoid async-
  # runtime instrumentation noise and keep the job focused and fast.
  #
  # continue-on-error: upstream Rust/Cargo build-std + TSan link failures
  # have no clean repo-side fix as of 2026-04 (duplicate lang items, panic-
  # strategy mismatch).  Kept for signal; does not gate releases.
  # ─────────────────────────────────────────────────────────────────────────
  rust-runtime-tsan:
    name: Rust runtime TSan (advisory)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/sanitizer-runtime-tsan/
          key: runtime-tsan-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: runtime-tsan-${{ runner.os }}-

      - name: Run hew-runtime TSan tests
        env:
          CARGO_TARGET_DIR: target/sanitizer-runtime-tsan
          RUSTFLAGS: -Zsanitizer=thread -Cforce-frame-pointers=yes
          # halt_on_error=1 surfaces races immediately rather than summarising
          # them at process exit, which makes CI output easier to triage.
          TSAN_OPTIONS: halt_on_error=1
        run: |
          # --no-default-features excludes the tokio/quinn/profiler optional
          # features; the core runtime concurrency primitives (reply-channel,
          # mailbox, scheduler) are exercised by the lib tests without them.
          # --test-threads=1 avoids two TSan-specific pitfalls: (a) the ~20x
          # slowdown makes timing-sensitive timer tests unreliable under
          # parallel load; (b) single-threaded ensures TSan race reports are
          # isolated to the test that triggered them, not cross-test noise.
          cargo +nightly test \
            --target x86_64-unknown-linux-gnu \
            -p hew-runtime \
            --no-default-features \
            --lib \
            -- --test-threads=1
