# jit: internal — lifecycle, session/global-state, scheduler shutdown/reset/
# drain, and conservative runtime-control hooks that must stay out of any JIT
# session dylib. AOT-linkable only; never JIT-reachable.
#
# Alias-send capability boundary:
#   `hew_actor_send_aliased` and `hew_mailbox_send_aliased` are listed
#   here, NOT in `stable`, because they are an internal runtime seam, not
#   part of the stable external FFI surface.  The native bodies now
#   deliver an aliased message via the envelope-mode enqueue (the
#   envelope's single refcount is released exactly once across every
#   exit; see `send_aliased_with_overflow`), but the codegen alias
#   lowering that drives them is still gated off in `ActorSendOpLowering`
#   until the codegen branch lands, and JIT-reachability / the WASM gate
#   are evaluated in their own slices.  Promote to `stable` (and wire JIT
#   linkage) only when the codegen alias path flips on and the WASM send
#   gate is in place.
internal = [
  "_start",
  "hew_actor_drain_outcome_free",
