# Nextest configuration for the Hew workspace.
# https://nexte.st/docs/configuration/

[profile.default]
# Exclude hew-wasm by default (requires wasmtime).
default-filter = "not package(hew-wasm)"

[profile.ci]
# CI profile: runs all tests and produces JUnit XML for GitHub Actions reporting.
# Exclude test_runner_e2e tests — they invoke `make runtime stdlib` internally
# and are slower than the main nextest path. The same scenarios are covered by
# the ctest E2E suite that runs after the codegen build step.
default-filter = "not package(hew-wasm) - binary(test_runner_e2e)"

[[profile.ci.overrides]]
# Keep nextest's default 60s "slow" threshold, but terminate hung tests on
# Windows before they can consume the full 60-minute job timeout.
platform = { host = 'cfg(target_os = "windows")' }
slow-timeout = { period = "60s", terminate-after = 5 }

[profile.ci.junit]
path = "junit.xml"
