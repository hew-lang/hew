id: unsafe-without-safety
language: rust
severity: warning
message: "`unsafe` block lacks a `// SAFETY:` justification — document why the invariants hold on the line directly above the block (CLAUDE.md §1 Drop Safety / repo unsafe convention)."
note: |
  The repo convention is that every `unsafe { … }` block carries a `// SAFETY: <why>`
  line comment on the line immediately above it (or above the enclosing statement, e.g.
  `// SAFETY: …` then `let x = unsafe { … };`). This rule flags the block expression
  only — it does not touch `unsafe fn` / `unsafe impl` / `unsafe trait` declarations.
  To clear a hit, add a `// SAFETY:` comment stating the invariant the caller/site
  upholds. Severity is `warning`: these are debt to backfill, not a build gate.
files:
  - 'hew-*/src/**'
ignores:
  - '**/tests/**'
  - '**/test/**'
  - '**/*_test.rs'
  - '**/*_tests.rs'
  - '**/tests.rs'
  - '**/benches/**'
rule:
  kind: unsafe_block
  not:
    any:
      # (A) `// SAFETY:` line comment(s) immediately above the block — or above the
      # enclosing statement. The `stopBy` walk skips back over a *contiguous* run of
      # comments, attributes, and `&&`/`||` operators (so a multi-line justification, a
      # `#[cfg(…)]`-gated block, or a `cond && unsafe { … }` boolean guard all still
      # match) and stops at the first real sibling, so a SAFETY comment that belongs to
      # an *earlier statement* cannot leak forward and suppress a genuine gap.
      - follows:
          kind: line_comment
          regex: 'SAFETY'
          stopBy:
            not:
              any:
                - kind: line_comment
                - kind: block_comment
                - kind: attribute_item
                - regex: '^(&&|\|\|)$'
      - inside:
          stopBy: end
          follows:
            kind: line_comment
            regex: 'SAFETY'
            stopBy:
              not:
                any:
                  - kind: line_comment
                  - kind: block_comment
                  - kind: attribute_item
                  - regex: '^(&&|\|\|)$'
      # (B) in-block justification: a `// SAFETY` line comment or `/* SAFETY … */`
      # block comment placed *inside* the block (first line, or alongside the one
      # unsafe op it documents — e.g. the `coro.alloc`/`coro.begin` emitters that put
      # `// SAFETY:` on the `IntValue::new(raw)` tail). Matches a SAFETY comment at any
      # depth inside the block; a block with no SAFETY anywhere inside is still flagged.
      - has:
          kind: block_comment
          regex: 'SAFETY'
          stopBy: end
      - has:
          kind: line_comment
          regex: 'SAFETY'
          stopBy: end
      # (C) inline `#[cfg(test)]` / `#[cfg(all(test, …))]` modules that the `ignores`
      # globs miss — test code follows a relaxed unsafe convention and is out of scope.
      # The `#[cfg(test)]` attribute is a *preceding sibling* of the `mod_item`; walk
      # back through the contiguous attribute/comment run (real mods often carry an
      # intervening `#[allow(…)]` / `#[expect(…)]`) and stop at the first other node so
      # a `cfg(test)` on an unrelated earlier item cannot leak in.
      - inside:
          kind: mod_item
          stopBy: end
          follows:
            kind: attribute_item
            regex: 'cfg\(.*\btest\b'
            stopBy:
              not:
                any:
                  - kind: attribute_item
                  - kind: line_comment
                  - kind: block_comment
