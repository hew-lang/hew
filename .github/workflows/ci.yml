name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  security-events: write

env:
  LLVM_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Path change detection — skip heavy jobs for doc-only changes
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/*.cpp'
              - '**/*.h'
              - '**/*.td'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/CMakeLists.txt'
              - 'hew-codegen/**'
              - 'std/**'
              - 'examples/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            playground:
              - 'hew-wasm/**'
              - 'examples/playground/**'
              - 'scripts/gen-playground-manifest.py'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  # ─────────────────────────────────────────────────────────────────────────
  # Lint — fast feedback on code quality (always runs, ~1.5 min)
  # Produces SARIF output for GitHub Code Scanning inline annotations.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Clippy & format
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: lint-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install SARIF tools
        run: |
          gh release download clippy-sarif-latest --repo psastras/sarif-rs \
            --pattern "clippy-sarif-x86_64-unknown-linux-gnu" --output clippy-sarif --clobber
          gh release download sarif-fmt-latest --repo psastras/sarif-rs \
            --pattern "sarif-fmt-x86_64-unknown-linux-gnu" --output sarif-fmt --clobber
          chmod +x clippy-sarif sarif-fmt
          mv clippy-sarif sarif-fmt /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clippy
        run: |
          set -o pipefail
          cargo clippy --workspace --tests --message-format=json -- -D warnings \
            | clippy-sarif \
            | tee clippy-results.sarif \
            | sarif-fmt

      - name: Upload Clippy SARIF
        if: always() && hashFiles('clippy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: clippy-results.sarif
          category: clippy
          wait-for-processing: true

  # ─────────────────────────────────────────────────────────────────────────
  # Browser/playground smoke — repo-local browser tooling coverage only.
  # It checks manifest drift and hew-wasm build breakage; the curated WASI
  # runtime proof runs in the heavier codegen-capable build-and-test lane.
  # ─────────────────────────────────────────────────────────────────────────
  playground-wasm-build:
    name: Playground WASM build
    needs: changes
    if: needs.changes.outputs.playground == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: playground-wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: playground-wasm-${{ runner.os }}-

      - uses: taiki-e/install-action@wasm-pack

      - name: Run hew-wasm library smoke tests
        run: cargo test -p hew-wasm --lib

      - name: Check repo-local playground browser/tooling smoke
        run: make playground-check

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — Rust workspace tests + hew-codegen E2E (single LLVM install)
  # Produces JUnit XML for GitHub Actions test reporting.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & test (Rust + codegen E2E)
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy Linux CI while satisfying the required check."

      - uses: actions/checkout@v4
        if: env.RUN_CODE_PATH == 'true'

      - name: Install LLVM ${{ env.LLVM_VERSION }} + MLIR
        if: env.RUN_CODE_PATH == 'true'
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build \
            llvm-${{ env.LLVM_VERSION }}-dev \
            libmlir-${{ env.LLVM_VERSION }}-dev \
            mlir-${{ env.LLVM_VERSION }}-tools \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            libssl-dev pkg-config

      - name: Configure embedded codegen toolchain (Linux)
        if: env.RUN_CODE_PATH == 'true'
        run: |
          echo "LLVM_PREFIX=/usr/lib/llvm-${{ env.LLVM_VERSION }}" >> "$GITHUB_ENV"
          echo "CC=clang-${{ env.LLVM_VERSION }}" >> "$GITHUB_ENV"
          echo "CXX=clang++-${{ env.LLVM_VERSION }}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'

      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      # Include hew-codegen C++ sources in the cache key so that a stale cmake
      # build dir inside target/ is never reused when codegen source files change.
      # Without this, build.rs restores a cached $OUT_DIR/hew-codegen-cmake whose
      # CMakeCache.txt may contain stale LLVM paths, causing cmake re-configure to
      # fail and hew-cli to link with missing symbols.
      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: build-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'hew-codegen/**/*.cpp', 'hew-codegen/**/*.h', 'hew-codegen/**/CMakeLists.txt', 'hew-codegen/**/*.td') }}
          restore-keys: |
            build-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
            build-test-${{ runner.os }}-

      - name: Cache hew-codegen build
        if: env.RUN_CODE_PATH == 'true'
        uses: actions/cache@v4
        with:
          path: hew-codegen/build
          key: hew-codegen-build-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('hew-codegen/**/*.cpp', 'hew-codegen/**/*.h', 'hew-codegen/**/CMakeLists.txt', 'hew-codegen/**/*.td') }}
          restore-keys: hew-codegen-build-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-

      # Build hew-codegen (C++ MLIR backend) before any Rust step that links
      # hew-cli.  hew-cli's build.rs invokes cmake independently, but requires a
      # working LLVM cmake configure.  Running the explicit cmake steps first
      # ensures the hew-codegen/build tree is populated on every cache miss, and
      # exercises the cmake configure path before cargo attempts to link.
      - name: Configure hew-codegen
        if: env.RUN_CODE_PATH == 'true'
        run: |
          cd hew-codegen
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/llvm \
            -DMLIR_DIR=/usr/lib/llvm-${{ env.LLVM_VERSION }}/lib/cmake/mlir

      - name: Build hew-codegen
        if: env.RUN_CODE_PATH == 'true'
        run: cmake --build hew-codegen/build -j"$(nproc)"

      - name: Build Rust runtime and frontend (release)
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-cli -p hew-runtime -p hew-serialize -p hew-lsp --release

      - name: Smoke test hew-lsp
        if: env.RUN_CODE_PATH == 'true'
        run: ./target/release/hew-lsp --version

      - name: Build hew binary (debug — needed by test_runner tests)
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-cli

      - name: Build WASM runtime
        if: env.RUN_CODE_PATH == 'true'
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Install wasmtime
        if: env.RUN_CODE_PATH == 'true'
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Run curated playground WASI runtime preflight
        if: env.RUN_CODE_PATH == 'true'
        run: make playground-wasi-check

      - name: Run WASM runtime actual-target libtests
        if: env.RUN_CODE_PATH == 'true'
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime run
        run: cargo test -p hew-runtime --target wasm32-wasip1 --no-default-features --lib

      - name: Build libhew.a (runtime + stdlib)
        if: env.RUN_CODE_PATH == 'true'
        # Build both release and debug so workspace tests that run the debug
        # hew binary do not pick up a stale cached target/debug/libhew.a.
        run: |
          cargo build -p hew-lib --release
          cargo build -p hew-lib

      # Default features include "full" (encryption + profiler + quic),
      # so all 33 QUIC transport tests run without an explicit flag. hew-wasm
      # browser/tooling smoke stays isolated in playground-wasm-build.
      - name: Run Rust workspace tests
        if: env.RUN_CODE_PATH == 'true'
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci

      - name: Run codegen unit tests
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cd hew-codegen/build &&
          ctest --output-on-failure --output-junit codegen-unit.xml
          -R "^(mlir_dialect|translate)$"

      - name: Run codegen E2E tests (native)
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cd hew-codegen/build &&
          ctest --output-on-failure --output-junit codegen-e2e-native.xml
          -j"$(nproc)" -LE wasm -E "^(mlir_dialect|translate)$"

      - name: Run codegen E2E tests (WASM)
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cd hew-codegen/build &&
          ctest --output-on-failure --output-junit codegen-e2e-wasm.xml
          -j"$(nproc)" -L wasm

      - name: Upload test reports
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: |
            target/nextest/ci/junit.xml
            hew-codegen/build/codegen-unit.xml
            hew-codegen/build/codegen-e2e-native.xml
            hew-codegen/build/codegen-e2e-wasm.xml
          check_name: Test Results (Linux)

  # ─────────────────────────────────────────────────────────────────────────
  # Code coverage — Rust workspace tests instrumented with cargo-llvm-cov
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Code coverage
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy coverage work while satisfying the required check."

      - uses: actions/checkout@v4
        if: env.RUN_CODE_PATH == 'true'

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'
        with:
          components: llvm-tools

      - uses: taiki-e/install-action@cargo-llvm-cov
        if: env.RUN_CODE_PATH == 'true'
      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: coverage-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: coverage-${{ runner.os }}-

      - name: Run tests with coverage
        if: env.RUN_CODE_PATH == 'true'
        # Default features include "full" (encryption + profiler + quic),
        # so all QUIC transport tests are covered without an explicit flag.
        # hew-cli is excluded because it requires LLVM/MLIR to link its
        # embedded codegen; coverage focuses on the Rust frontend crates.
        run: >
          cargo llvm-cov nextest
          --workspace --exclude hew-wasm --exclude hew-cli
          --lcov --output-path lcov.info

      - name: Generate HTML report
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cargo llvm-cov report
          --html --output-dir coverage-html

      - name: Coverage summary
        if: env.RUN_CODE_PATH == 'true'
        run: cargo llvm-cov report | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage (lcov)
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload coverage (HTML)
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — Windows (LLVM provisioning deferred)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test-windows:
    name: Build & test (Windows)
    needs: changes
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy Windows CI while satisfying the required check."
        shell: pwsh

      - uses: actions/checkout@v4
        if: env.RUN_CODE_PATH == 'true'

      - name: Install build tools
        if: env.RUN_CODE_PATH == 'true'
        run: choco install ninja cmake -y
        shell: pwsh

      # TODO: LLVM+MLIR provisioning (build from source, pre-built artifact, or installer)

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'

      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~\.cargo\registry\
            ~\.cargo\git\
            target\
          key: build-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-test-${{ runner.os }}-

      - name: Build Rust crates
        if: env.RUN_CODE_PATH == 'true'
        # hew-cli requires LLVM/MLIR for its embedded codegen; use check
        # (type-check only) until LLVM provisioning is set up on Windows.
        run: |
          cargo check -p hew-cli --release
          cargo build -p adze-cli -p hew-runtime -p hew-lsp --release

      - name: Run Rust workspace tests (no codegen)
        if: env.RUN_CODE_PATH == 'true'
        # hew-wasm requires wasmtime; hew-cabi has #[no_mangle] symbols
        # that conflict with hew-runtime when both are linked into a
        # test binary (duplicate symbol errors).
        # hew-cli is excluded because it requires LLVM/MLIR to link its
        # embedded codegen; Windows LLVM provisioning is not yet set up.
        # Default features include "full" (encryption + profiler + quic),
        # so all QUIC transport tests run without an explicit flag.
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --exclude hew-cli
          --profile ci

      - name: Upload test reports
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results (Windows)

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — macOS (Apple Silicon)
  #
  # Run Rust workspace tests and hew-codegen E2E on macOS arm64.
  # Homebrew ships LLVM 22 bottles for Apple Silicon runners.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test-macos:
    name: Build & test (macOS arm64)
    needs: changes
    runs-on: macos-14
    timeout-minutes: 60
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy macOS arm64 CI while satisfying the required check."

      - uses: actions/checkout@v4
        if: env.RUN_CODE_PATH == 'true'

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          # Include hew-codegen C++ sources in the cache key so that a stale cmake
          # build dir inside target/ is never reused when codegen source files change.
          key: build-test-${{ runner.os }}-arm64-macos13-${{ hashFiles('**/Cargo.lock', 'hew-codegen/**/*.cpp', 'hew-codegen/**/*.h', 'hew-codegen/**/CMakeLists.txt', 'hew-codegen/**/*.td') }}
          restore-keys: |
            build-test-${{ runner.os }}-arm64-macos13-${{ hashFiles('**/Cargo.lock') }}
            build-test-${{ runner.os }}-arm64-macos13-

      - name: Install LLVM/MLIR
        if: env.RUN_CODE_PATH == 'true'
        run: |
          brew install llvm@${{ env.LLVM_VERSION }} lld ninja
          LLVM_PREFIX="$(brew --prefix llvm@${{ env.LLVM_VERSION }})"
          LLD_PREFIX="$(brew --prefix lld)"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "${LLD_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=13.0" >> "$GITHUB_ENV"
          # Record the concrete patch version so cache keys bust on Homebrew patch upgrades.
          LLVM_VERSION_FULL="$("${LLVM_PREFIX}/bin/llvm-config" --version)"
          echo "LLVM_VERSION_FULL=${LLVM_VERSION_FULL}" >> "$GITHUB_ENV"

      - name: Cache hew-codegen build
        if: env.RUN_CODE_PATH == 'true'
        uses: actions/cache@v4
        with:
          path: hew-codegen/build
          key: hew-codegen-build-${{ runner.os }}-arm64-macos13-llvm${{ env.LLVM_VERSION_FULL }}-${{ hashFiles('hew-codegen/**/*.cpp', 'hew-codegen/**/*.h', 'hew-codegen/**/CMakeLists.txt', 'hew-codegen/**/*.td') }}
          restore-keys: hew-codegen-build-${{ runner.os }}-arm64-macos13-llvm${{ env.LLVM_VERSION_FULL }}-

      # Build hew-codegen (C++ MLIR backend) before any Rust step that links
      # hew-cli.  hew-cli's build.rs invokes cmake independently, but requires a
      # working LLVM cmake configure.  Running the explicit cmake steps first
      # ensures the hew-codegen/build tree is populated on every cache miss, and
      # exercises the cmake configure path before cargo attempts to link.
      - name: Configure hew-codegen
        if: env.RUN_CODE_PATH == 'true'
        run: |
          cd hew-codegen
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${LLVM_PREFIX}/bin/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_PREFIX}/bin/clang++" \
            -DCMAKE_OSX_SYSROOT="$(xcrun --show-sdk-path)" \
            -DCMAKE_EXE_LINKER_FLAGS="-L${LLVM_PREFIX}/lib/c++ -Wl,-rpath,${LLVM_PREFIX}/lib/c++" \
            -DHEW_STATIC_LINK=ON \
            -DLLVM_DIR="${LLVM_PREFIX}/lib/cmake/llvm" \
            -DMLIR_DIR="${LLVM_PREFIX}/lib/cmake/mlir"

      - name: Build hew-codegen
        if: env.RUN_CODE_PATH == 'true'
        run: cmake --build hew-codegen/build -j"$(sysctl -n hw.ncpu)"

      - name: Build libhew.a (runtime + stdlib)
        if: env.RUN_CODE_PATH == 'true'
        # Build both release and debug so that CLI e2e tests (which run the
        # debug hew binary) can find target/debug/libhew.a without relying on
        # make runtime stdlib running inside the test process.
        run: |
          cargo build -p hew-lib --release
          cargo build -p hew-lib

      - name: Build frontend (release + debug)
        if: env.RUN_CODE_PATH == 'true'
        run: |
          cargo build -p hew-cli -p hew-serialize --release
          cargo build -p hew-cli

      - name: Install WASI runner prerequisites
        if: env.RUN_CODE_PATH == 'true'
        run: |
          rustup target add wasm32-wasip1
          brew install wasmtime
          wasmtime --version
          command -v wasm-ld
          wasm-ld --version

      - name: Run Rust workspace tests
        if: env.RUN_CODE_PATH == 'true'
        # hew-wasm stays excluded in this macOS PR gate, but hew-cli's WASI
        # runner e2e tests now require wasmtime plus the wasm32-wasip1 target.
        # Both target/release/libhew.a and target/debug/libhew.a are pre-built
        # above so CLI e2e tests that invoke `hew run` find the right one.
        run: >
          cargo nextest run --workspace --exclude hew-wasm
          --profile ci

      - name: Run codegen unit tests
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cd hew-codegen/build &&
          ctest --output-on-failure --output-junit codegen-unit.xml
          -R "^(mlir_dialect|translate)$"

      - name: Run codegen E2E tests (native)
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cd hew-codegen/build &&
          ctest --output-on-failure --output-junit codegen-e2e-native.xml
          -j"$(sysctl -n hw.ncpu)" -LE wasm -E "^(mlir_dialect|translate)$"
