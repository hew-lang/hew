name: Setup LLVM
description: >
  Download and cache a pinned LLVM upstream binary release (from
  github.com/llvm/llvm-project releases), verify its SHA256, extract it
  to the runner's tool cache, and export LLVM_SYS_221_PREFIX plus the
  bin/ directory on PATH. Supports Linux x86_64, Linux arm64, macOS arm64, and
  Windows x86_64 on hosted GitHub Actions runners.

inputs:
  version:
    description: LLVM upstream release version (matches the llvmorg-<version> tag).
    required: false
    default: "22.1.5"

outputs:
  prefix:
    description: Absolute path to the extracted LLVM install root (suitable for LLVM_SYS_*_PREFIX or LLVM_DIR roots).
    value: ${{ steps.layout.outputs.prefix }}

runs:
  using: composite
  steps:
    # Resolve the per-platform asset name, expected sha256 (pinned from the
    # sigstore attestations published alongside each release tarball at
    # github.com/llvm/llvm-project/releases), extraction subdirectory name,
    # and install root path. Keeping these in one step makes future version
    # bumps a single-file edit.
    - name: Resolve LLVM asset metadata
      id: layout
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.version }}"
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)
            asset="LLVM-${version}-Linux-X64.tar.xz"
            subdir="LLVM-${version}-Linux-X64"
            ;;
          Linux-ARM64)
            asset="LLVM-${version}-Linux-ARM64.tar.xz"
            subdir="LLVM-${version}-Linux-ARM64"
            ;;
          macOS-ARM64)
            asset="LLVM-${version}-macOS-ARM64.tar.xz"
            subdir="LLVM-${version}-macOS-ARM64"
            ;;
          Windows-X64)
            # The official upstream Windows tarball statically embeds rpmalloc
            # (defines malloc/free/calloc -> duplicate symbols against ucrt at
            # lld-link time) and omits xml2s.lib. Use the repo's own LLVM build
            # published under the toolchain/llvm-22.1.0-windows-msvc-v3 release.
            asset="hew-llvm-22.1.0-windows-msvc-v3.tar.gz"
            # The prebuild workflow tars from C:\ with root llvm-22/ .
            subdir="llvm-22"
            ;;
          *)
            echo "::error::No upstream LLVM binary asset known for ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac
        # SHA256 digests pinned from
        # https://github.com/llvm/llvm-project/releases/download/llvmorg-${version}/${asset}.jsonl
        # (sigstore in-toto attestation, subject digest).
        case "${asset}" in
          "LLVM-22.1.5-Linux-X64.tar.xz")
            sha256="04dfa3ab6f1c332dd73a057daeb8f48cdaacdef24178f8eccddf2cbfa8944aa4"
            ;;
          "LLVM-22.1.5-Linux-ARM64.tar.xz")
            sha256="05e303cf01a97ca2a11e42e75ade839e85af274f84573554c5e5c05f714be989"
            ;;
          "LLVM-22.1.5-macOS-ARM64.tar.xz")
            sha256="c4e5aa26d5bb9938237fa1626fe3b0506887b50026bac785b85dd3314be8d5e6"
            ;;
          "hew-llvm-22.1.0-windows-msvc-v3.tar.gz")
            # Verified against the companion .sha256 asset on the toolchain
            # release at download time (sha256="companion" sentinel).
            sha256="companion"
            ;;
          *)
            echo "::error::No pinned SHA256 for asset ${asset}. Update .github/actions/setup-llvm/action.yml when bumping the version."
            exit 1
            ;;
        esac
        if [ -n "${RUNNER_TOOL_CACHE:-}" ]; then
          install_root="${RUNNER_TOOL_CACHE}/llvm/${version}"
        else
          install_root="${RUNNER_TEMP}/llvm/${version}"
        fi
        # Windows runners hand back paths with backslashes via env vars;
        # subsequent tar/curl invocations under Git Bash mishandle the
        # mixed separators. Normalise to POSIX whenever cygpath is around.
        if command -v cygpath >/dev/null 2>&1; then
          install_root="$(cygpath -u "${install_root}")"
        fi
        mkdir -p "${install_root}"
        prefix="${install_root}/${subdir}"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "asset=${asset}" >> "$GITHUB_OUTPUT"
        echo "subdir=${subdir}" >> "$GITHUB_OUTPUT"
        echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
        echo "install_root=${install_root}" >> "$GITHUB_OUTPUT"
        echo "prefix=${prefix}" >> "$GITHUB_OUTPUT"

    - name: Cache extracted LLVM
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.layout.outputs.prefix }}
        key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ steps.layout.outputs.version }}-${{ steps.layout.outputs.sha256 }}

    # The extracted tree is ~5-8 GB; the tarball itself is ~1.8 GB. We cache
    # the extracted directory (skip re-extract cost) and re-download on miss
    # rather than caching the tarball.
    - name: Download and verify LLVM tarball
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        asset="${{ steps.layout.outputs.asset }}"
        if [[ "${asset}" == hew-llvm-* ]]; then
          url="https://github.com/hew-lang/hew/releases/download/toolchain/llvm-22.1.0-windows-msvc-v3/${asset}"
        else
          url="https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ steps.layout.outputs.version }}/${asset}"
        fi
        tarball="${RUNNER_TEMP}/${{ steps.layout.outputs.asset }}"
        install_root="${{ steps.layout.outputs.install_root }}"
        if command -v cygpath >/dev/null 2>&1; then
          tarball="$(cygpath -u "${tarball}")"
        fi
        echo "Downloading ${url}"
        curl -fL --retry 3 --retry-delay 5 -o "${tarball}" "${url}"
        expected="${{ steps.layout.outputs.sha256 }}"
        if [ "${expected}" = "companion" ]; then
          curl -fL --retry 3 -o "${tarball}.companion" "${url}.sha256"
          expected="$(awk '{print $1}' "${tarball}.companion")"
        fi
        echo "${expected}  ${tarball}" > "${tarball}.sha256"
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c "${tarball}.sha256"
        else
          # macOS shasum fallback
          shasum -a 256 -c "${tarball}.sha256"
        fi
        echo "Extracting to ${install_root}"
        case "${tarball}" in
          *.tar.gz) tar -xzf "${tarball}" -C "${install_root}" ;;
          *) tar -xJf "${tarball}" -C "${install_root}" ;;
        esac
        rm -f "${tarball}" "${tarball}.sha256"

    - name: Stub xml2s.lib for the upstream Windows tarball
      if: runner.os == 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        # The upstream LLVM Windows tarball is built with LLVM_ENABLE_LIBXML2=ON
        # but ships no xml2s.lib, so lld-link fails to open it when linking
        # anything against llvm-sys. The xml2 symbols are never exercised by
        # the Hew codegen path; an empty import library satisfies the linker.
        # Verified workaround tracked in #1788; obsolete when the toolchain
        # moves to a tarball built with LLVM_ENABLE_LIBXML2=OFF.
        prefix="${{ steps.layout.outputs.prefix }}"
        if [ ! -f "${prefix}/lib/xml2s.lib" ]; then
          # An import library is an ar archive; an empty archive (global
          # header only) satisfies lld-link's open AND resolves nothing,
          # which is exactly right — no tool dependency (llvm-lib does not
          # implement /DEF).
          printf '!<arch>\n' > "${prefix}/lib/xml2s.lib"
          test -s "${prefix}/lib/xml2s.lib" || { echo "::error::xml2s.lib stub was not created"; exit 1; }
          echo "Stubbed ${prefix}/lib/xml2s.lib"
        fi

    - name: Export LLVM environment
      shell: bash
      run: |
        set -euo pipefail
        prefix="${{ steps.layout.outputs.prefix }}"
        # llvm-sys-221 honours LLVM_SYS_221_PREFIX; inkwell follows.
        # Export only the llvm-sys prefix and PATH here; the Rust backend no
        # longer needs extra backend-specific environment setup.
        # On Windows the prefix arrives in POSIX form (under cygpath -u)
        # but llvm-sys's build script invokes Windows-native APIs against
        # it, so it needs to be a backslash path. Convert back here.
        if command -v cygpath >/dev/null 2>&1; then
          prefix="$(cygpath -w "${prefix}")"
        fi
        echo "LLVM_SYS_221_PREFIX=${prefix}" >> "$GITHUB_ENV"
        echo "${prefix}/bin" >> "$GITHUB_PATH"
