# Stable JIT host ABI classification for hew-runtime exports.
#
# The verifier treats every #[no_mangle] extern "C" fn in hew-runtime/src/
# as part of the candidate host ABI and requires it to appear exactly once
# in one of the three lists below. Keep entries sorted for stable diffs.
#
# Three-tier model (rationale: Option A chosen over Option B for substrate
# clarity — the tier boundary is a compile-time contract, not just a doc claim):
#
#   stable         — handle-oriented, user-visible runtime surface that
#                    `extern "rt"` declarations in user code may name directly,
#                    and that JIT hosts must expose in their symbol map.
#
#   codegen-stable — symbols the compiler emits into generated IR for non-trivial
#                    actor programs (cooperate safepoints, task-scope wiring,
#                    actor-state locking, execution-context access, scheduler
#                    bootstrap). These are NOT user-callable via `extern "rt"`;
#                    the checker rejects any attempt. JIT hosts must provide
#                    them alongside the stable tier.
#
#   internal       — lifecycle, session/global-state, scheduler shutdown/reset/
#                    drain, and conservative runtime-control hooks. Never
#                    JIT-reachable. AOT-linkable only.

# jit: stable — handle-oriented/user-visible runtime surface that JIT
# modules may reference directly.
