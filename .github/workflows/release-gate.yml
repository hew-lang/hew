# Pre-Release Cross-Platform Gate
#
# Validates that the release candidate commit builds and passes tests on all
# CI-supported platforms BEFORE tagging.  This workflow should be at least as
# comprehensive as the main CI for the crates shipped in a release tarball.
#
# Trigger:
#   - Push to a release/* or release-* branch
#   - Manual dispatch (workflow_dispatch)
#
# Coverage vs. ci.yml:
#   - Builds ALL release artifacts (hew-cli, adze-cli, hew-lsp, hew-lib)
#   - Runs full Rust workspace tests (matching ci.yml scope)
#   - Smoke-tests the compile+run pipeline with a trivial .hew program
#
# NOT covered here (run separately before tagging):
#   - FreeBSD (nightly via freebsd.yml or local `make pre-release PLATFORMS=freebsd`)
#   - Sanitizers (nightly via nightly-sanitizers.yml)

name: Pre-Release Cross-Platform Gate

on:
  push:
    branches:
      - 'release/**'
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Linux x86_64 — full build + codegen E2E + WASM (matches ci.yml)
  # ─────────────────────────────────────────────────────────────────────────
  gate-linux:
    name: Release Gate — Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          # hew-codegen-rs (inkwell -> llvm-sys-221) requires LLVM 22's
          # headers and libraries during cargo build.
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            llvm-${{ env.LLVM_VERSION }}-dev \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            libssl-dev pkg-config \
            zlib1g-dev libzstd-dev

      - name: Configure toolchain
        run: |
          {
            echo "LLVM_PREFIX=/usr/lib/llvm-${{ env.LLVM_VERSION }}"
            echo "CC=clang-${{ env.LLVM_VERSION }}"
            echo "CXX=clang++-${{ env.LLVM_VERSION }}"
          } >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: release-gate-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-gate-linux-

      - name: Build all release crates
        run: |
          cargo build -p hew-cli -p adze-cli -p hew-lsp --release
          cargo build -p hew-lib --release

      - name: Build WASM runtime
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Verify release binaries
        run: |
          target/release/hew --version
          target/release/adze --version
          target/release/hew-lsp --version
          test -f target/release/libhew.a && echo "✅ libhew.a exists"

      - name: Smoke test — compile and run a .hew program
        run: |
          echo 'fn main() { println("smoke-ok") }' > _smoke.hew
          target/release/hew _smoke.hew -o _smoke_bin
          chmod +x _smoke_bin
          OUTPUT=$(./_smoke_bin)
          rm -f _smoke.hew _smoke_bin
          echo "$OUTPUT" | grep -q "smoke-ok" && echo "✅ Smoke test passed"

      - name: Install WASI prerequisites
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.wasmtime/bin:$PATH"
          command -v wasmtime
          wasmtime --version

      - name: Run Rust workspace tests
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci

  # ─────────────────────────────────────────────────────────────────────────
  # Linux aarch64 — full Rust build + workspace tests + WASM
  # ─────────────────────────────────────────────────────────────────────────
  gate-linux-aarch64:
    name: Release Gate — Linux aarch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          # Keep Linux arm64 on Noble / ubuntu-24.04-arm to match release.yml.
          # apt.llvm.org/bookworm arm64 does not publish the LLVM 22 packages
          # this gate needs.
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            llvm-${{ env.LLVM_VERSION }}-dev \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            libssl-dev pkg-config \
            zlib1g-dev libzstd-dev

      - name: Configure toolchain
        run: |
          {
            echo "LLVM_PREFIX=/usr/lib/llvm-${{ env.LLVM_VERSION }}"
            echo "CC=clang-${{ env.LLVM_VERSION }}"
            echo "CXX=clang++-${{ env.LLVM_VERSION }}"
          } >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: release-gate-linux-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-gate-linux-aarch64-

      - name: Build all release crates
        run: |
          cargo build -p hew-cli -p adze-cli -p hew-lsp --release
          cargo build -p hew-lib --release

      - name: Build WASM runtime
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Verify release binaries
        run: |
          target/release/hew --version
          target/release/adze --version
          target/release/hew-lsp --version
          test -f target/release/libhew.a && echo "✅ libhew.a exists"

      - name: Smoke test — compile and run a .hew program
        run: |
          echo 'fn main() { println("smoke-ok") }' > _smoke.hew
          target/release/hew _smoke.hew -o _smoke_bin
          chmod +x _smoke_bin
          OUTPUT=$(./_smoke_bin)
          rm -f _smoke.hew _smoke_bin
          echo "$OUTPUT" | grep -q "smoke-ok" && echo "✅ Smoke test passed"

      - name: Install WASI prerequisites
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.wasmtime/bin:$PATH"
          command -v wasmtime
          wasmtime --version

      - name: Run Rust workspace tests
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci

  # ─────────────────────────────────────────────────────────────────────────
  # macOS arm64 — full Rust build + workspace tests
  # ─────────────────────────────────────────────────────────────────────────
  gate-macos:
    name: Release Gate — macOS arm64
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: taiki-e/install-action@nextest

      - name: Install LLVM
        run: |
          # hew-codegen-rs (inkwell -> llvm-sys-221) needs LLVM 22's static
          # libraries during cargo build.
          brew install llvm@${{ env.LLVM_VERSION }} lld@${{ env.LLVM_VERSION }}
          LLVM_PREFIX="$(brew --prefix llvm@${{ env.LLVM_VERSION }})"
          LLD_PREFIX="$(brew --prefix lld@${{ env.LLVM_VERSION }})"
          {
            echo "LLVM_PREFIX=${LLVM_PREFIX}"
            echo "LLD_PREFIX=${LLD_PREFIX}"
            echo "CC=${LLVM_PREFIX}/bin/clang"
            echo "CXX=${LLVM_PREFIX}/bin/clang++"
            echo "MACOSX_DEPLOYMENT_TARGET=13.0"
          } >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "${LLD_PREFIX}/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: release-gate-macos-arm64-macos13-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-gate-macos-arm64-macos13-

      - name: Build all release crates
        run: |
          cargo build -p hew-cli -p adze-cli -p hew-lsp --release
          cargo build -p hew-lib --release

      - name: Verify release binaries
        run: |
          target/release/hew --version
          target/release/adze --version
          target/release/hew-lsp --version
          test -f target/release/libhew.a && echo "✅ libhew.a exists"

      - name: Smoke test — compile and run a .hew program
        run: |
          echo 'fn main() { println("smoke-ok") }' > _smoke.hew
          target/release/hew _smoke.hew -o _smoke_bin
          chmod +x _smoke_bin
          OUTPUT=$(./_smoke_bin)
          rm -f _smoke.hew _smoke_bin
          echo "$OUTPUT" | grep -q "smoke-ok" && echo "✅ Smoke test passed"

      - name: Install WASI prerequisites
        run: |
          rustup target add wasm32-wasip1
          brew install wasmtime
          LLVM_PREFIX="${LLVM_PREFIX:-$(brew --prefix llvm@${{ env.LLVM_VERSION }})}"
          LLD_PREFIX="${LLD_PREFIX:-$(brew --prefix lld@${{ env.LLVM_VERSION }})}"
          export PATH="${LLD_PREFIX}/bin:${LLVM_PREFIX}/bin:$PATH"
          command -v wasmtime
          wasmtime --version
          command -v wasm-ld
          wasm-ld --version

      - name: Run Rust workspace tests
        run: cargo nextest run --workspace --exclude hew-wasm --profile ci

  # ─────────────────────────────────────────────────────────────────────────
  # Windows x86_64 — Rust workspace tests
  # ─────────────────────────────────────────────────────────────────────────
  gate-windows:
    name: Release Gate — Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\
            ~\.cargo\git\
            target\
          key: release-gate-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-gate-windows-

      - name: Install LLVM 22
        uses: ./.github/actions/setup-llvm
        with:
          version: 22.1.5

      - name: Build release crates
        run: |
          cargo build -p adze-cli -p hew-lsp -p hew-cli --release

      - name: Verify binaries
        shell: bash
        run: |
          target/release/adze.exe --version && echo "adze runs"
          target/release/hew-lsp.exe --version && echo "hew-lsp runs"

      - name: Run Rust workspace tests
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci
