# FreeBSD CI — nightly regression testing on FreeBSD 15.0
#
# FreeBSD is a tier-1 platform. LLVM 22 is available via FreeBSD `pkg`
# (llvm22-22.1.2 on FreeBSD 15.0 latest), so no source build is needed.
# Uses vmactions/freebsd-vm@v1 to run FreeBSD in QEMU on an Ubuntu host.

name: FreeBSD CI

on:
  schedule:
    # Run daily at 07:00 UTC (after nightly-sanitizers at 06:00)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & test (FreeBSD x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a  # v1.4.6
        with:
          release: "15.0"
          mem: 8192
          prepare: |
            mkdir -p /usr/local/etc/pkg/repos
            printf 'FreeBSD: { url: "pkg+https://pkg.FreeBSD.org/${ABI}/latest", mirror_type: "srv", enabled: yes }\n' \
              > /usr/local/etc/pkg/repos/FreeBSD.conf
            pkg update -f
            pkg install -y llvm22 rust cmake ninja git pkgconf libffi libxml2 wasmtime

          run: |
            set -eux

            export LLVM_SYS_221_PREFIX=/usr/local/llvm22
            /usr/local/llvm22/bin/llvm-config --version

            # The wasm codegen tests link with wasm-ld from the pkg LLVM tree.
            ln -sf /usr/local/llvm22/bin/wasm-ld /usr/local/bin/wasm-ld
            command -v wasmtime && wasmtime --version
            command -v wasm-ld && wasm-ld --version

            # ── Rust builds ────────────────────────────────────────────────
            # Build runtime (release + debug for E2E tests)
            cargo build -p hew-runtime --release
            cargo build -p hew-runtime

            # Build frontend and tools (release)
            cargo build -p hew-cli --release

            # Build frontend (debug — needed by some tests)
            cargo build -p hew-cli

            # Build the consolidated standard library
            cargo build --release -p hew-std

            # ── Tests ──────────────────────────────────────────────────────

            # Install cargo-nextest for slow-timeout envelope (FreeBSD's pkg
            # does not yet carry cargo-nextest, so install via cargo).
            cargo install cargo-nextest --locked

            # Rust workspace tests. Exclude only executable WASI cases that
            # need a rustup-managed wasm32-wasip1 target; retain rejection and
            # native parity coverage.
            # Default features include "full" (encryption + profiler + quic),
            # so all QUIC transport tests run without an explicit flag.
            # The ci profile applies the same slow-timeout = 3x60 s envelope
            # as all other platforms, replacing the previous bare cargo test.
            cargo nextest run --workspace \
              --exclude hew-wasm --exclude hew-cabi \
              -E 'not ((test(eval_wasm) & not test(reject)) | (binary(wasi_run_e2e) & not test(native_)))' \
              --profile ci --no-fail-fast
