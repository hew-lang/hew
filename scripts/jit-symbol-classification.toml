# jit: internal — lifecycle, session/global-state, scheduler shutdown/reset/
# drain, and conservative runtime-control hooks that must stay out of any JIT
# session dylib. AOT-linkable only; never JIT-reachable.
#
# Alias-send capability boundary:
#   `hew_actor_send_aliased` and `hew_mailbox_send_aliased` are listed
#   here, NOT in `stable`, because they are an internal runtime seam, not
#   part of the stable external FFI surface.  The native bodies now
#   deliver an aliased message via the envelope-mode enqueue (the
#   envelope's single refcount is released exactly once across every
#   exit; see `send_aliased_with_overflow`), but the codegen alias
#   lowering that drives them is still gated off in `ActorSendOpLowering`
#   until the codegen branch lands, and JIT-reachability / the WASM gate
#   are evaluated in their own slices.  Promote to `stable` (and wire JIT
#   linkage) only when the codegen alias path flips on and the WASM send
#   gate is in place.
internal = [
  "_start",
  "hew_actor_drain_outcome_free",
  "hew_actor_drain_set",
  "hew_actor_state_lock_poison_after_panic",
  "hew_actor_state_lock_release_after_panic",
  "hew_actor_register_type",
  "hew_actor_send_aliased",
  "hew_machine_emit_step_exit",
  "hew_deterministic_get_seed",
  "hew_deterministic_reset",
  "hew_deterministic_set_seed",
  # Test-introspection probe: returns the total RemoteWatcher count across the
  # target-side monitor table. Used by two-process fixtures to assert bounded
  # table growth after a watcher node dies. Not user-callable; not JIT-reachable.
  "hew_dist_monitor_remote_watcher_count",
  # Test-introspection probe: returns the monotonic cumulative count of
  # target-side RemoteWatcher registrations ever accepted. Used by two-process
  # monitor fixtures to derive registration from an event counter instead of
  # sampling the transient live count. Not user-callable; not
  # JIT-reachable.
  "hew_dist_monitor_remote_watcher_registered_total",
  "hew_dist_monitor_current_actor_ref_id",
  "hew_dist_monitor_pending_observation_count",
  # Test-introspection probe: returns the current actor's id (-1 outside a
  # dispatch). A linker actor reports its id so a two-process link fixture can
  # poll its terminal state. Not user-callable; not JIT-reachable.
  "hew_actor_self_id",
  # Test-introspection probe: returns the recorded terminal reason for an actor
  # id (or a sentinel while live), from the HEW_LINK_PROBE-gated crash ledger.
  # Used by two-process link fixtures to confirm a local linked actor crashed
  # via the mailbox EXIT cascade. Not user-callable; not JIT-reachable.
  "hew_link_probe_terminal_state",
  # Test-introspection probe: drives one piggybacked SWIM gossip entry into the
  # current node's cluster (DEAD verdict / stale-ALIVE replay / higher-incarnation
  # rejoin) so a two-process rejoin fixture can exercise the membership admission
  # gate deterministically. Not user-callable; not JIT-reachable.
  "hew_dist_inject_swim_gossip",
  # Test-introspection probe: returns the membership state the current node's
  # cluster records for a node id (a MEMBER_* constant, or -1 if unknown). Used by
  # the rejoin fixture to assert a buried node stays DEAD under stale gossip. Not
  # user-callable; not JIT-reachable.
  "hew_dist_member_state",
  # Test-introspection probe: returns 1 if a node id is in the quarantine set, 0
  # if not, -1 with no node installed. The resurrection-guard teeth for the rejoin
  # fixture. Not user-callable; not JIT-reachable.
  "hew_dist_quarantine_contains",
  # Test-introspection probe: when armed, fails every pending remote ask closed
  # with Partition through the production reply-table fan-out (the same seam the
  # SWIM-DEAD verdict reaches), returning the count failed. Lets the two-process
  # partition fixture drive the typed fail-closed verdict deterministically
  # instead of racing the socket-teardown / SWIM detector latency. Inert by
  # default: returns -1 and drains nothing unless HEW_DIST_TEST_PROBE=1 is set on
  # the process, so a shipped libhew exports the symbol but exposes no usable
  # drain capability. Not JIT-reachable.
  "hew_dist_partition_pending_remote_asks",
  # Test-only setup-race probe: identifies which inbound monitor/link setup is
  # paused by HEW_DIST_SETUP_RACE_PROBE so the two-process fixture can stop the
  # exact target before registration. Inert by default; not JIT-reachable.
  "hew_dist_setup_race_kind",
  "hew_fault_clear",
  "hew_fault_clear_all",
  "hew_fault_count",
  "hew_fault_inject_crash",
  "hew_fault_inject_delay",
  "hew_fault_inject_drop",
  "hew_is_shutting_down",
  "hew_mailbox_send_aliased",
  "hew_node_api_ask_cancel",
  "hew_node_api_ask_finish",
  "hew_node_api_register",
  "hew_node_lookup_location",
  "hew_node_send_location",
  "hew_periodic_shutdown",
  "hew_pid_set_local_node",
  "hew_register_handler_name",
  "hew_registry_clear",
  # Tier-B explicit-runtime resolution seam (host/embedder, AOT-only): resolve a
  # name against an explicit runtime handle instead of the ambient runtime. The
  # safe-by-construction half of split-by-danger — returns a value the caller
  # routes; a cross-runtime route is refused by the held-pointer send check.
  "hew_registry_lookup_with_runtime",
  "hew_runtime_cleanup",
  "hew_runtime_cleanup_after_main",
  # Host/embedder runtime handle lifecycle (AOT-only, never JIT-reachable): the
  # external owner token for the runtime, refcounted, with leak-on-close
  # teardown. Same lifecycle/bootstrap tier as hew_runtime_cleanup. `id_of` is
  # the Tier-B id-resolution form (reads the runtime's discriminant).
  "hew_runtime_id_of",
  "hew_runtime_new",
  "hew_runtime_release",
  "hew_runtime_retain",
  "hew_runtime_shutdown",
  "hew_sched_metrics_active_workers",
  "hew_sched_metrics_global_queue_len",
  "hew_sched_metrics_messages_received",
