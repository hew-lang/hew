name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read
  security-events: write

env:
  # Pinned LLVM upstream release tag, used by hew-codegen-rs (inkwell ->
  # llvm-sys-221) build script. Bumps must be reflected in
  # .github/actions/setup-llvm/action.yml (asset SHA256 pins) too.
  LLVM_VERSION: "22.1.5"
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Path change detection — skip heavy jobs for doc-only changes
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Required heavy checks may no-op for docs-only changes, but anything
          # that can change test/gate behaviour must fail closed and run them.
          filters: |
            code:
              - '**/*.rs'
              - 'tests/**'
              - 'scripts/**'
              - '.config/nextest.toml'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.lock'
              - 'std/**'
              - 'examples/**'
              - 'wasm-capability-manifest.toml'
              - 'hew-sandbox-vm/**'
              - 'hew-sandbox-wasm/**'
              - 'hew-runtime-testkit/**'
              - 'hew-testutil/**'
              - 'tools/**'
              - 'xtask/**'
              - 'Makefile'
              - '.github/workflows/**'
              - '.github/actions/**'
            playground:
              - 'hew-wasm/**'
              - 'hew-analysis/**'
              - 'hew-parser/**'
              - 'hew-types/**'
              - 'hew-lexer/**'
              - 'hew-lsp/tests/fixtures/**'
              - 'examples/playground/**'
              - 'scripts/gen-playground-manifest.py'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  # ─────────────────────────────────────────────────────────────────────────
  # Lint — fast feedback on code quality (always runs, ~1.5 min)
  # Produces SARIF output for GitHub Code Scanning inline annotations.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Clippy & format
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: lint-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-
            lint-${{ runner.os }}-

      # hew-codegen-rs depends on inkwell -> llvm-sys-221, whose build
      # script requires LLVM_SYS_221_PREFIX or llvm-config on PATH for
      # `cargo clippy --workspace --tests` to compile the workspace.
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install SARIF tools
        run: |
          gh release download clippy-sarif-latest --repo psastras/sarif-rs \
            --pattern "clippy-sarif-x86_64-unknown-linux-gnu" --output clippy-sarif --clobber
          gh release download sarif-fmt-latest --repo psastras/sarif-rs \
            --pattern "sarif-fmt-x86_64-unknown-linux-gnu" --output sarif-fmt --clobber
          chmod +x clippy-sarif sarif-fmt
          mv clippy-sarif sarif-fmt /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clippy
        run: |
          set -o pipefail
          cargo clippy --workspace --tests --message-format=json -- -D warnings \
            | clippy-sarif \
            | tee clippy-results.sarif \
            | sarif-fmt

      - name: Verify JIT host ABI classification
        run: make verify-ffi

      - name: Upload Clippy SARIF
        if: always() && hashFiles('clippy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: clippy-results.sarif
          category: clippy
          wait-for-processing: true

      - name: Runtime poison-safe lint
        run: make runtime-poison-safe-lint

  # ─────────────────────────────────────────────────────────────────────────
  # Browser/playground smoke — repo-local browser tooling coverage only.
  # Runs full hew-wasm suite (lib + fixture-coverage integration), checks
  # manifest freshness, and builds the browser WASM artifact.
  # ─────────────────────────────────────────────────────────────────────────
  playground-wasm-build:
    name: Playground WASM build
    needs: changes
    if: needs.changes.outputs.playground == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: playground-wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: playground-wasm-${{ runner.os }}-

      - name: Install wasm-pack v0.13.1
        run: |
          set -euo pipefail
          WASM_PACK_VERSION=0.13.1
          TARBALL="wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/${TARBALL}" \
            -o "/tmp/${TARBALL}"
          tar -xzf "/tmp/${TARBALL}" -C /tmp
          echo "/tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
          /tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack --version

      - name: Check repo-local playground browser/tooling smoke
        run: make playground-check

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — Rust workspace
  # Produces JUnit XML for GitHub Actions test reporting.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & test (Linux)
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy Linux CI while satisfying the required check."

      - uses: actions/checkout@v5
        if: env.RUN_CODE_PATH == 'true'

      - name: Install build tools
        if: env.RUN_CODE_PATH == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev pkg-config

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: env.RUN_CODE_PATH == 'true'
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'

      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: build-test-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-test-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-

      - name: Build Rust runtime and frontend (release)
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-runtime -p hew-lsp --release

      - name: Smoke test hew-lsp
        if: env.RUN_CODE_PATH == 'true'
        run: ./target/release/hew-lsp --version

      - name: Build WASM runtime
        if: env.RUN_CODE_PATH == 'true'
        run: |
          rustup target add wasm32-wasip1
          cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Install wasmtime
        if: env.RUN_CODE_PATH == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WASMTIME_TAG="$(gh release view --repo bytecodealliance/wasmtime --json tagName --jq .tagName)"
          WASMTIME_DIR="wasmtime-${WASMTIME_TAG}-x86_64-linux"
          gh release download "$WASMTIME_TAG" --repo bytecodealliance/wasmtime \
            --pattern "${WASMTIME_DIR}.tar.xz" --clobber
          tar -xJf "${WASMTIME_DIR}.tar.xz"
          echo "$PWD/${WASMTIME_DIR}" >> "$GITHUB_PATH"
          "./${WASMTIME_DIR}/wasmtime" --version

      - name: Run WASM runtime actual-target libtests
        if: env.RUN_CODE_PATH == 'true'
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime run
        run: cargo test -p hew-runtime --target wasm32-wasip1 --no-default-features --lib

      # Default features include "full" (encryption + profiler + quic),
      # so all 33 QUIC transport tests run without an explicit flag.
      # hew-wasm browser/tooling smoke stays isolated in playground-wasm-build.
      # hew-cabi is excluded — its #[no_mangle] symbols conflict with
      # hew-runtime when both link into a test binary.
      - name: Run Rust workspace tests
        if: env.RUN_CODE_PATH == 'true'
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci

      - name: Run vertical-slice end-to-end oracle
        if: env.RUN_CODE_PATH == 'true'
        run: make test-vertical-slice

      - name: Run cross-module package-import oracle
        if: env.RUN_CODE_PATH == 'true'
        run: make test-pkg-import

      - name: Run Hew language test suite (ratcheted)
        if: env.RUN_CODE_PATH == 'true'
        # Runs tests/hew/ through scripts/hew-suite-ratchet.sh.
        # Known failures are tracked in scripts/hew-suite-expected-failures.txt;
        # any unexpected failure OR unexpected pass (ratchet forward) exits 1.
        # When all entries in the expected-failures file are cleared, this step
        # gates on a fully-green suite with no special handling.
        run: make test-hew-ratchet

      - name: Run stdlib type-check suite (ratcheted)
        if: env.RUN_CODE_PATH == 'true'
        # Type-checks every std/*.hew file through scripts/stdlib-ratchet.sh.
        # Known failures tracked in scripts/stdlib-expected-failures.txt.
        run: make test-stdlib-ratchet

      - name: Setup Node.js for sandbox parity
        if: env.RUN_CODE_PATH == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: hew-sandbox-vm/package-lock.json

      - name: Run sandbox VM parity
        if: env.RUN_CODE_PATH == 'true'
        run: make sandbox-parity

      - name: Upload test reports
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results (Linux)

  # ─────────────────────────────────────────────────────────────────────────
  # Code coverage — Rust workspace tests instrumented with cargo-llvm-cov
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Code coverage
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
      # cargo-llvm-cov builds into target/llvm-cov-target/, so the `hew`
      # binary the e2e tests spawn sits one directory deeper than the normal
      # target/debug/ — its exe-relative std discovery (../../std) then misses
      # the repo std/. Pin std explicitly for the instrumented run; the normal
      # test job finds it relative to target/debug/ and needs no override.
      HEW_STD: ${{ github.workspace }}/std
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy coverage work while satisfying the required check."

      - uses: actions/checkout@v5
        if: env.RUN_CODE_PATH == 'true'

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'
        with:
          components: llvm-tools

      - uses: taiki-e/install-action@cargo-llvm-cov
        if: env.RUN_CODE_PATH == 'true'
      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: coverage-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-
            coverage-${{ runner.os }}-

      # hew-codegen-rs depends on inkwell -> llvm-sys-221, whose build
      # script requires LLVM_SYS_221_PREFIX. `cargo llvm-cov nextest
      # --workspace` resolves and compiles the full workspace.
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: env.RUN_CODE_PATH == 'true'
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Run tests with coverage
        if: env.RUN_CODE_PATH == 'true'
        # Default features include "full" (encryption + profiler + quic),
        # so all QUIC transport tests are covered without an explicit flag.
        # The wasi-runner e2e tests (eval_wasm_* and the wasi_run_e2e
        # binary) need wasmtime plus the wasm runtime archive; they run and
        # gate in the normal "Build & test" job, so they are excluded from the
        # instrumented run rather than duplicating that wasm setup here (which
        # would also hit the llvm-cov target-dir path issue). Their Rust-side
        # coverage is marginal — they drive a wasmtime subprocess.
        run: >
          cargo llvm-cov nextest
          --workspace --exclude hew-wasm
          --profile ci
          -E 'not test(eval_wasm) and not binary(wasi_run_e2e)'
          --lcov --output-path lcov.info

      - name: Generate HTML report
        if: env.RUN_CODE_PATH == 'true'
        run: >
          cargo llvm-cov report
          --html --output-dir coverage-html

      - name: Coverage summary
        if: env.RUN_CODE_PATH == 'true'
        run: cargo llvm-cov report | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage (lcov)
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload coverage (HTML)
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — Windows
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test-windows:
    name: Build & test (Windows)
    needs: changes
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy Windows CI while satisfying the required check."
        shell: pwsh

      - uses: actions/checkout@v5
        if: env.RUN_CODE_PATH == 'true'

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: env.RUN_CODE_PATH == 'true'
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'

      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~\.cargo\registry\
            ~\.cargo\git\
            target\
          key: build-test-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-test-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-

      - name: Build Rust crates
        if: env.RUN_CODE_PATH == 'true'
        # hew-codegen-rs (inkwell -> llvm-sys-221) compiles end-to-end
        # because the upstream LLVM tarball is provisioned above.
        run: cargo build -p adze-cli -p hew-runtime -p hew-lsp -p hew-cli --release

      - name: Run Rust workspace tests
        if: env.RUN_CODE_PATH == 'true'
        # hew-wasm requires wasmtime; hew-cabi has #[no_mangle] symbols
        # that conflict with hew-runtime when both are linked into a
        # test binary (duplicate symbol errors).
        # Default features include "full" (encryption + profiler + quic),
        # so all QUIC transport tests run without an explicit flag.
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci

      - name: Upload test reports
        if: always() && env.RUN_CODE_PATH == 'true'
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results (Windows)

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test — macOS (Apple Silicon)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test-macos:
    name: Build & test (macOS arm64)
    needs: changes
    runs-on: macos-14
    timeout-minutes: 60
    env:
      RUN_CODE_PATH: ${{ needs.changes.outputs.code }}
    steps:
      - name: No-op for docs-only changes
        if: env.RUN_CODE_PATH != 'true'
        run: echo "No code changes detected; skipping heavy macOS arm64 CI while satisfying the required check."

      - uses: actions/checkout@v5
        if: env.RUN_CODE_PATH == 'true'

      - uses: dtolnay/rust-toolchain@stable
        if: env.RUN_CODE_PATH == 'true'
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: taiki-e/install-action@nextest
        if: env.RUN_CODE_PATH == 'true'

      - name: Install build tools
        if: env.RUN_CODE_PATH == 'true'
        # libffi and zstd are runtime deps of the upstream LLVM macOS
        # tarball; libxml2 ships in /usr/lib but libffi does not, so
        # llvm-sys's static-link path fails to resolve -lffi without
        # the brew bottle. libffi is keg-only on Homebrew, so we add its
        # lib dir to the linker search path via RUSTFLAGS (LIBRARY_PATH
        # is honoured by clang but not by every rustc link invocation).
        run: |
          brew install libffi zstd
          LIBFFI_PREFIX="$(brew --prefix libffi)"
          # Apple's bundled ld (Xcode 15.4) ships libLTO 15.0.0, which cannot
          # parse LLVM 22 bitcode attribute kinds embedded in llvm-sys-221's
          # static libs. Use the ld64.lld that ships in the same upstream
          # LLVM 22.1.5 tarball we already vendor (on PATH via setup-llvm).
          # LLD doesn't auto-add libc++/libc++abi the way Apple's ld does, so
          # link them explicitly — LTO of llvm-sys's C++ static libs pulls
          # in operator new/delete and __cxa_* runtime symbols.
          echo "RUSTFLAGS=-L ${LIBFFI_PREFIX}/lib -C link-arg=-fuse-ld=lld -C link-arg=-lc++ -C link-arg=-lc++abi ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: env.RUN_CODE_PATH == 'true'
        uses: ./.github/actions/setup-llvm
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Add LLVM lib to runtime rpath
        if: env.RUN_CODE_PATH == 'true'
        # LLD links the test binaries against -lc++ -lc++abi from the
        # upstream LLVM 22 tarball, but does not record an LC_RPATH for
        # the dynamic loader. Without an rpath, dyld fails to locate
        # libc++abi.1.dylib at execution time. Append a -Wl,-rpath link
        # arg pointing at the vendored LLVM tarball's lib/ directory.
        run: |
          echo "RUSTFLAGS=${RUSTFLAGS} -C link-arg=-Wl,-rpath,${LLVM_SYS_221_PREFIX}/lib" >> "$GITHUB_ENV"

      - name: Set macOS deployment target
        if: env.RUN_CODE_PATH == 'true'
        run: echo "MACOSX_DEPLOYMENT_TARGET=13.0" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        if: env.RUN_CODE_PATH == 'true'
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: build-test-${{ runner.os }}-arm64-llvm${{ env.LLVM_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-test-${{ runner.os }}-arm64-llvm${{ env.LLVM_VERSION }}-

      - name: Build libhew.a (runtime + stdlib)
        if: env.RUN_CODE_PATH == 'true'
        run: |
          cargo build -p hew-lib --release
          cargo build -p hew-lib

      - name: Build frontend (release)
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-cli --release

      - name: Install WASI runner prerequisites
        if: env.RUN_CODE_PATH == 'true'
        run: |
          rustup target add wasm32-wasip1
          brew install wasmtime
          wasmtime --version
          command -v wasm-ld
          wasm-ld --version

      - name: Build hew-runtime for wasm32-wasip1
        if: env.RUN_CODE_PATH == 'true'
        run: cargo build -p hew-runtime --target wasm32-wasip1 --no-default-features --release

      - name: Run Rust workspace tests
        if: env.RUN_CODE_PATH == 'true'
        # hew-cabi has #[no_mangle] symbols that conflict with hew-runtime
        # when both link into a test binary.
        run: >-
          cargo nextest run --workspace
          --exclude hew-wasm
          --exclude hew-cabi
          --profile ci
